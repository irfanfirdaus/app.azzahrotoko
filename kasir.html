    function Toast({ msg }) { if (!msg) return null; return <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-dark text-white px-5 py-2.5 rounded-full z-[9999] text-sm font-medium shadow-xl whitespace-nowrap animate-fade-up">{msg}</div>; }
    function Spinner() { return <div className="flex items-center justify-center p-10"><div className="w-8 h-8 border-4 border-gray-200 border-t-brand rounded-full animate-spin"></div></div>; }
    function Modal({ children, onClose, title, full }) {
      return (
        <div className="fixed inset-0 bg-black/60 z-[200] flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity animate-fade-in" onClick={onClose}>
          <div className={`bg-white rounded-t-2xl sm:rounded-2xl flex flex-col animate-fade-up shadow-2xl ${full ? 'w-full h-[90vh] sm:h-[85vh] max-w-4xl' : 'w-full max-w-md max-h-[90vh]'}`} onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center p-5 border-b border-gray-100 shrink-0">
              <h3 className="font-extrabold text-lg text-gray-900">{title}</h3>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center bg-gray-100 hover:bg-gray-200 rounded-full transition-colors text-gray-500 font-bold">✕</button>
            </div>
            <div className="p-5 overflow-y-auto flex-1">{children}</div>
          </div>
        </div>
      );
    }

    const applyPromos = (cart, promos) => {
      const now = new Date();
      const active = promos.filter(p => { if (!p.active) return false; if (p.start_date && new Date(p.start_date) > now) return false; if (p.end_date && new Date(p.end_date) < now) return false; return true; });
      const sub = cart.reduce((s, x) => s + x.price * x.qty, 0);
      let disc = 0, applied = [];
      active.forEach(pr => {
        if (pr.type === "discount") {
          if (pr.min_purchase && sub < pr.min_purchase) return;
          let d = pr.disc_type === "pct" ? sub * pr.disc_value / 100 : pr.disc_value;
          if (pr.max_discount && d > pr.max_discount) d = pr.max_discount;
          disc += d; applied.push({ name: pr.name, discount: d, id: pr.id });
        }
        if (pr.type === "bundling") {
          if (!(pr.bundle_items || []).every(id => cart.find(x => x.id === id))) return;
          let d = pr.disc_type === "pct" ? sub * pr.disc_value / 100 : pr.disc_value;
          if (pr.max_discount && d > pr.max_discount) d = pr.max_discount;
          disc += d; applied.push({ name: pr.name, discount: d, id: pr.id });
        }
      });
      return { discountTotal: disc, appliedPromos: applied };
    };

    function PinPad({ onSuccess, cashiers, settings, notify }) {
      const [pin, setPin] = useState("");
      const [shake, setShake] = useState(false);
      const [loading, setLoading] = useState(false);

      const press = async (d) => {
        if (pin.length >= 6 || loading) return;
        const next = pin + d; setPin(next);
        if (next.length >= 4) {
          const ownerPin = settings?.owner_pin || "9999";
          const adminPin = settings?.admin_pin || "0000";
          const kasirPin = settings?.kasir_pin || "1234";
          if (next === ownerPin) return onSuccess({ role: "owner", name: "Owner" });
          if (next === adminPin) return onSuccess({ role: "admin", name: "Admin" });
          if (next === kasirPin) { 
            setLoading(true); 
            try { 
              const { data, error } = await db.from("cash_sessions").select("*").eq("status", "open").limit(1).maybeSingle(); 
              if (error) throw error;
              if (data) { 
                onSuccess({ role: "kasir", name: data.cashier_name, session_id: data.id, cashier_id: data.cashier_id, session_opened_at: data.created_at, opened_by: data.opened_by }); 
              } else { 
                onSuccess({ role: "kasir", name: "Kasir", needs_open: true }); 
              } 
            } catch (e) { 
              console.error(e);
              notify("Error cek sesi: " + e.message);
            } 
            setLoading(false); 
            return; 
          }
          if (next.length >= 6) { setShake(true); setTimeout(() => { setPin(""); setShake(false); }, 600); }
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-dark to-brand flex flex-col items-center justify-center p-6">
          <div className="text-5xl mb-3">🧾</div>
          <div className="text-white font-extrabold text-2xl mb-1">Kasir POS</div>
          <div className="text-white/60 text-sm mb-8 font-medium">{settings?.store_name || "Toko Azzahro"}</div>
          <div className={`bg-white rounded-3xl p-7 w-full max-w-[320px] shadow-2xl relative ${shake ? 'animate-shake' : ''}`}>
            {loading && <div className="absolute inset-0 bg-white/80 backdrop-blur-sm z-10 rounded-3xl flex items-center justify-center"><Spinner /></div>}
            <div className="flex justify-center gap-3 mb-6">
              {[0, 1, 2, 3, 4, 5].map(i => <div key={i} className={`w-3.5 h-3.5 rounded-full transition-colors ${i < pin.length ? 'bg-dark' : 'bg-gray-200'}`} />)}
            </div>
            <div className="grid grid-cols-3 gap-2.5">
              {[1, 2, 3, 4, 5, 6, 7, 8, 9, "", 0, "⌫"].map((d, i) => (
                <button key={i} onClick={() => d === "" ? null : d === "⌫" ? setPin(p => p.slice(0, -1)) : press(String(d))} disabled={d === "" || loading}
                  className={`py-4 text-xl font-bold rounded-2xl ${d === "" ? 'invisible' : d === "⌫" ? 'bg-red-50 text-red-500 hover:bg-red-100' : 'bg-gray-50 text-dark hover:bg-gray-100 active:bg-gray-200'} transition-colors`}>
                  {d}
                </button>
              ))}
            </div>
            <div className="mt-4 text-center text-xs text-gray-400 font-medium">Masukkan PIN Akses Kasir</div>
          </div>
        </div>
      );
    }

    function OpenSession({ onOpened, cashiers, notify }) {
      const [form, setForm] = useState({ cashier_id: "", opening_amount: "", notes: "" });
      const [now, setNow] = useState(new Date());
      useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);
      const [saving, setSaving] = useState(false);
      const save = async () => {
        if (!form.cashier_id || !form.opening_amount) return notify("Pilih kasir dan isi uang awal!");
        setSaving(true);
        try {
          const cashier = cashiers.find(c => String(c.id) === String(form.cashier_id));
          if (!cashier) throw new Error("Kasir tidak ditemukan.");
          
          const now = new Date();
          const sessId = now.getFullYear() + 
                         String(now.getMonth() + 1).padStart(2, '0') + 
                         String(now.getDate()).padStart(2, '0') + 
                         String(now.getHours()).padStart(2, '0') + 
                         String(now.getMinutes()).padStart(2, '0');
          
          const payload = { 
            cashier_id: cashier.id, 
            cashier_name: sessId, 
            opened_by: cashier.name, 
            opening_amount: parseFloat(form.opening_amount), 
            status: "open", 
            notes_open: form.notes 
          };
          
          const { data, error } = await db.from("cash_sessions").insert(payload).select().single();
          if (error) throw error;
          
          notify("Sesi kasir dimulai!"); 
          onOpened(data);
        } catch (e) {
          console.error(e);
          notify("Gagal: " + e.message);
        } finally {
          setSaving(false);
        }
      };
      return (
        <div className="min-h-screen bg-grayLight flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl p-6 w-full max-w-md shadow-lg border border-gray-100">
            <h2 className="text-xl font-black text-gray-800 mb-1">▶ Mulai Sesi Kasir</h2>
            <p className="text-sm text-gray-500 mb-6 font-medium">Isi detail awal sebelum mulai melayani pelanggan.</p>
            <div className="space-y-4">
              <div className="bg-brandLight p-4 rounded-2xl border border-brand/10 text-center">
                <div className="text-[10px] text-brand/60 font-black uppercase tracking-widest mb-1">Waktu Saat Ini</div>
                <div className="text-2xl font-black text-brand leading-none">{now.toLocaleTimeString("id-ID", { hour: '2-digit', minute: '2-digit', second: '2-digit' })}</div>
                <div className="text-[10px] text-brand/60 font-bold mt-1 uppercase tracking-wider">{now.toLocaleDateString("id-ID", { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</div>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Identitas Kasir *</label>
                <select value={form.cashier_id} onChange={e => setForm(f => ({ ...f, cashier_id: e.target.value }))} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-bold focus:outline-none focus:ring-2 focus:ring-brand/30">
                  <option value="">-- Pilih Nama Kasir --</option>{cashiers.map(c => <option key={c.id} value={c.id}>{c.name} ({c.code})</option>)}
                </select>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Uang Modal Awal (Laci) *</label>
                <input value={form.opening_amount} onChange={e => setForm(f => ({ ...f, opening_amount: e.target.value }))} type="number" inputMode="numeric" placeholder="cth: 500000" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-xl font-bold focus:outline-none focus:ring-2 focus:ring-brand/30 text-brand" />
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Catatan</label>
                <input value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} placeholder="Kondisi laci, dsb..." className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" />
              </div>
              <button onClick={save} disabled={saving} className="w-full py-4 mt-2 bg-brand hover:bg-brand/90 text-white rounded-xl font-bold text-base shadow-md transition-all">{saving ? "Memulai..." : "Mulai Sesi →"}</button>
            </div>
          </div>
        </div>
      );
    }

    function AddCustomerModal({ onClose, onSave, notify }) {
      return (
        <Modal onClose={onClose} title="Tambah Pelanggan Baru" full>
          <div className="h-full flex flex-col">
            <iframe 
              src="daftar.html" 
              className="w-full flex-1 border-0 rounded-xl" 
              title="Daftar Member"
            />
            <div className="p-4 text-center text-[10px] text-gray-400 font-medium">
              Tutup modal ini setelah pendaftaran selesai jika tidak tertutup otomatis.
            </div>
          </div>
        </Modal>
      );
    }

    function LaporanPanel({ sessionTxs, loadSessionTxs, user, setTxData, setModal, fmt, db, color, settings, customers }) {
      const today = new Date().toISOString().split('T')[0];
      const [dateFilter, setDateFilter] = useState(today);
      const [txList, setTxList] = useState(null);
      const [loading, setLoading] = useState(false);
      const [tab, setTab] = useState('tx'); // 'tx' or 'items'

      const load = async () => {
        setLoading(true);
        const start = dateFilter + 'T00:00:00';
        const end = dateFilter + 'T23:59:59';
        const { data } = await db.from('transactions').select('*, transaction_items(*)').gte('created_at', start).lte('created_at', end).order('created_at', { ascending: false });
        setTxList(data || []);
        setLoading(false);
      };

      useEffect(() => { load(); }, []);

      const list = txList !== null ? txList : sessionTxs;
      const totalAll = list.reduce((s, t) => s + (t.total || 0), 0);
      const totalCash = list.filter(t => t.pay_method === 'Cash').reduce((s, t) => s + (t.total || 0), 0);
      const totalNonCash = totalAll - totalCash;

      const soldSummary = {};
      list.forEach(t => {
        (t.transaction_items || []).forEach(i => {
          const key = `${i.name}${i.variant_name ? ` (${i.variant_name})` : ''}`;
          if (!soldSummary[key]) soldSummary[key] = { name: i.name, variant: i.variant_name, qty: 0, total: 0 };
          soldSummary[key].qty += i.qty;
          soldSummary[key].total += (i.qty * i.price);
        });
      });
      const soldList = Object.values(soldSummary).sort((a, b) => b.qty - a.qty);

      const shareWA = (t) => {
        const items = (t.transaction_items || []).map(i => `${i.name}${i.variant_name ? ` (${i.variant_name})` : ''}: ${i.qty}x ${fmt(i.price)}`).join('\n');
        const text = `*${(settings?.store_name || 'Toko Azzahro').toUpperCase()}*\n\nNo: ${t.tx_code}\nKasir: ${t.cashier_name}\nTgl: ${new Date(t.created_at).toLocaleDateString('id-ID')}\n\n--- ITEM ---\n${items}\n\nTotal: ${fmt(t.total)}\nBayar: ${t.pay_method}\n\n${settings?.store_footer || 'Terima kasih!'}`;
        const phone = t.customer_id ? customers.find(c => c.id === t.customer_id)?.phone : null;
        window.open(`https://wa.me/${phone ? phone.replace(/[^0-9]/g, '') : ''}?text=${encodeURIComponent(text)}`);
      };

      return (
        <div>
          <div className="flex gap-2 mb-3">
            <input type="date" value={dateFilter} onChange={e => setDateFilter(e.target.value)} className="flex-1 px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-brand/30" />
            <button onClick={load} disabled={loading} className="px-4 py-2 bg-brand text-white rounded-xl text-xs font-bold shadow-sm hover:bg-brand/90 transition-all">
              {loading ? '...' : 'Lihat'}
            </button>
          </div>

          <div className="flex bg-gray-100 p-1 rounded-xl mb-4">
            <button onClick={() => setTab('tx')} className={`flex-1 py-2 text-[10px] font-black uppercase tracking-wider rounded-lg transition-all ${tab === 'tx' ? 'bg-white text-brand shadow-sm' : 'text-gray-400'}`}>📜 Transaksi</button>
            <button onClick={() => setTab('items')} className={`flex-1 py-2 text-[10px] font-black uppercase tracking-wider rounded-lg transition-all ${tab === 'items' ? 'bg-white text-brand shadow-sm' : 'text-gray-400'}`}>📦 Barang</button>
          </div>

          {list.length > 0 && (
            <div className="grid grid-cols-3 gap-2 mb-4">
              <div className="bg-brandLight rounded-xl p-3 border border-brand/10 text-center">
                <div className="text-[9px] font-bold text-brand/60 uppercase tracking-widest">Transaksi</div>
                <div className="font-black text-lg text-brand">{list.length}</div>
              </div>
              <div className="bg-green-50 rounded-xl p-3 border border-green-100 text-center">
                <div className="text-[9px] font-bold text-green-600/70 uppercase tracking-widest">Cash</div>
                <div className="font-black text-sm text-green-700">{fmt(totalCash)}</div>
              </div>
              <div className="bg-blue-50 rounded-xl p-3 border border-blue-100 text-center">
                <div className="text-[9px] font-bold text-blue-600/70 uppercase tracking-widest">Non-Cash</div>
                <div className="font-black text-sm text-blue-700">{fmt(totalNonCash)}</div>
              </div>
            </div>
          )}

          <div className="space-y-2 max-h-[50vh] overflow-y-auto pr-1">
            {loading ? (
              <div className="flex justify-center py-6">
                <div className="w-6 h-6 border-4 border-gray-200 border-t-brand rounded-full animate-spin"></div>
              </div>
            ) : list.length === 0 ? (
              <div className="text-center text-gray-400 py-8 italic text-sm">Tidak ada data pada tanggal ini</div>
            ) : tab === 'tx' ? (
              list.map(t => (
                <div key={t.id} className="p-3 bg-white border border-gray-100 rounded-xl shadow-sm hover:border-brand/30 transition-all">
                  <div className="flex justify-between items-start">
                    <div>
                      <div className="text-[10px] font-mono text-gray-400 uppercase tracking-wider">#{t.tx_code || t.id}</div>
                      <div className="font-bold text-gray-800 text-xs">{t.customer_name || 'Umum'}</div>
                      <div className="text-[10px] text-gray-400 mt-0.5">{t.cashier_name} · {new Date(t.created_at).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })}</div>
                    </div>
                    <div className="text-right">
                      <div className="font-black text-sm" style={{ color }}>{fmt(t.total)}</div>
                      <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${t.pay_method === 'Cash' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}`}>{t.pay_method}</span>
                    </div>
                  </div>
                  {(t.transaction_items || []).length > 0 && (
                    <div className="mt-2 pt-2 border-t border-gray-50 text-[10px] text-gray-500 space-y-0.5">
                      {t.transaction_items.map((i, idx) => (
                        <div key={idx} className="flex justify-between"><span>{i.name}{i.variant_name ? ` (${i.variant_name})` : ''}</span><span>{i.qty}x</span></div>
                      ))}
                    </div>
                  )}
                  <div className="flex gap-1.5 mt-2">
                    <button onClick={() => { setTxData({ ...t, items: t.transaction_items || [] }); setModal('receipt'); }} className="flex-1 py-1.5 bg-gray-50 text-gray-600 rounded-lg border border-gray-200 text-[10px] font-bold flex items-center justify-center gap-1">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                      Struk
                    </button>

    function POS({ user, settings, notify, onLogout }) {

      const [products, setProducts] = useState([]);
      const [promos, setPromos] = useState([]);
      const [customers, setCustomers] = useState([]);
      const [cashiers, setCashiers] = useState([]);
      const [cart, setCart] = useState([]);
      const [cat, setCat] = useState("Semua");
      const [search, setSearch] = useState("");
      const [customer, setCustomer] = useState("");
      const [servedBy, setServedBy] = useState("");
      const [txType, setTxType] = useState("Cash");
      const [cash, setCash] = useState("");
      const [modal, setModal] = useState(null);
      const [txData, setTxData] = useState(null);
      const [variantPicker, setVariantPicker] = useState(null);
      const [showAddCustomer, setShowAddCustomer] = useState(false);
      const [notes, setNotes] = useState("");
      const [loading, setLoading] = useState(true);
      const [showSessionTxs, setShowSessionTxs] = useState(false);
      const [sessionTxs, setSessionTxs] = useState([]);
      const [showCart, setShowCart] = useState(false);
      const [pointsRedeemed, setPointsRedeemed] = useState(0);
      const [showRedeem, setShowRedeem] = useState(false);
      const [etalase, setEtalase] = useState("Semua Etalase");
      const [onlineOrders, setOnlineOrders] = useState([]);
      const [onlineDateFilter, setOnlineDateFilter] = useState(new Date().toISOString().split('T')[0]);
      const [onlineStatusFilter, setOnlineStatusFilter] = useState("pending");
      const [activeOnlineOrder, setActiveOnlineOrder] = useState(null);
      const CATS = settings?.product_categories ? ["Semua Produk", ...settings.product_categories.split(",").map(c => c.trim()).filter(Boolean)] : ["Semua Produk", "Air Zamzam", "Kurma", "Tasbih", "Sajadah", "Parfum", "Peci & Mukena", "Lainnya"];
      const ETALASE_LIST = settings?.product_etalase ? ["Semua Etalase", ...settings.product_etalase.split(",").map(c => c.trim()).filter(Boolean)] : ["Semua Etalase"];

      const loadAll = useCallback(async () => {
        setLoading(true);
        const [p, pr, c, cashiersRes] = await Promise.all([
          db.from("products").select("*").eq("active", true).order("name"),
          db.from("promos").select("*").eq("active", true),
          db.from("customers").select("*").order("name"),
          db.from("cashiers").select("*").order("name")
        ]);
        setProducts(p.data || []); setPromos(pr.data || []); setCustomers(c.data || []); setCashiers(cashiersRes.data || []);
        setLoading(false);
      }, []);
      
      const loadSessionTxs = async () => {
        if (!user?.session_id) return;
        const { data } = await db.from("transactions").select("*").eq("session_id", user.session_id).order("created_at", { ascending: false });
        setSessionTxs(data || []);
      };

      const loadOnlineOrders = async () => {
        try {
          let query = db.from("online_orders").select("*");
          if (onlineDateFilter) {
            query = query.gte("created_at", onlineDateFilter + "T00:00:00").lte("created_at", onlineDateFilter + "T23:59:59");
          }
          if (onlineStatusFilter && onlineStatusFilter !== "all") {
            query = query.eq("status", onlineStatusFilter);
          } else {
            query = query.order("created_at", { ascending: false });
          }
          
          const { data } = await query.order("created_at", { ascending: onlineStatusFilter === "pending" });
          setOnlineOrders(data || []);
        } catch(e) { console.error("Error loading online orders", e); }
      };
      
      useEffect(() => { loadAll(); loadSessionTxs(); loadOnlineOrders(); }, [loadAll, onlineDateFilter, onlineStatusFilter]);

      useEffect(() => {
        // Request Notification Permission
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission();
        }

        const sub = db.channel('online_orders_realtime')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'online_orders' }, payload => {
            loadOnlineOrders();
            if ("Notification" in window && Notification.permission === "granted") {
              new Notification("Pesanan Online Baru!", {
                body: `Pesanan dari ${payload.new.customer_name} senilai ${fmt(payload.new.total_amount)}`,
                icon: settings?.store_logo || ""
              });
            }
          })
          .subscribe();
        return () => { db.removeChannel(sub); };
      }, [settings?.store_logo]);

      useEffect(() => {
        const handleMessage = (e) => {
          if (e.data?.type === 'CUSTOMER_ADDED') {
            const newCust = e.data.customer;
            setCustomers(prev => {
              if (prev.find(c => c.id === newCust.id)) return prev;
              return [...prev, newCust].sort((a,b) => a.name.localeCompare(b.name));
            });
            setCustomer(newCust.id);
            setTimeout(() => setShowAddCustomer(false), 2000);
          }
        };
        window.addEventListener('message', handleMessage);
        return () => window.removeEventListener('message', handleMessage);
      }, []);

      const grouped = useMemo(() => {
        const map = {};
        products.forEach(p => {
          if (!p.sku) return;
          const key = p.sku.split('-')[0];
          const isVariant = p.sku.includes('-');
          if (!map[key]) {
            map[key] = { ...p, variants: [] };
          }
          if (isVariant) {
            map[key].variants.push(p);
          } else {
            const vars = map[key].variants;
            map[key] = { ...p, variants: vars };
          }
        });
        return Object.values(map).map(p => {
          if (p.variants && p.variants.length > 0) {
            const totalStock = p.variants.reduce((sum, v) => sum + (v.stock || 0), 0);
            return { ...p, stock: totalStock };
          }
          return p;
        });
      }, [products]);

      const filtered = useMemo(() => {
        const s = search.toLowerCase();
        return grouped.filter(p => (cat === "Semua Produk" || cat === "Semua" || p.category === cat) && (etalase === "Semua Etalase" || p.etalase === etalase) && (p.name.toLowerCase().includes(s) || p.sku?.toLowerCase().includes(s) || (p.brand || "").toLowerCase().includes(s)));
      }, [grouped, search, cat, etalase]);

      const addFinal = (item) => {
        if ((item.stock || 0) <= 0) return notify("Stok habis!");
        const ckey = item.sku;
        const normalPrice = item.price;
        const price = (item.promo_price && item.promo_price > 0) ? item.promo_price : item.price;
        const name = item.name;
        const vName = item.variant_name || null;
        const itemStock = item.stock || 0;
        setCart(prev => {
          const ex = prev.find(x => x.ckey === ckey);
          const currQty = ex ? ex.qty : 0;
          if (currQty + 1 > itemStock && !item.is_po) { notify(`Stok ${name} sisa ${itemStock}`); return prev; }
          return ex ? prev.map(x => x.ckey === ckey ? { ...x, qty: x.qty + 1 } : x) : [...prev, { id: item.id, sku: item.sku, name, vName, normalPrice, price, qty: 1, ckey, stock: itemStock, is_po: item.is_po }];
        });
        setVariantPicker(null);
      };
      const clickProd = p => { 
        if (p.variants?.length > 0) setVariantPicker(p); 
        else addFinal(p); 
      };
      const updQty = (ckey, d) => {
        setCart(prev => prev.map(x => {
          if (x.ckey === ckey) { const n = x.qty + d; return { ...x, qty: (n > x.stock && !x.is_po) ? x.stock : n < 0 ? 0 : n }; }
          return x;
        }).filter(x => x.qty > 0));
      };
      const remItem = ckey => setCart(p => p.filter(x => x.ckey !== ckey));

      const subtotal = cart.reduce((s, x) => s + (Number(x.normalPrice || x.price) || 0) * x.qty, 0);
      const productDiscount = cart.reduce((s, x) => s + (Math.max(0, Number(x.normalPrice || x.price) - Number(x.price || 0))) * x.qty, 0);
      const { discountTotal, appliedPromos } = applyPromos(cart, promos);
      const pointsDiscount = (Number(pointsRedeemed) || 0) * 100;
      const total = Math.max(0, subtotal - productDiscount - discountTotal - pointsDiscount);
      const pointsEarned = Math.floor(total / 10000) * (parseInt(settings?.points_per_10k) || 1);
      const selectedCustomer = useMemo(() => customers.find(c => String(c.id) === String(customer)), [customer, customers]);

      const processTx = async () => {
        if (!servedBy) return notify("Pilih kasir terlebih dahulu!");
        if (cart.length === 0) return notify("Keranjang kosong!");
        if (txType === "Cash" && parseFloat(cash) < total) return notify("Uang kurang!");
        setModal("loading");

        const now = new Date();
        const dateCode = now.getFullYear().toString().slice(-2) + 
                         String(now.getMonth() + 1).padStart(2, '0') + 
                         String(now.getDate()).padStart(2, '0');
        const timeCode = String(now.getHours()).padStart(2, '0') + 
                         String(now.getMinutes()).padStart(2, '0') + 
                         String(now.getSeconds()).padStart(2, '0');
        const txCode = `TX${dateCode}${timeCode}`;

        const cust = selectedCustomer;
        const servedName = servedBy || user.name;
        const payload = {
          session_id: user.session_id, cashier_id: user.cashier_id, cashier_name: servedName,
          customer_id: cust?.id || null, customer_name: cust?.name || null,
          subtotal, discount_total: discountTotal + pointsDiscount, total,
          pay_method: txType, cash_received: txType === "Cash" ? parseFloat(cash) : total,
          change_amount: txType === "Cash" ? parseFloat(cash) - total : 0,
          applied_promos: appliedPromos,
          tx_code: txCode,
          points_earned: pointsEarned,
          points_redeemed: pointsRedeemed,
          notes_tx: notes
        };

        const { data: tx, error: err1 } = await db.from("transactions").insert(payload).select().single();
        if (err1) { setModal(null); return notify("Gagal simpan: " + err1.message); }

        // Simpan served_by terpisah (toleran jika kolom belum ada di DB)
        const servedByVal = servedBy || user.name;
        try { await db.from("transactions").update({ served_by: servedByVal }).eq("id", tx.id); } catch(_) {}

        const items = cart.map(x => ({ transaction_id: tx.id, product_id: x.id, sku: x.sku, name: x.name, variant_name: x.vName, price: x.price, qty: x.qty, subtotal: x.price * x.qty }));
        await db.from("transaction_items").insert(items);

        // Update stok
        for (const item of cart) {
          await db.rpc("decrement_stock_by_sku", { p_sku: item.sku, p_qty: item.qty });
        }

        // Update poin pelanggan
        if (cust) {
          try {
            if (pointsEarned > 0) {
              const { error: e1 } = await db.rpc('add_customer_points', { p_customer_id: cust.id, p_points: pointsEarned, p_type: 'earn', p_note: `Transaksi ${txCode}`, p_transaction_id: tx.id });
              if (e1) { console.error("Error earn points:", e1); notify("Gagal simpan poin: " + e1.message); }
            }
            if (pointsRedeemed > 0) {
              const { error: e2 } = await db.rpc('add_customer_points', { p_customer_id: cust.id, p_points: -pointsRedeemed, p_type: 'redeem', p_note: `Redeem di ${txCode}`, p_transaction_id: tx.id });
              if (e2) { console.error("Error redeem points:", e2); notify("Gagal redeem poin: " + e2.message); }
            }
          } catch(pe) {
            console.error("Critical point error:", pe);
            notify("Kritikal error poin: " + pe.message);
          }
        }

        setTxData({ ...tx, items, points_earned: pointsEarned, points_balance: (cust?.points || 0) - pointsRedeemed + pointsEarned });
        
        // Update Online Order if any
        if (activeOnlineOrder) {
          await db.from("online_orders").update({ status: "completed" }).eq("id", activeOnlineOrder);
          setActiveOnlineOrder(null);
          loadOnlineOrders();
        }

        setCart([]); setCash(""); setCustomer(""); setTxType("Cash"); setServedBy(""); setPointsRedeemed(0); setNotes("");
        loadAll();
        loadSessionTxs();
        setModal("receipt");
      };

      const closeSession = async () => {
        try {
          let sid = user.session_id;
          if (!sid) {
            // Jika admin/owner, cari sesi yang sedang open
            const { data } = await db.from("cash_sessions").select("id").eq("status", "open").single();
            if (data) sid = data.id;
          }
          if (!sid) throw new Error("Tidak ada sesi kasir yang sedang aktif.");
          
          setModal("loading");
          const { data: txs, error: txError } = await db.from("transactions").select("*").eq("session_id", sid);
          if (txError) throw txError;
          const safeTxs = txs || [];
          const rev = safeTxs.reduce((s, t) => s + t.total, 0);
          const cashIn = safeTxs.filter(t => t.pay_method === "Cash").reduce((s, t) => s + t.total, 0);
          const qrisIn = safeTxs.filter(t => t.pay_method === "QRIS").reduce((s, t) => s + t.total, 0);
          const transferIn = safeTxs.filter(t => t.pay_method === "Transfer Bank").reduce((s, t) => s + t.total, 0);
          const cashCount = safeTxs.filter(t => t.pay_method === "Cash").length;
          const qrisCount = safeTxs.filter(t => t.pay_method === "QRIS").length;
          const transferCount = safeTxs.filter(t => t.pay_method === "Transfer Bank").length;
          const txCount = safeTxs.length;
          const nonCash = rev - cashIn;

          // Ambil semua kasir yang terlibat
          const involved = new Set();
          safeTxs.forEach(t => {
            if (t.cashier_name) involved.add(t.cashier_name);
            if (t.served_by) involved.add(t.served_by);
          });
          const involvedCashiers = Array.from(involved).join(", ");

          const { data: sess, error: sessError } = await db.from("cash_sessions").select("*").eq("id", sid).single();
          if (sessError && sessError.code !== "PGRST116") throw sessError;
          const openAmt = sess?.opening_amount || 0;
          const expCash = openAmt + cashIn;
          setModal({ type: "closeSess", sid, rev, cashIn, qrisIn, transferIn, qrisCount, transferCount, nonCash, expCash, openAmt, txCount, cashCount, cashier: sess?.cashier_name || "Kasir", sessionStart: sess?.created_at, involvedCashiers, openedBy: sess?.opened_by });
        } catch (e) {
          console.error(e);
          notify("Gagal: " + e.message);
          setModal(null);
        }
      };

      const processOnlineOrder = async (order) => {
        try {
          const rawItems = order.items_json || [];
          const itemsWithPrices = rawItems.map(x => ({
            ...x,
            normalPrice: x.normalPrice || x.price || 0,
            price: x.price || 0
          }));
          setCart(itemsWithPrices);
          if (order.customer_type === "Member" && order.customer_id_input) {
            const idInput = order.customer_id_input.toLowerCase();
            const cust = customers.find(c => (c.phone || "").includes(idInput) || (c.customer_code || "").toLowerCase() === idInput);
            if (cust) setCustomer(cust.id);
          } else {
            setCustomer("");
          }
          setNotes(`Order ID: ${order.order_code}\nNama: ${order.customer_name} (${order.customer_type})\nID/HP: ${order.customer_id_input || '-'}\nPengiriman: ${order.shipping_method}\n\n${order.notes || ""}`);
          setModal(null);
          setActiveOnlineOrder(order.id);
          await db.from("online_orders").update({ status: "processed" }).eq("id", order.id);
          loadOnlineOrders();
          notify("Pesanan dimuat ke keranjang!");

            total_transactions: modal.txCount || 0, 
            total_revenue: modal.rev, 
            total_cash: modal.cashIn, 
            total_qris: modal.qrisIn,
            total_transfer: modal.transferIn,
            total_cash_count: modal.cashCount,
            total_qris_count: modal.qrisCount,
            total_transfer_count: modal.transferCount,
            total_non_cash: modal.nonCash, 
            expected_cash: modal.expCash, 
            closing_amount: actCashNum, 
            difference: diff,
            closing_cashier: closingCashier || modal.cashier,
            involved_cashiers: modal.involvedCashiers
          };
          const { error } = await db.from("cash_sessions").update({ 
            status: "closed", 
            closed_at: new Date(), 
            closing_amount: actCashNum, 
            summary, 
            notes_close: notes 
          }).eq("id", modal.sid);
          if (error) throw error;
          notify("Sesi ditutup!"); onLogout();

        const calc = () => {
          const diff = Math.max(0, Math.floor((Date.now() - start.getTime()) / 1000));
          const h = Math.floor(diff / 3600), m = Math.floor((diff % 3600) / 60), s = diff % 60;
          setSessionDuration(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`);

          if (!fetched && user?.session_id) {

               if (data?.created_at) {
                 start = new Date(data.created_at);
               }
            } catch(e) {}

          calc();
          t = setInterval(calc, 1000);

                            <span>{x.qty}x {x.name}{x.vName ? ` (${x.vName})` : ''}</span>
                          </div>
                        ))}
                        <div className="font-bold text-gray-800 mt-2 border-t border-gray-200 pt-1">Catatan/Alamat:</div>
                        <div>Pengiriman: {o.shipping_method === 'pickup' ? 'Ambil di Toko' : 'Kirim (Ojol)'}</div>
                        {o.notes}
                      </div>
                      <div className="grid grid-cols-2 gap-2 mt-2">
                        {o.status === 'pending' && (
                          <button onClick={() => processOnlineOrder(o)} className="col-span-2 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold shadow-md transition-colors flex items-center justify-center gap-2">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 13l4 4L19 7"/></svg>
                            Proses ke Kasir
                          </button>
                        )}
                        {o.status === 'processed' && (
                          <div className="col-span-2 py-2 bg-blue-50 text-blue-600 border border-blue-100 rounded-xl font-bold text-[10px] uppercase tracking-widest text-center shadow-sm flex items-center justify-center gap-1.5 mb-2">
                             <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                             Sedang Diproses (Di Keranjang)
                          </div>
                        )}
                        <div className="flex gap-2">
                          <button onClick={() => {
                            const items = (o.items_json||[]).map(x => `${x.qty}x ${x.name}`).join(', ');
                            const msg = `Halo ${o.customer_name}, ini dari Azzahro mengenai pesanan Anda: ${o.order_code}\n\nItem: ${items}\nTotal: ${fmt(o.total_amount)}\n\nMohon ditunggu ya kak, pesanan sedang kami proses.`;
                            const wa = o.customer_id_input || o.phone || "";
                            window.open(`https://wa.me/${wa.replace(/[^0-9]/g,'')}?text=${encodeURIComponent(msg)}`);
                          }} className="flex-1 py-2.5 bg-green-50 text-green-700 hover:bg-green-100 rounded-xl font-bold text-[11px] border border-green-100 flex items-center justify-center gap-1.5 transition-colors">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                            Chat
                          </button>
                          {o.status === 'completed' ? (
                            <div className="flex-[1.5] py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest text-center bg-green-50 text-green-600 border border-green-100 shadow-sm flex items-center justify-center gap-1.5">
                               <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>
                               Selesai
                            </div>
                          ) : (
                            o.status !== 'cancelled' && (
                              <button onClick={() => { if(confirm('Batalkan pesanan ini?')) updateOnlineStatus(o.id, 'cancelled'); }} className="flex-1 py-2.5 bg-red-50 text-red-500 hover:bg-red-100 rounded-xl font-bold text-[11px] border border-red-100 flex items-center justify-center gap-1.5 transition-colors">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                                Batalkan
                              </button>
                            )
                          )}
                          {o.status === 'cancelled' && (
                            <div className="flex-1 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest text-center bg-gray-100 text-gray-400 border border-gray-200">
                               Dibatalkan
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </Modal>
          )}

          {showRedeem && selectedCustomer && (
            <Modal onClose={() => setShowRedeem(false)} title="Tukar Poin">
               <div className="space-y-4">
                 <div className="bg-brandLight p-4 rounded-2xl border border-brand/10 text-center">
                    <div className="text-xs font-bold text-brand/60 uppercase mb-1">Saldo Poin</div>
                    <div className="text-3xl font-black text-brand">⭐ {selectedCustomer.points}</div>
                    <div className="text-[10px] text-brand/50 mt-1 font-medium">1 Poin = Rp 100 Diskon</div>
                 </div>
                 <div>
                   <label className="block text-xs font-bold text-gray-500 mb-2 uppercase text-center">Pilih Jumlah Poin</label>
                   <div className="grid grid-cols-3 gap-2">
                     {[10, 20, 50, 100, 200, 500].filter(n => n <= selectedCustomer.points).map(n => (
                       <button key={n} onClick={() => { setPointsRedeemed(n); setShowRedeem(false); }} className="py-3 rounded-xl border-2 border-gray-100 font-black text-sm hover:border-brand hover:text-brand transition-all">
                         {n}
                       </button>
                     ))}
                   </div>
                 </div>
                 <div className="pt-2">
                    <label className="block text-xs font-bold text-gray-500 mb-2 uppercase">Custom Poin</label>
                    <div className="flex gap-2">
                      <input type="number" value={pointsRedeemed} onChange={e => {
                        const v = parseInt(e.target.value) || 0;
                        setPointsRedeemed(v > selectedCustomer.points ? selectedCustomer.points : v);
                      }} className="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl font-bold text-brand focus:outline-none" />
                      <button onClick={() => setShowRedeem(false)} className="px-6 bg-brand text-white font-bold rounded-xl text-sm">Gunakan</button>
                    </div>
                 </div>
                 <button onClick={() => { setPointsRedeemed(0); setShowRedeem(false); }} className="w-full py-3 text-red-500 font-bold text-xs">Batal / Reset Poin</button>
               </div>
            </Modal>
          )}
          
          {/* Floating Cart Button Mobile */}
          {!showCart && (
            <button onClick={() => setShowCart(true)} className="md:hidden fixed bottom-6 right-6 w-16 h-16 rounded-full text-white shadow-2xl flex flex-col items-center justify-center z-[150] active:scale-95 transition-transform" style={{ background: color }}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18"/><path d="M16 10a4 4 0 01-8 0"/></svg>
              {cart.length > 0 && <span className="text-[10px] font-bold mt-1 leading-none">{fmt(total)}</span>}
              {cart.length > 0 && <span className="absolute -top-1 -right-1 w-6 h-6 bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center border-2 border-white shadow-sm">{cart.reduce((s,x)=>s+x.qty,0)}</span>}
            </button>
          )}
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(null);
      const [cashiers, setCashiers] = useState([]);
      const [settings, setSettings] = useState(null);
      const [toast, setToast] = useState("");

      useEffect(() => {
        db.from("cashiers").select("*").eq("active", true).then(({ data }) => setCashiers(data || []));
        db.from("settings").select("*").then(({ data }) => { if (data) { const obj = {}; data.forEach(r => { obj[r.key] = r.value; }); setSettings(obj); } });
      }, []);

      const notify = msg => { setToast(msg); setTimeout(() => setToast(""), 2500); };

      if (!user) return <><PinPad onSuccess={setUser} cashiers={cashiers} settings={settings} notify={notify} /><Toast msg={toast} /></>;
      if (user.needs_open) return <><OpenSession cashiers={cashiers} onOpened={s => setUser({ ...user, needs_open: false, session_id: s.id, cashier_id: s.cashier_id, session_opened_at: s.created_at, name: s.cashier_name, opened_by: s.opened_by })} notify={notify} /><Toast msg={toast} /></>;
      return <><POS user={user} settings={settings} notify={notify} onLogout={() => setUser(null)} /><Toast msg={toast} /></>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
