    const applyPromos = (cart, promos) => {
      const now = new Date();
      const active = promos.filter(p => {
        if (!p.active) return false;
        if (p.start_date && new Date(p.start_date) > now) return false;
        if (p.end_date && new Date(p.end_date) < now) return false;
        return true;
      });
      const sub = cart.reduce((s, x) => s + x.price * x.qty, 0);
      let disc = 0, applied = [];
      active.forEach(pr => {
        if (pr.type === "discount") {
          if (pr.min_purchase && sub < pr.min_purchase) return;
          let d = pr.disc_type === "pct" ? sub * pr.disc_value / 100 : pr.disc_value;
          if (pr.max_discount && d > pr.max_discount) d = pr.max_discount;
          disc += d; applied.push({ name: pr.name, discount: d });
        }
        if (pr.type === "bundling") {
          if (!(pr.bundle_items || []).every(id => cart.find(x => x.id === id))) return;
          let d = pr.disc_type === "pct" ? sub * pr.disc_value / 100 : pr.disc_value;
          if (pr.max_discount && d > pr.max_discount) d = pr.max_discount;
          disc += d; applied.push({ name: pr.name, discount: d });
        }
      });
      return { discountTotal: disc, appliedPromos: applied };

    function BannerCarousel({ banners, color }) {
      const [idx, setIdx] = React.useState(0);

      useEffect(() => {
        if (!banners || banners.length <= 1) return;
        timerRef.current = setInterval(() => setIdx(i => (i + 1) % banners.length), 4000);
        return () => clearInterval(timerRef.current);

      if (!banners || banners.length === 0) return null;
      const b = banners[idx];
      const content = (
        <div className="relative w-full overflow-hidden" style={{ height: 280 }}>
          {b.image ? (
            <img src={b.image} alt={b.title || ''} className="w-full h-full object-cover" onError={e => e.target.style.display='none'} />

    function ProductDetailModal({ product, onClose, onAdd, fmt, color, waNum }) {
      const [selVariant, setSelVariant] = React.useState(null);
      if (!product) return null;
      const hasVariants = product.variants && product.variants.length > 0;
      const displayItem = selVariant || product;
      let bestPrice = (product.promo_price > 0 && product.promo_price < product.price) ? product.promo_price : product.price;
      let bestNormalPrice = product.price;
      
      if (hasVariants) {
        let min = Infinity;
        let minNormal = 0;
        for (const v of product.variants) {
          const vPrice = (v.promo_price > 0 && v.promo_price < v.price) ? v.promo_price : v.price;
          if (vPrice < min && vPrice > 0) {
            min = vPrice;
            minNormal = v.price;
          }
        }
        if (min !== Infinity) { bestPrice = min; bestNormalPrice = minNormal; }
        else bestPrice = 0;
      }
      
      const isBestPromo = bestPrice < bestNormalPrice && bestNormalPrice > 0;
      const bestPromoPct = isBestPromo ? Math.round(((bestNormalPrice - bestPrice) / bestNormalPrice) * 100) : 0;
      const hasAnyPromo = hasVariants ? product.variants.some(v => v.promo_price > 0 && v.promo_price < v.price) : (product.promo_price > 0 && product.promo_price < product.price);

                      <button key={i} onClick={() => !isOutOfStock && setSelVariant(v)} disabled={isOutOfStock} className={`text-left p-3 rounded-xl border-2 transition-all flex justify-between items-center ${isOutOfStock ? 'opacity-50 cursor-not-allowed bg-gray-50 border-gray-100' : selVariant?.sku === v.sku ? 'border-brand bg-brandLight' : 'border-gray-100 hover:border-gray-300 bg-white'}`}>

                      const itemPrice = itemPromo ? displayItem.promo_price : displayItem.price;
                      return (
                        <div>

                            {itemPrice > 0 ? fmt(itemPrice) : (displayItem.price > 0 ? fmt(displayItem.price) : "")}
                          </div>
                          {itemPromo && (
                            <div className="flex items-center gap-1.5 mt-0.5">
                              <span className="text-[11px] text-gray-400 line-through font-medium">{fmt(displayItem.price)}</span>
                              <span className="text-[10px] bg-green-500 text-white px-1.5 py-0.5 rounded font-bold leading-none">-{Math.round(((displayItem.price - itemPrice) / displayItem.price) * 100)}%</span>
                            </div>

    function App() {
      const [settings, setSettings] = useState({ store_name: "Toko Azzahro", store_tagline: "Pilihan Berkah dari Tanah Suci", store_logo: "", receipt_color: "#114232", wa_number: "6281234567890" });

                <p className="text-sm font-medium text-gray-500 mb-3">Produk tidak ditemukan</p>
                <button onClick={() => { setSearch(""); setCat("Semua"); }} className="text-xs font-bold px-4 py-2 rounded-xl border-2 text-brand border-brand hover:bg-brandLight transition-colors">Reset Filter</button>

                    const isPO = hasVariants ? p.variants.some(v => v.is_po) : p.is_po;
                    const hasAnyPromo = hasVariants ? p.variants.some(v => v.promo_price > 0 && v.promo_price < v.price) : (p.promo_price > 0 && p.promo_price < p.price);
                    const outOfStock = totalStock <= 0 && !isPO;

                    return <div key={p.id} onClick={() => !outOfStock && clickProd(p)} className={`bg-white rounded-2xl p-3 border border-gray-100 shadow-sm flex gap-3 group animate-fade-up ${outOfStock ? 'opacity-60 cursor-not-allowed' : 'cursor-pointer hover:border-brand/30'}`}>
                      <div className="w-24 h-24 rounded-xl overflow-hidden shrink-0 bg-gray-50 relative">
                        <img src={p.image_url || `https://placehold.co/100x100/114232/white?text=${p.name.slice(0,2)}`} className="w-full h-full object-cover" />
                        {outOfStock && <div className="absolute inset-0 bg-black/50 flex items-center justify-center"><span className="text-white text-[9px] font-black">HABIS</span></div>}
                        {hasAnyPromo && !outOfStock && <div className="absolute top-0 left-0 bg-red-500 text-white text-[8px] font-black px-1.5 py-0.5 rounded-br-lg shadow-sm">PROMO</div>}
                      </div>
                      <div className="flex-1 flex flex-col justify-between py-1">
                        <div>
                          <div className="text-[9px] font-bold text-gray-400 uppercase tracking-wider mb-1">{p.brand || "Umum"}</div>
                          <h3 className="font-bold text-gray-800 text-sm line-clamp-1">{p.name}</h3>
                          <div className="text-[11px] text-gray-500 mt-1 line-clamp-2 leading-relaxed">{p.description || "Oleh-oleh terbaik dari Toko Azzahro."}</div>
                        </div>
                        <div className="flex items-center justify-between mt-2">
                          <div className="flex flex-col">
                            <span className="font-black text-base" style={{ color: hasAnyPromo ? '#ef4444' : color }}>
                              {bestPrice > 0 ? (hasVariants ? `Mulai ${fmt(bestPrice)}` : fmt(bestPrice)) : ""}
                            </span>
                            {isBestPromo && (
                              <div className="flex items-center gap-1.5 mt-0.5">
                                <span className="text-[11px] text-gray-400 line-through font-medium leading-none">{fmt(bestNormalPrice)}</span>
                                <span className="text-[10px] bg-green-500 text-white px-1.5 py-0.5 rounded font-bold leading-none">-{bestPromoPct}%</span>
                              </div>
                            )}
                          </div>
                          {!outOfStock && <div className="text-[9px]">{(isPO && !hasVariants) ? <span className="text-purple-500 font-bold">Pre-Order</span> : totalStock <= 5 ? <span className="text-orange-500 font-bold">Sisa {totalStock}</span> : null}</div>}
                        </div>
                      </div>
                    </div>;
                  })}
                </div>
              )}
          </div>

          {detailProd && <ProductDetailModal product={detailProd} onClose={() => setDetailProd(null)} onAdd={addFinal} fmt={fmt} color={color} waNum={waNum} />}

          {variantPicker && <Modal onClose={() => setVariantPicker(null)} title="Pilih Varian Produk">
            <div className="flex items-center gap-3 bg-gray-50 p-3 rounded-xl border border-gray-200 mb-4">
              <img src={variantPicker.image_url || `https://placehold.co/80/1a6b3c/white?text=${variantPicker.name.slice(0, 2)}`} className="w-12 h-12 rounded-lg object-cover" />
              <div><div className="font-bold text-gray-800 leading-tight">{variantPicker.name}</div><div className="text-xs text-gray-500 font-medium">Stok: {[variantPicker.stock, ...variantPicker.variants.map(v=>v.stock)].reduce((a,b)=>a+b,0)}</div></div>
            </div>
            <div className="grid grid-cols-1 gap-2">
              {variantPicker.variants.map((v, i) => <button key={i} onClick={() => addFinal(v)} className="text-left p-3 rounded-xl border-2 border-gray-100 hover:border-brand hover:bg-brandLight transition-all flex justify-between items-center group">
                <div><div className="font-bold text-gray-800 group-hover:text-brand">{v.variant_name}</div>
                <div className="flex gap-2 items-center mt-0.5">
                  {v.sku && <div className="text-[10px] text-gray-400 font-mono">SKU: {v.sku}</div>}
                  <div className="text-[10px] text-gray-500 font-medium">Tersedia</div>
                </div></div>
                <div className="flex flex-col items-end">
                  <span className="font-black text-sm" style={{ color: (v.promo_price && v.promo_price > 0 && v.promo_price < v.price) ? '#ef4444' : color }}>
                    {fmt((v.promo_price && v.promo_price > 0 && v.promo_price < v.price) ? v.promo_price : v.price)}
                  </span>
                  {v.promo_price && v.promo_price > 0 && v.promo_price < v.price && (
                    <div className="flex items-center gap-1.5 mt-0.5">
                      <span className="text-[10px] text-gray-400 line-through font-medium">{fmt(v.price)}</span>
                      <span className="text-[9px] bg-green-500 text-white px-1 py-0.5 rounded font-bold leading-none">-{Math.round(((v.price - v.promo_price) / v.price) * 100)}%</span>
                    </div>
                  )}
                </div>
              </button>)}
            </div>
          </Modal>}

          {showCart && (
            <Modal onClose={() => { setShowCart(false); setStep("catalog"); setShowHistory(false); }} title={showHistory ? "📜 Riwayat Pesanan" : step === "catalog" ? "🛒 Keranjang Belanja" : "📋 Detail Pesanan"}>
              {showHistory ? (
                <div className="flex flex-col gap-3">
                  {history.length === 0 ? (
                    <div className="text-center py-10 text-gray-400 italic">Belum ada riwayat pesanan.</div>
                  ) : (
                    history.map((h, i) => (
                      <div key={i} className="bg-gray-50 p-4 rounded-2xl border border-gray-100 flex justify-between items-center">
                        <div>
                          <div className="text-xs font-black text-brand mb-0.5">{h.code}</div>
                          <div className="text-[10px] text-gray-500">{new Date(h.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
                        </div>
                        <div className="font-extrabold text-sm text-gray-800">{fmt(h.total)}</div>
                      </div>
                    ))
                  )}
                  <button onClick={() => setShowHistory(false)} className="w-full mt-4 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold text-sm">Kembali</button>
                </div>
              ) : step === "catalog" && (
                <>
                  {cart.length === 0 ? (
                    <div className="text-center py-12 flex flex-col items-center">
                      <div className="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-4">
                        <svg className="w-10 h-10 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                      </div>
                      <h4 className="font-bold text-gray-700">Keranjang Kosong</h4>
                      <p className="text-sm text-gray-500 mt-1">Belum ada produk yang ditambahkan.</p>
                    </div>
                  ) : (
                    <div className="flex flex-col">
                      <div className="max-h-[50vh] overflow-y-auto pr-1 flex flex-col gap-3">
                        {cart.map(x => (
                          <div key={x.ckey} className="flex items-center gap-3 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm">
                            <img src={x.image_url || `https://placehold.co/80x80/1a6b3c/white?text=?`} className="w-14 h-14 rounded-xl object-cover" onError={e => e.target.src = `https://placehold.co/80x80/1a6b3c/white?text=?`} />
                            <div className="flex-1 min-w-0">
                              <h4 className="text-sm font-bold text-gray-800 truncate">{x.name}</h4>
                              <div className="flex flex-col mt-0.5">
                                <span className="text-sm font-extrabold" style={{ color }}>{fmt(x.price)}</span>
                                {x.normalPrice > x.price && (
                                  <div className="flex items-center gap-1.5 mt-0.5">
                                    <span className="text-[10px] text-gray-400 line-through font-medium">{fmt(x.normalPrice)}</span>
                                    <span className="text-[9px] bg-green-500 text-white px-1 py-0.5 rounded font-bold leading-none">-{Math.round(((x.normalPrice - x.price) / x.normalPrice) * 100)}%</span>
                                  </div>
                                )}
                              </div>
                            </div>
                            <div className="flex items-center gap-2 bg-gray-50 p-1 rounded-xl border border-gray-100">
                              <button onClick={() => updQty(x.ckey, -1)} className="w-7 h-7 flex items-center justify-center rounded-lg bg-white text-gray-600 shadow-sm hover:bg-gray-50 transition-colors font-bold">−</button>
                              <span className="text-sm font-bold w-4 text-center">{x.qty}</span>
                              <button onClick={() => updQty(x.ckey, 1)} className="w-7 h-7 flex items-center justify-center rounded-lg text-white shadow-sm transition-colors font-bold" style={{ background: color }}>+</button>
                            </div>
                          </div>
                        ))}
                      </div>

                      <div className="mt-5 pt-4 border-t border-dashed border-gray-200">
                        {finalDiscount > 0 && (
                          <div className="bg-green-50 rounded-xl p-3 mb-3 border border-green-100 flex justify-between items-center">
                            <span className="text-xs text-green-700 font-bold">Total Hemat Belanja</span>
                            <span className="text-sm font-black text-green-700">-{fmt(finalDiscount)}</span>
                          </div>
                        )}

                        {finalDiscount > 0 && (
                          <div className="flex justify-between text-sm text-gray-500 mb-1 font-medium">
                            <span>Subtotal</span><span className="line-through">{fmt(subtotalNormal)}</span>
                          </div>
                        )}
                        <div className="flex justify-between items-center mt-2 pt-2">
                          <span className="font-bold text-gray-600">Total</span>
                          <span className="font-extrabold text-2xl" style={{ color }}>{fmt(total)}</span>
                        </div>
                      </div>
                      <div className="flex flex-col gap-2 mt-6">
                        <button onClick={() => setStep("checkout")} className="w-full py-3.5 bg-gold hover:bg-[#c29d2f] text-dark border-none rounded-xl cursor-pointer font-bold text-base shadow-md transition-transform active:scale-[0.98]">
                          Lanjut Pesan →
                        </button>
                        <button onClick={() => setShowHistory(true)} className="w-full py-2 text-brand font-bold text-xs hover:underline uppercase tracking-widest">
                          Lihat Riwayat Pesanan
                        </button>
                      </div>
                    </div>
                  )}
                </>
              )}

              {step === "checkout" && (
                <div className="flex flex-col gap-4">
                  <div className="bg-brandLight rounded-2xl p-4 border" style={{ borderColor: `${color}33`, backgroundColor: `${color}08` }}>
                    <div className="text-sm font-semibold" style={{ color }}>Total Pembayaran ({cartCount} produk)</div>
                    <div className="flex items-baseline gap-2 mt-1">
                      <div className="font-extrabold text-2xl" style={{ color }}>{fmt(total)}</div>
                      {finalDiscount > 0 && <div className="text-xs text-gray-400 line-through font-bold">{fmt(subtotalNormal)}</div>}
                    </div>
                    {finalDiscount > 0 && <div className="text-[10px] font-black mt-1 text-green-600 uppercase tracking-widest">Kamu hemat {fmt(finalDiscount)}! 🥳</div>}
                  </div>

                  <div className="max-h-40 overflow-y-auto space-y-2 border-b border-gray-100 pb-4">
                    {cart.map(x => (
                      <div key={x.ckey} className="flex justify-between text-xs">
                        <span className="font-semibold text-gray-700">{x.qty}x {x.name}{x.vName ? ` (${x.vName})` : ''}</span>
                        <span className="text-gray-500 font-bold">{fmt(x.price * x.qty)}</span>
                      </div>
                    ))}
                  </div>

                  <div className="space-y-3">
                    <div>
                      <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wide">Jenis Pelanggan *</label>
                      <select value={orderForm.type} onChange={e => setOrderForm(p => ({ ...p, type: e.target.value, name: e.target.value === 'Member' ? '-' : '', phone: e.target.value === 'Member' ? '-' : '', address: e.target.value === 'Member' ? '-' : '' }))} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-bold focus:outline-none focus:ring-2 focus:border-transparent transition-all" style={{ '--tw-ring-color': color }}>
                        <option value="Umum">Umum</option>
                        <option value="Member">Member Azzahro</option>
                      </select>
                    </div>
                    {orderForm.type === "Member" && (
                      <div>
                        <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wide">No. HP / ID Member *</label>
                        <input value={orderForm.customer_id_input} onChange={async e => {
                          const val = e.target.value;
                          setOrderForm(p => ({ ...p, customer_id_input: val }));
                          if (val.length >= 4) {
                            const { data } = await db.from("customers").select("name").or(`phone.eq.${val},customer_code.eq.${val}`).limit(1).maybeSingle();
                            if (data) setOrderForm(p => ({ ...p, name: data.name }));
                            else setOrderForm(p => ({ ...p, name: "-" }));
                          } else {
                            setOrderForm(p => ({ ...p, name: "-" }));
                          }
                        }} placeholder="08xxx / AZR-xxx" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent transition-all" style={{ '--tw-ring-color': color }} />
                        {orderForm.name && orderForm.name !== "-" && orderForm.type === "Member" && (
                          <div className="text-xs text-green-600 font-bold mt-1">Ditemukan: {orderForm.name}</div>
                        )}
                      </div>
                    )}
                    {orderForm.type !== "Member" && (
                      <>
                        <div>
                          <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wide">Nama Lengkap *</label>
                          <input value={orderForm.name} onChange={e => setOrderForm(p => ({ ...p, name: e.target.value }))} type="text" placeholder="Masukkan nama Anda" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent transition-all" style={{ '--tw-ring-color': color }} />
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wide">No. HP / WA *</label>
                          <input value={orderForm.phone} onChange={e => setOrderForm(p => ({ ...p, phone: e.target.value }))} type="tel" placeholder="08xxxxxxxxxx" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent transition-all" style={{ '--tw-ring-color': color }} />
                        </div>
                      </>
                    )}

                    <div>
                      <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wide">Catatan Tambahan</label>
                      <input value={orderForm.notes} onChange={e => setOrderForm(p => ({ ...p, notes: e.target.value }))} type="text" placeholder="Opsional, e.g. kurma dipisah" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent transition-all" style={{ '--tw-ring-color': color }} />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wide">Opsi Pengiriman *</label>
                      <select value={orderForm.shipping} onChange={e => setOrderForm(p => ({ ...p, shipping: e.target.value }))} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-bold focus:outline-none focus:ring-2 focus:border-transparent transition-all" style={{ '--tw-ring-color': color }}>
                        <option value="pickup">Ambil di Toko</option>
                        <option value="ojol">Kirim (Ojol dipesan sendiri / manual)</option>
                      </select>
                    </div>
                  </div>

                  <div className="flex gap-3 mt-4 pt-4 border-t border-gray-100">
                    <button onClick={() => setStep("catalog")} className="flex-1 py-3.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl font-bold text-sm transition-colors">
                      ← Kembali
                    </button>
                    <button onClick={sendOrder} className="flex-[2] py-3.5 bg-[#25D366] hover:bg-[#20bd5a] text-white rounded-xl font-bold text-sm shadow-md transition-all flex justify-center items-center gap-2">
                      <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.1.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-5.824 4.74-10.563 10.581-10.563 5.824 0 10.564 4.741 10.564 10.564 0 5.824-4.74 10.564-10.564 10.564z" /></svg>
                      Kirim Pesanan WA
                    </button>
                  </div>
                </div>
              )}
            </Modal>
          )}

          {orderSuccess && (
            <Modal onClose={() => setOrderSuccess(null)} title="🎉 Pesanan Terkirim!">
              <div className="text-center py-4">
                <div className="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-4">
                  <svg className="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h4 className="font-black text-gray-800 text-xl mb-1">Terima Kasih!</h4>
                <p className="text-sm text-gray-500 mb-6">Pesanan Anda telah kami terima dengan kode:</p>
                
                <div className="bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl p-4 mb-6">
                  <div className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Kode Pesanan Anda</div>
                  <div className="text-3xl font-black text-brand tracking-wider">{orderSuccess.code}</div>
                </div>

                <div className="bg-brandLight p-4 rounded-2xl border border-brand/10 text-left mb-6">
                  <p className="text-xs text-brand font-medium leading-relaxed">
                    Kami akan segera mengonfirmasi pesanan Anda melalui nomor WhatsApp yang telah dicantumkan. Pastikan nomor Anda aktif.
                  </p>
                </div>

                <div className="flex flex-col gap-3">
                  <button onClick={() => { window.open(orderSuccess.waLink); setOrderSuccess(null); }} className="w-full py-4 bg-[#25D366] hover:bg-[#20bd5a] text-white rounded-2xl font-bold text-base shadow-lg transition-all flex items-center justify-center gap-2">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    Hubungi via WhatsApp
                  </button>
                  <button onClick={() => setOrderSuccess(null)} className="w-full py-4 text-gray-500 font-bold text-sm">Tutup</button>
                </div>
              </div>
            </Modal>
          )}

          {/* Footer */}
          <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 px-5 py-3 flex justify-between items-center shadow-[0_-4px_20px_rgba(0,0,0,0.03)] z-40 rounded-t-2xl">
            <span className="text-xs text-gray-500 font-medium">© {new Date().getFullYear()} {settings.store_name}</span>
            <a href="tentangkami.html" className="text-xs font-bold text-brand hover:underline">Tentang Kami →</a>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
