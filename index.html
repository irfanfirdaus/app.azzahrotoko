<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Toko Azzahro — Oleh-Oleh Haji & Umroh</title>
  <meta name="description"
    content="Toko oleh-oleh haji dan umroh terpercaya. Kurma, Air Zamzam, Sajadah, Tasbih dan lainnya." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: '#114232',
            brandLight: '#EDF2F0',
            gold: '#D4AF37',
            goldLight: '#FDF8E7',
            dark: '#0A2517',
            grayLight: '#F8F9FB',
          },
          animation: {
            'fade-up': 'fadeUp 0.3s ease-out',
            'spin-slow': 'spin 1s linear infinite',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Hide scrollbar for category scroll */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body class="bg-grayLight text-gray-800 font-sans antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = "https://xliwxtakluemverkgwrv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsaXd4dGFrbHVlbXZlcmtnd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjEzNTQsImV4cCI6MjA5MjA5NzM1NH0.XaP6ad5rvhA8EMlCSGy6FIoNltBMiDwQ4fLxe9BwVy8";
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { useState, useEffect, useRef } = React;

    const CATS = ["Semua", "Air Zamzam", "Kurma", "Tasbih", "Sajadah", "Parfum", "Peci & Mukena", "Lainnya"];
    const fmt = n => new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", minimumFractionDigits: 0 }).format(n);

    const applyPromos = (cart, promos) => {
      const now = new Date();
      const active = promos.filter(p => {
        if (!p.active) return false;
        if (p.start_date && new Date(p.start_date) > now) return false;
        if (p.end_date && new Date(p.end_date) < now) return false;
        return true;
      });
      const sub = cart.reduce((s, x) => s + x.price * x.qty, 0);
      let disc = 0, applied = [];
      active.forEach(pr => {
        if (pr.type === "discount") {
          if (pr.min_purchase && sub < pr.min_purchase) return;
          let d = pr.disc_type === "pct" ? sub * pr.disc_value / 100 : pr.disc_value;
          if (pr.max_discount && d > pr.max_discount) d = pr.max_discount;
          disc += d; applied.push({ name: pr.name, discount: d });
        }
        if (pr.type === "bundling") {
          if (!(pr.bundle_items || []).every(id => cart.find(x => x.id === id))) return;
          let d = pr.disc_type === "pct" ? sub * pr.disc_value / 100 : pr.disc_value;
          if (pr.max_discount && d > pr.max_discount) d = pr.max_discount;
          disc += d; applied.push({ name: pr.name, discount: d });
        }
      });
      return { discountTotal: disc, appliedPromos: applied };
    };

    function Spinner() { return <div className="flex items-center justify-center p-10"><div className="w-8 h-8 border-4 border-gray-200 border-t-brand rounded-full animate-spin"></div></div>; }

    function Modal({ children, onClose, title }) {
      return (
        <div className="fixed inset-0 bg-black/50 z-[200] flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity" onClick={onClose}>
          <div className="bg-white rounded-t-2xl sm:rounded-2xl p-5 w-full max-w-md max-h-[90vh] overflow-y-auto animate-fade-up shadow-2xl" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-5">
              <h3 className="font-bold text-lg text-gray-900">{title}</h3>
              <button onClick={onClose} className="p-2 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors text-gray-500">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
              </button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function App() {
      const [settings, setSettings] = useState({ store_name: "Toko Azzahro", store_tagline: "Pilihan Berkah dari Tanah Suci", store_logo: "", receipt_color: "#1a6b3c", wa_number: "6281234567890" });
      const [products, setProducts] = useState([]);
      const [promos, setPromos] = useState([]);
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState("");
      const [cat, setCat] = useState("Semua");
      const [viewMode, setViewMode] = useState("grid");
      const [cart, setCart] = useState([]);
      const [showCart, setShowCart] = useState(false);
      const [orderForm, setOrderForm] = useState({ name: "", phone: "", address: "", method: "ringkasan" });
      const [step, setStep] = useState("catalog");
      const [variantPicker, setVariantPicker] = useState(null);
      const [toast, setToast] = useState("");

      useEffect(() => { loadAll(); }, []);

      const loadAll = async () => {
        setLoading(true);
        const [p, pr, s] = await Promise.all([
          db.from("products").select("*").eq("active", true).order("name"),
          db.from("promos").select("*").eq("active", true),
          db.from("settings").select("*"),
        ]);
        setProducts(p.data || []);
        setPromos(pr.data || []);
        if (s.data?.length) { const obj = { ...settings }; s.data.forEach(r => { obj[r.key] = r.value; }); setSettings(obj); }
        setLoading(false);
      };

      const notify = msg => { setToast(msg); setTimeout(() => setToast(""), 2500); };
      const color = settings.receipt_color || "#114232";
      const waNum = settings.wa_number || "6281234567890";

      const filtered = products.filter(p => (cat === "Semua" || p.category === cat) && (p.name.toLowerCase().includes(search.toLowerCase()) || (p.brand || "").toLowerCase().includes(search.toLowerCase())));

      const addFinal = (p, v = null) => {
        const ckey = v ? `${p.id}_${v.name}` : String(p.id);
        const price = v ? v.price : p.price;
        const name = v ? `${p.name} (${v.name})` : p.name;
        setCart(prev => { const ex = prev.find(x => x.ckey === ckey); return ex ? prev.map(x => x.ckey === ckey ? { ...x, qty: x.qty + 1 } : x) : [...prev, { ...p, ckey, name, price, qty: 1 }]; });
        setVariantPicker(null); notify(`${name} ditambahkan`);
      };
      const handleClick = p => { if ((p.stock || 0) <= 0) return notify("Stok habis!"); if (p.variants && p.variants.length > 0) setVariantPicker(p); else addFinal(p); };
      const updQty = (ckey, d) => setCart(prev => prev.map(x => x.ckey === ckey ? { ...x, qty: Math.max(0, x.qty + d) } : x).filter(x => x.qty > 0));
      const subtotal = cart.reduce((s, x) => s + x.price * x.qty, 0);
      const { discountTotal, appliedPromos } = applyPromos(cart, promos);
      const total = Math.max(0, subtotal - discountTotal);
      const cartCount = cart.reduce((s, x) => s + x.qty, 0);

      const sendOrder = () => {
        if (!orderForm.name) return notify("Nama wajib diisi!");
        const items = cart.map(x => `• ${x.name} x${x.qty} = ${fmt(x.price * x.qty)}`).join("\n");
        const promoLines = appliedPromos.length > 0 ? `\n🏷️ Promo:\n${appliedPromos.map(p => `• ${p.name}: -${fmt(p.discount)}`).join("\n")}` : "";
        const msg = orderForm.method === "ringkasan"
          ? `🛒 *PESANAN BARU*\n\n*Nama:* ${orderForm.name}\n*HP:* ${orderForm.phone || "-"}\n*Alamat:* ${orderForm.address || "-"}\n\n*Detail:*\n${items}${promoLines}\n\n*Total: ${fmt(total)}*\n\nTerima kasih 🙏`
          : `Halo, saya ingin memesan:\n${items}\nTotal: ${fmt(total)}\nNama: ${orderForm.name}`;
        window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`);
        setCart([]); setStep("catalog"); setShowCart(false); notify("Pesanan dikirim!");
      };

      return (
        <div className="min-h-screen max-w-md mx-auto relative shadow-sm bg-grayLight flex flex-col">
          {/* Toast */}
          {toast && (
            <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-dark text-white px-5 py-2.5 rounded-full z-[9999] text-sm font-medium shadow-xl whitespace-nowrap animate-fade-up">
              {toast}
            </div>
          )}

          {/* Header */}
          <div className="sticky top-0 z-50 rounded-b-2xl shadow-md transition-all" style={{ background: `linear-gradient(135deg, ${color}ee, ${color})` }}>
            <div className="p-4">
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-3">
                  {settings.store_logo && <img src={settings.store_logo} alt="logo" className="h-10 w-10 bg-white/20 p-1 rounded-xl object-contain" onError={e => e.target.style.display = "none"} />}
                  <div>
                    <h1 className="font-extrabold text-white text-lg tracking-tight leading-tight">{settings.store_name}</h1>
                    <p className="text-white/80 text-xs font-medium">{settings.store_tagline || "Pilihan Berkah dari Tanah Suci"}</p>
                  </div>
                </div>
                <button onClick={() => setShowCart(true)} className="relative p-2.5 bg-white/10 hover:bg-white/20 transition-colors rounded-xl text-white flex items-center justify-center">
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                  {cartCount > 0 && <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full ring-2 ring-brand border-none shadow-sm">{cartCount}</span>}
                </button>
              </div>

              <div className="flex gap-2">
                <div className="relative flex-1">
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg className="w-4 h-4 text-white/60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                  </div>
                  <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Cari produk..." className="w-full pl-9 pr-4 py-2.5 bg-white/15 border border-white/10 text-white placeholder-white/60 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-white/30 transition-all" />
                </div>
                <button onClick={() => setViewMode(v => v === "grid" ? "list" : "grid")} className="p-2.5 bg-white/15 hover:bg-white/20 border border-white/10 rounded-xl text-white transition-colors flex items-center justify-center">
                  {viewMode === "grid" ? (
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                  ) : (
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                  )}
                </button>
              </div>
            </div>
          </div>

          {/* Categories */}
          <div className="px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar bg-grayLight sticky top-[120px] z-40">
            {CATS.map(c => (
              <button key={c} onClick={() => setCat(c)} className={`px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition-all shadow-sm ${cat === c ? 'text-white' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-100'}`} style={cat === c ? { background: color } : {}}>
                {c}
              </button>
            ))}
          </div>

          {/* Products */}
          <div className="px-4 pb-24 flex-1">
            {loading ? <Spinner /> : filtered.length === 0 ? <div className="text-center text-gray-400 py-10 text-sm font-medium bg-white rounded-2xl border border-gray-100 mt-2">Produk tidak ditemukan</div> :
              viewMode === "grid" ? (
                <div className="grid grid-cols-2 gap-3 mt-1">
                  {filtered.map(p => (
                    <div key={p.id} className="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md border border-gray-100 transition-all group flex flex-col">
                      <div className="relative aspect-square overflow-hidden bg-gray-50">
                        <img src={p.image_url || `https://placehold.co/400x400/${color.slice(1)}/white?text=${encodeURIComponent(p.name.slice(0, 4))}`} alt={p.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" onError={e => e.target.src = `https://placehold.co/400x400/1a6b3c/white?text=${encodeURIComponent(p.name.slice(0, 4))}`} />
                        {(p.stock || 0) <= 0 && <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center text-white font-bold text-xs tracking-widest">HABIS</div>}
                        {p.variants && p.variants.length > 0 && <div className="absolute top-2 right-2 bg-blue-500/90 backdrop-blur-sm text-white rounded-full px-2 py-0.5 text-[10px] font-bold shadow-sm">{p.variants.length} varian</div>}
                      </div>
                      <div className="p-3 flex flex-col flex-1">
                        <div className="text-[10px] text-gray-400 mb-0.5 uppercase font-medium tracking-wide">{p.brand || 'Umum'}{p.weight ? ` · ${p.weight}${p.weight_unit}` : ""}</div>
                        <h3 className="font-bold text-gray-800 text-sm leading-snug mb-1 line-clamp-2">{p.name}</h3>
                        <div className="flex-1"></div>
                        <div className="font-extrabold text-[15px] mb-2" style={{ color }}>{fmt(p.price)}</div>
                        <button onClick={() => handleClick(p)} disabled={(p.stock || 0) <= 0} className="w-full py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1" style={(p.stock || 0) > 0 ? { background: `${color}15`, color: color } : { background: '#f3f4f6', color: '#9ca3af', cursor: 'not-allowed' }}>
                          {(p.stock || 0) > 0 ? (p.variants && p.variants.length > 0 ? "Pilih Varian" : "+ Keranjang") : "Stok Habis"}
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div className="flex flex-col gap-3 mt-1">
                  {filtered.map(p => (
                    <div key={p.id} className="bg-white rounded-2xl p-3 flex gap-3 shadow-sm border border-gray-100 items-center">
                      <div className="relative w-20 h-20 shrink-0">
                        <img src={p.image_url || `https://placehold.co/80x80/1a6b3c/white?text=${encodeURIComponent(p.name.slice(0, 4))}`} alt={p.name} className="w-full h-full rounded-xl object-cover" onError={e => e.target.src = `https://placehold.co/80x80/1a6b3c/white?text=${encodeURIComponent(p.name.slice(0, 4))}`} />
                        {(p.stock || 0) <= 0 && <div className="absolute inset-0 bg-black/60 rounded-xl flex items-center justify-center text-white font-bold text-[8px] tracking-wider">HABIS</div>}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="text-[10px] text-gray-400 uppercase font-medium tracking-wide">{p.brand || 'Umum'}{p.weight ? ` · ${p.weight}${p.weight_unit}` : ""}</div>
                        <h3 className="font-bold text-gray-800 text-sm truncate">{p.name}</h3>
                        <p className="text-[11px] text-gray-500 line-clamp-1 mt-0.5">{p.description}</p>
                        {p.variants && p.variants.length > 0 && <div className="text-[10px] text-blue-500 font-medium mt-0.5">+{p.variants.length} varian</div>}
                        <div className="flex justify-between items-center mt-2">
                          <span className="font-extrabold text-[15px]" style={{ color }}>{fmt(p.price)}</span>
                          <button onClick={() => handleClick(p)} disabled={(p.stock || 0) <= 0} className="px-4 py-1.5 rounded-xl text-xs font-bold transition-all" style={(p.stock || 0) > 0 ? { background: `${color}15`, color: color } : { background: '#f3f4f6', color: '#9ca3af', cursor: 'not-allowed' }}>
                            {(p.stock || 0) > 0 ? (p.variants && p.variants.length > 0 ? "Varian" : "+ Beli") : "Habis"}
                          </button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
          </div>

          {/* Variant Picker Modal */}
          {variantPicker && (
            <Modal onClose={() => setVariantPicker(null)} title={`Pilih Varian`}>
              <div className="mb-4">
                <h4 className="font-bold text-gray-800 text-lg">{variantPicker.name}</h4>
                <p className="text-sm text-gray-500 mt-1">Pilih salah satu varian yang tersedia</p>
              </div>
              <div className="p-4 space-y-2 max-h-[60vh] overflow-y-auto pb-safe">
                {(!variantPicker.variants || variantPicker.variants.length === 0) && (
                  <button onClick={() => addFinal(variantPicker)} className="w-full text-left p-4 rounded-xl border border-gray-100 bg-gray-50 hover:bg-gray-100 transition-colors flex justify-between items-center group">
                    <div>
                      <div className="font-semibold text-gray-800 group-hover:text-gray-900">Standar</div>
                      <div className="text-xs text-gray-500 mt-0.5">Tanpa varian</div>
                    </div>
                    <span className="font-extrabold text-[15px]" style={{ color }}>{fmt(variantPicker.price)}</span>
                  </button>
                )}
                {(variantPicker.variants || []).map((v, i) => (
                  <button key={i} onClick={() => addFinal(variantPicker, v)} className="w-full text-left p-4 rounded-xl border border-gray-100 bg-gray-50 hover:bg-gray-100 transition-colors flex justify-between items-center group">
                    <div>
                      <div className="font-semibold text-gray-800 group-hover:text-gray-900">{v.name}</div>
                      <div className="flex gap-2 items-center mt-0.5">
                        {v.sku && <div className="text-[10px] text-gray-400 font-mono">SKU: {v.sku}</div>}
                        <div className="text-[10px] text-gray-500">Stok: {v.stock}</div>
                      </div>
                    </div>
                    <span className="font-extrabold text-[15px]" style={{ color }}>{fmt(v.price)}</span>
                  </button>
                ))}
              </div>
            </Modal>
          )}

          {/* Cart Modal */}
          {showCart && (
            <Modal onClose={() => { setShowCart(false); setStep("catalog"); }} title={step === "catalog" ? "🛒 Keranjang Belanja" : "📋 Detail Pesanan"}>
              {step === "catalog" && (
                <>
                  {cart.length === 0 ? (
                    <div className="text-center py-12 flex flex-col items-center">
                      <div className="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-4">
                        <svg className="w-10 h-10 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                      </div>
                      <h4 className="font-bold text-gray-700">Keranjang Kosong</h4>
                      <p className="text-sm text-gray-500 mt-1">Belum ada produk yang ditambahkan.</p>
                    </div>
                  ) : (
                    <div className="flex flex-col">
                      <div className="max-h-[50vh] overflow-y-auto pr-1 flex flex-col gap-3">
                        {cart.map(x => (
                          <div key={x.ckey} className="flex items-center gap-3 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm">
                            <img src={x.image_url || `https://placehold.co/80x80/1a6b3c/white?text=?`} className="w-14 h-14 rounded-xl object-cover" onError={e => e.target.src = `https://placehold.co/80x80/1a6b3c/white?text=?`} />
                            <div className="flex-1 min-w-0">
                              <h4 className="text-sm font-bold text-gray-800 truncate">{x.name}</h4>
                              <div className="text-sm font-extrabold mt-0.5" style={{ color }}>{fmt(x.price)}</div>
                            </div>
                            <div className="flex items-center gap-2 bg-gray-50 p-1 rounded-xl border border-gray-100">
                              <button onClick={() => updQty(x.ckey, -1)} className="w-7 h-7 flex items-center justify-center rounded-lg bg-white text-gray-600 shadow-sm hover:bg-gray-50 transition-colors font-bold">−</button>
                              <span className="text-sm font-bold w-4 text-center">{x.qty}</span>
                              <button onClick={() => updQty(x.ckey, 1)} className="w-7 h-7 flex items-center justify-center rounded-lg text-white shadow-sm transition-colors font-bold" style={{ background: color }}>+</button>
                            </div>
                          </div>
                        ))}
                      </div>

                      <div className="mt-5 pt-4 border-t border-dashed border-gray-200">
                        {appliedPromos.length > 0 && (
                          <div className="bg-green-50 rounded-xl p-3 mb-3 border border-green-100">
                            {appliedPromos.map((ap, i) => (
                              <div key={i} className="flex justify-between text-xs text-green-700 font-semibold mb-1 last:mb-0">
                                <span>🏷️ {ap.name}</span>
                                <span>-{fmt(ap.discount)}</span>
                              </div>
                            ))}
                          </div>
                        )}

                        {discountTotal > 0 && (
                          <div className="flex justify-between text-sm text-gray-500 mb-1 font-medium">
                            <span>Subtotal</span><span>{fmt(subtotal)}</span>
                          </div>
                        )}
                        <div className="flex justify-between items-center mt-2 pt-2">
                          <span className="font-bold text-gray-600">Total</span>
                          <span className="font-extrabold text-2xl" style={{ color }}>{fmt(total)}</span>
                        </div>
                      </div>
                      <button onClick={() => setStep("checkout")} className="w-full mt-6 py-3.5 bg-gold hover:bg-[#c29d2f] text-dark border-none rounded-xl cursor-pointer font-bold text-base shadow-md transition-transform active:scale-[0.98]">
                        Lanjut Pesan →
                      </button>
                    </div>
                  )}
                </>
              )}

              {step === "checkout" && (
                <div className="flex flex-col gap-4">
                  <div className="bg-brandLight rounded-2xl p-4 border" style={{ borderColor: `${color}33`, backgroundColor: `${color}08` }}>
                    <div className="text-sm font-semibold" style={{ color }}>Total Pembayaran ({cartCount} produk)</div>
                    <div className="font-extrabold text-2xl mt-1" style={{ color }}>{fmt(total)}</div>
                    {discountTotal > 0 && <div className="text-xs font-bold mt-1" style={{ color }}>Hemat {fmt(discountTotal)} dengan promo!</div>}
                  </div>

                  <div className="space-y-3">
                    {[
                      { label: "Nama Lengkap *", key: "name", ph: "Masukkan nama Anda" },
                      { label: "No. HP / WA", key: "phone", ph: "08xxxxxxxxxx", type: "tel" },
                      { label: "Alamat Pengiriman", key: "address", ph: "Alamat lengkap (kosongkan jika ambil sendiri)" }
                    ].map(f => (
                      <div key={f.key}>
                        <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wide">{f.label}</label>
                        <input value={orderForm[f.key]} onChange={e => setOrderForm(p => ({ ...p, [f.key]: e.target.value }))} type={f.type || "text"} placeholder={f.ph} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent transition-all" style={{ '--tw-ring-color': color }} />
                      </div>
                    ))}
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wide mt-2">PILIH METODE PESAN VIA WA</label>
                    <div className="space-y-2">
                      {[
                        { id: "ringkasan", label: "📋 Kirim ringkasan ke WA toko", desc: "Detail produk dan total dikirim otomatis" },
                        { id: "langsung", label: "💬 Chat langsung WA toko", desc: "Buka chat biasa dengan admin" }
                      ].map(m => (
                        <div key={m.id} onClick={() => setOrderForm(p => ({ ...p, method: m.id }))} className={`border-2 rounded-xl p-3 cursor-pointer transition-all ${orderForm.method === m.id ? '' : 'bg-white border-gray-100 hover:border-gray-200'}`} style={orderForm.method === m.id ? { borderColor: color, backgroundColor: `${color}08` } : {}}>
                          <div className="font-bold text-sm text-gray-800">{m.label}</div>
                          <div className="text-xs text-gray-500 mt-1">{m.desc}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="flex gap-3 mt-4 pt-4 border-t border-gray-100">
                    <button onClick={() => setStep("catalog")} className="flex-1 py-3.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl font-bold text-sm transition-colors">
                      ← Kembali
                    </button>
                    <button onClick={sendOrder} className="flex-[2] py-3.5 bg-[#25D366] hover:bg-[#20bd5a] text-white rounded-xl font-bold text-sm shadow-md transition-all flex justify-center items-center gap-2">
                      <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.1.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-5.824 4.74-10.563 10.581-10.563 5.824 0 10.564 4.741 10.564 10.564 0 5.824-4.74 10.564-10.564 10.564z" /></svg>
                      Kirim Pesanan WA
                    </button>
                  </div>
                </div>
              )}
            </Modal>
          )}

          {/* Footer */}
          <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 px-5 py-3 flex justify-between items-center shadow-[0_-4px_20px_rgba(0,0,0,0.03)] z-40 rounded-t-2xl">
            <span className="text-xs text-gray-500 font-medium">© {new Date().getFullYear()} {settings.store_name}</span>
            <a href="kasir.html" className="text-xs font-bold transition-opacity hover:opacity-80" style={{ color }}>Login Admin →</a>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
