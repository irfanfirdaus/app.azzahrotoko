          {activeTab === 'opname' && <OpnamePanel products={products} color={color} notify={notify} onReload={onReload} />}
          {mediaPickerOpen && <MediaPickerModal onClose={() => setMediaPickerOpen(false)} onSelect={handleMediaSelect} settings={settings} notify={notify} />}
        </div>
      );
    }

    // ── PELANGGAN ────────────────────────────────────────────────
    function Pelanggan({ customers, transactions, notify, onReload, loading, color, settings }) {
      const [modal, setModal] = useState(null);
      const [form, setForm] = useState({ name: "", phone: "", email: "", address: "", city: "", birthdate: "", gender: "", notes: "", customer_code: "", identity_type: "KTP", identity_number: "", birthplace: "" });
      const [search, setSearch] = useState("");
      const [sortBy, setSortBy] = useState("date_desc");
      const [detail, setDetail] = useState(null);
      const [saving, setSaving] = useState(false);
      const [showMenu, setShowMenu] = useState(false);
      const [pointModal, setPointModal] = useState(null);
      const [pointAdjust, setPointAdjust] = useState({ amount: "", note: "" });
      const [pointLedger, setPointLedger] = useState([]);
      const fileRef = useRef();

      const custTx = id => transactions.filter(t => String(t.customer_id) === String(id));
      const custTotal = id => custTx(id).reduce((s, t) => s + t.total, 0);

      const filtered = useMemo(() => {
        let list = customers.filter(c => (c.name||"").toLowerCase().includes(search.toLowerCase()) || (c.phone||"").includes(search) || (c.customer_code||"").toLowerCase().includes(search.toLowerCase()));
        
        return list.sort((a, b) => {
          if (sortBy === "name_asc") return (a.name||"").localeCompare(b.name||"");
          if (sortBy === "name_desc") return (b.name||"").localeCompare(a.name||"");
          if (sortBy === "date_desc") return new Date(b.created_at || 0) - new Date(a.created_at || 0);
          if (sortBy === "date_asc") return new Date(a.created_at || 0) - new Date(b.created_at || 0);
          if (sortBy === "points_desc") return (b.points || 0) - (a.points || 0);
          if (sortBy === "tx_desc") return custTx(b.id).length - custTx(a.id).length;
          return 0;
        });
      }, [customers, search, sortBy, transactions]);

      const shareCard = (c) => {
        const baseUrl = window.location.href.split('/').slice(0, -1).join('/');
        const url = `${baseUrl}/daftar.html?phone=${c.phone}`;
        const text = `Halo ${c.name}, ini adalah kartu member ${settings?.store_name || 'Toko Azzahro'} Anda. Silakan simpan link ini:\n\n${url}`;
        
        if (navigator.share && /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
          navigator.share({ title: `Kartu Member ${settings?.store_name || 'Toko Azzahro'}`, text, url })
            .catch(() => {
              navigator.clipboard.writeText(text);
              notify("Link kartu disalin!");
            });
        } else {
          navigator.clipboard.writeText(text);
          notify("Link kartu disalin!");
        }
      };

      const generateCode = async () => {
        try {
          const { data, error } = await db.rpc('generate_customer_code');
          if (error) throw error;
          setForm(f => ({ ...f, customer_code: data }));
        } catch (e) {
          const now = new Date();
          const d = now.getFullYear().toString().slice(-2) + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
          const seq = String(customers.length + 1).padStart(4, '0');
          setForm(f => ({ ...f, customer_code: `AZR-${d}-${seq}` }));
        }
      };

      const loadPoints = async (cid) => {
        const { data } = await db.from("point_ledger").select("*").eq("customer_id", cid).order("created_at", { ascending: false });
        setPointLedger(data || []);
      };

      const adjustPoints = async () => {
        if (!pointAdjust.amount) return;
        setSaving(true);
        const { error } = await db.rpc('add_customer_points', { 
          p_customer_id: pointModal.id, 
          p_points: parseInt(pointAdjust.amount), 
          p_type: 'adjustment', 
          p_note: pointAdjust.note 
        });
        setSaving(false);
        if (error) {
          console.error("Adjustment error:", error);
          return notify("Gagal: " + error.message);
        }
        notify("Poin berhasil disesuaikan!");
        setPointModal(null); setPointAdjust({ amount: "", note: "" }); onReload();
      };

      const save = async () => {
        if (!form.name || !form.phone) return notify("Nama & HP wajib!");
        setSaving(true);
        let finalCode = form.customer_code;
        if (modal === "add" && !finalCode) {
           const now = new Date();
           const d = now.getFullYear().toString().slice(-2) + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
           const seq = String(customers.length + 1).padStart(4, '0');
           finalCode = `AZR-${d}-${seq}`;
        }
        const payload = { 
          name: form.name, phone: form.phone, email: form.email, address: form.address, city: form.city, 
          birthdate: form.birthdate || null, gender: form.gender, notes: form.notes, customer_code: finalCode,
          identity_type: form.identity_type, identity_number: form.identity_number, birthplace: form.birthplace
        };
        let error;
        if (modal === "add") { ({ error } = await db.from("customers").insert(payload)); if (!error) notify("Ditambahkan!"); }
        else { ({ error } = await db.from("customers").update(payload).eq("id", modal)); if (!error) notify("Diupdate!"); }
        setSaving(false); if (error) return notify("Gagal: " + error.message);
        setModal(null); onReload();
      };

      const del = async (id) => { const { error } = await db.from("customers").delete().eq("id", id); if (error) return notify("Gagal: " + error.message); notify("Dihapus!"); setDetail(null); onReload(); };
      const openEdit = c => { setDetail(null); setModal(c.id); setForm({ name: c.name, phone: c.phone, email: c.email || "", address: c.address || "", city: c.city || "", birthdate: c.birthdate || "", gender: c.gender || "", notes: c.notes || "", customer_code: c.customer_code || "", identity_type: c.identity_type || "KTP", identity_number: c.identity_number || "", birthplace: c.birthplace || "" }); };
      const copyRegisterUrl = () => { navigator.clipboard.writeText(window.location.origin + "/daftar.html"); notify("Link pendaftaran disalin!"); };
      const exportXLSX = () => { const ws = XLSX.utils.json_to_sheet(customers.map(c => ({ Nama: c.name, HP: c.phone, Email: c.email || "", TipeID: c.identity_type || "", NoID: c.identity_number || "", KotaLahir: c.birthplace || "", TglLahir: c.birthdate || "", Kelamin: c.gender || "", Alamat: c.address || "", Kota: c.city || "", Catatan: c.notes || "", TotalBelanja: custTotal(c.id), JmlTransaksi: custTx(c.id).length }))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Pelanggan"); XLSX.writeFile(wb, `pelanggan_${Date.now()}.xlsx`); notify("Diexport!"); setShowMenu(false); };
      const dlTemplate = () => { const ws = XLSX.utils.json_to_sheet([{ Nama: "Contoh Pelanggan", HP: "08123456789", Email: "email@contoh.com", TipeID: "KTP", NoID: "3301xxxxxxxxxxxx", KotaLahir: "Semarang", TglLahir: "1990-01-15", Kelamin: "Laki-laki", Alamat: "Jl. Contoh No. 1", Kota: "Semarang", Catatan: "Referensi, dll" }]); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Pelanggan"); XLSX.writeFile(wb, "template_pelanggan.xlsx"); notify("Template didownload!"); setShowMenu(false); };
      const importFile = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const wb = XLSX.read(e.target.result, { type: "binary" });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws);
            const imported = rows.map(r => ({ 
              name: r.Nama || "", 
              phone: String(r.HP || ""), 
              email: r.Email || "", 
              identity_type: r.TipeID || "KTP",
              identity_number: String(r.NoID || ""),
              birthplace: r.KotaLahir || "",
              birthdate: r.TglLahir || null, 
              gender: r.Kelamin || "", 
              address: r.Alamat || "", 
              city: r.Kota || "", 
              notes: r.Catatan || "" 
            })).filter(r => r.name && r.phone);
            let added = 0, skipped = 0;

    function PromoPage({ promos, products, notify, onReload, color }) {
      const [modal, setModal] = useState(null);
      const empty = { name: "", type: "discount", benefit_type: "discount", disc_type: "pct", disc_value: "", min_purchase: "", max_discount: "", start_date: "", end_date: "", bundle_items: [], free_bundle_items: [], promo_code: "", usage_limit: "", active: true };
      const [form, setForm] = useState(empty);
      const [saving, setSaving] = useState(false);
      const now = new Date();
      const isActive = p => { if (!p.active) return false; if (p.start_date && new Date(p.start_date) > now) return false; if (p.end_date && new Date(p.end_date) < now) return false; return true; };
      const toggleBundle = id => setForm(f => ({ ...f, bundle_items: (f.bundle_items||[]).includes(id) ? f.bundle_items.filter(x => x !== id) : [...(f.bundle_items||[]), id] }));
      const toggleFreeBundle = id => setForm(f => ({ ...f, free_bundle_items: (f.free_bundle_items||[]).includes(id) ? f.free_bundle_items.filter(x => x !== id) : [...(f.free_bundle_items||[]), id] }));

      const generatePromoCode = () => {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = 'PROMO-';
        for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
        setForm(f => ({ ...f, promo_code: code }));
      };

      const save = async () => {
        if (!form.name) return notify("Nama promo wajib!");
        if (form.type !== "bundling" || form.benefit_type !== "free_product") {
          if (!form.disc_value) return notify("Nilai diskon wajib!");
        }
        if (form.type === "voucher" && !form.promo_code) return notify("Kode voucher wajib!");
        setSaving(true);
        const payload = { 
          name: form.name, type: form.type, benefit_type: form.type === "bundling" ? form.benefit_type : "discount", 
          disc_type: form.disc_type, disc_value: parseFloat(form.disc_value) || 0, 
          min_purchase: parseFloat(form.min_purchase) || 0, max_discount: parseFloat(form.max_discount) || 0, 
          bundle_items: form.type === "bundling" ? (form.bundle_items || []) : [], 
          free_bundle_items: (form.type === "bundling" && form.benefit_type === "free_product") ? (form.free_bundle_items || []) : [],
          promo_code: form.type === "voucher" ? form.promo_code : null,
          usage_limit: form.type === "voucher" ? (parseInt(form.usage_limit) || 0) : 0,
          start_date: form.start_date || null, end_date: form.end_date || null, active: form.active 
        };
        let error;
        if (modal === "add") { ({ error } = await db.from("promos").insert(payload)); if (!error) notify("Promo ditambahkan!"); }
        else { ({ error } = await db.from("promos").update(payload).eq("id", modal)); if (!error) notify("Diupdate!"); }
        setSaving(false); if (error) return notify("Gagal: " + error.message);
        setModal(null); onReload();
      };
      const del = async (id) => { const { error } = await db.from("promos").delete().eq("id", id); if (error) return notify("Gagal: " + error.message); notify("Dihapus!"); onReload(); };
      const toggle = async (p) => { await db.from("promos").update({ active: !p.active }).eq("id", p.id); onReload(); };

        <div className="p-4">
          <button onClick={() => { setModal("add"); setForm({ ...empty }); }} className="w-full bg-brand text-white font-bold rounded-xl py-3.5 mb-5 shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">+ Buat Promo Baru</button>

          {promos.length === 0 && <div className="text-center text-gray-400 py-10 text-sm font-medium bg-white rounded-2xl border border-gray-100">Belum ada promo</div>}

              <div className="flex justify-between items-start mb-4 relative z-20">
                <div className="flex-1">
                  <div className="flex items-center gap-2 mb-1.5">
                    <span className="font-extrabold text-gray-800 text-base">{p.name}</span>
                    <span className={`px-2 py-0.5 rounded-md text-[9px] font-bold uppercase tracking-wider ${isActive(p) ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>{isActive(p) ? "Aktif" : "Nonaktif"}</span>
                  </div>
                  <div className="text-xs text-gray-500 font-medium flex items-center gap-1.5 flex-wrap">
                    <span className="bg-gray-50 px-1.5 py-0.5 rounded border border-gray-100">{p.type === "voucher" ? "🎟️ Voucher" : p.type === "discount" ? "💰 Diskon" : "📦 Bundling"}</span>
                    {p.type === "voucher" && <span className="font-mono text-brand font-bold">{p.promo_code}</span>}
                    {p.type === "voucher" && p.usage_limit > 0 && <span className="text-[10px] bg-brandLight text-brand px-1.5 py-0.5 rounded">Limit: {p.usage_limit}</span>}
                    
                    {p.benefit_type === "free_product" ? (
                      <span className="text-orange-600 font-bold">Gratis {(p.free_bundle_items || []).length} Produk</span>
                    ) : (
                      <span>{p.disc_type === "pct" ? `${p.disc_value}%` : `${fmt(p.disc_value)}`} off</span>
                    )}
                    
                    {p.min_purchase > 0 && <span>· min {fmt(p.min_purchase)}</span>}
                  </div>
                </div>
                <div className="flex gap-1.5 shrink-0">
                  <button onClick={() => { setModal(p.id); setForm({ ...empty, ...p, disc_value: String(p.disc_value), min_purchase: String(p.min_purchase || ""), max_discount: String(p.max_discount || ""), start_date: p.start_date ? p.start_date.slice(0, 16) : "", end_date: p.end_date ? p.end_date.slice(0, 16) : "", bundle_items: p.bundle_items || [], free_bundle_items: p.free_bundle_items || [] }); }} className="w-8 h-8 flex items-center justify-center bg-orange-50 hover:bg-orange-100 text-orange-600 rounded-lg transition-colors">✏️</button>
                  <button onClick={() => del(p.id)} className="w-8 h-8 flex items-center justify-center bg-red-50 hover:bg-red-100 text-red-500 rounded-lg transition-colors">✕</button>
                </div>
              </div>
              <button onClick={() => toggle(p)} className={`w-full py-2.5 rounded-xl text-xs font-bold transition-all relative z-20 border-2 ${p.active ? 'border-red-100 bg-red-50 text-red-600 hover:bg-red-100' : 'border-brandLight bg-white text-brand hover:bg-brandLight'}`}>{p.active ? "⏸ Nonaktifkan Promo" : "▶ Aktifkan Promo"}</button>
            </div>)}
          </div>

          {modal && <Modal onClose={() => setModal(null)} title={modal === "add" ? "Buat Promo" : "Edit Promo"}>
            <div className="space-y-4">
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Nama Promo *</label>

                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Tipe Promo</label>

                </div>
              </div>

                </div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Batas Pemakaian (Kuota)</label>
                <input value={form.usage_limit} onChange={e => setForm(f => ({ ...f, usage_limit: e.target.value }))} type="number" placeholder="0 = tanpa batas" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" />
              </div>}

              {form.type === "bundling" && <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Syarat Produk Bundling</label>
                <div className="max-h-48 overflow-y-auto border border-gray-200 rounded-xl p-2 bg-gray-50 space-y-1 mb-3">
                  {products.map(p => <div key={p.id} onClick={() => toggleBundle(p.id)} className={`flex items-center gap-3 p-2 cursor-pointer rounded-lg transition-colors border ${(form.bundle_items||[]).includes(p.id) ? 'bg-brandLight border-brand/30' : 'bg-white border-transparent hover:border-gray-200'}`}>
                    <div className={`w-5 h-5 rounded md border-2 flex items-center justify-center shrink-0 ${(form.bundle_items||[]).includes(p.id) ? 'border-brand bg-brand' : 'border-gray-300 bg-white'}`}>{(form.bundle_items||[]).includes(p.id) && <span className="text-white text-xs font-bold">✓</span>}</div>
                    <span className="text-sm font-medium text-gray-700 truncate">{p.name}</span>
                  </div>)}
                </div>
                
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Benefit Bundling</label>
                <div className="flex gap-2 mb-3">
                  {[{ id: "discount", label: "Diskon Harga" }, { id: "free_product", label: "Gratis Produk Lain" }].map(t => <button key={t.id} onClick={() => setForm(f => ({ ...f, benefit_type: t.id }))} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-colors border-2 ${form.benefit_type === t.id ? 'border-brand bg-brandLight text-brand' : 'border-gray-100 bg-white text-gray-500 hover:border-gray-200'}`}>{t.label}</button>)}
                </div>
                
                {form.benefit_type === "free_product" && <div>
                  <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">Pilih Produk Gratis</label>
                  <div className="max-h-48 overflow-y-auto border border-gray-200 rounded-xl p-2 bg-gray-50 space-y-1">
                    {products.map(p => <div key={p.id} onClick={() => toggleFreeBundle(p.id)} className={`flex items-center gap-3 p-2 cursor-pointer rounded-lg transition-colors border ${(form.free_bundle_items||[]).includes(p.id) ? 'bg-orange-50 border-orange-200' : 'bg-white border-transparent hover:border-gray-200'}`}>
                      <div className={`w-5 h-5 rounded md border-2 flex items-center justify-center shrink-0 ${(form.free_bundle_items||[]).includes(p.id) ? 'border-orange-500 bg-orange-500' : 'border-gray-300 bg-white'}`}>{(form.free_bundle_items||[]).includes(p.id) && <span className="text-white text-xs font-bold">✓</span>}</div>
                      <span className="text-sm font-medium text-gray-700 truncate">{p.name}</span>
                    </div>)}
                  </div>
                </div>}
              </div>}

              {(form.type !== "bundling" || form.benefit_type !== "free_product") && <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Besaran Diskon *</label>
                <div className="flex gap-2 mb-2">
                  {[{ id: "pct", label: "% Persen" }, { id: "nominal", label: "Rp Nominal" }].map(t => <button key={t.id} onClick={() => setForm(f => ({ ...f, disc_type: t.id }))} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-colors border-2 ${form.disc_type === t.id ? 'border-brand bg-brandLight text-brand' : 'border-gray-100 bg-white text-gray-500 hover:border-gray-200'}`}>{t.label}</button>)}
                </div>
                <input value={form.disc_value} onChange={e => setForm(f => ({ ...f, disc_value: e.target.value }))} type="number" placeholder={form.disc_type === "pct" ? "cth: 10" : "cth: 20000"} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" />
              </div>}
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Min. Belanja</label>
                  <input value={form.min_purchase} onChange={e => setForm(f => ({ ...f, min_purchase: e.target.value }))} type="number" placeholder="0 = tanpa batas" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Maks. Diskon</label>
                  <input value={form.max_discount} onChange={e => setForm(f => ({ ...f, max_discount: e.target.value }))} type="number" placeholder="0 = tanpa batas" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" />
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">Mulai (Opsional)</label>
                  <input value={form.start_date} onChange={e => setForm(f => ({ ...f, start_date: e.target.value }))} type="datetime-local" className="w-full px-3 py-3 bg-gray-50 border border-gray-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-brand/30" />
                </div>
                <div>
                  <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">Berakhir (Opsional)</label>
                  <input value={form.end_date} onChange={e => setForm(f => ({ ...f, end_date: e.target.value }))} type="datetime-local" className="w-full px-3 py-3 bg-gray-50 border border-gray-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-brand/30" />
                </div>
              </div>
              <div className="flex gap-3 pt-4 border-t border-gray-100 mt-2">
                <button onClick={() => setModal(null)} className="flex-1 py-3.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl font-bold text-sm transition-colors">Batal</button>
                <button onClick={save} disabled={saving} className="flex-[2] py-3.5 bg-gold hover:bg-[#c29d2f] text-dark rounded-xl font-bold text-sm shadow-md transition-all flex justify-center items-center gap-2">{saving ? "Menyimpan..." : "💾 Simpan Promo"}</button>
              </div>
            </div>
          </Modal>}
        </div>
      );
    }


    // ── LAPORAN ───────────────────────────────────────────────────
    function Laporan({ transactions, products, customers, notify, loading, color }) {
      const [tab, setTab] = useState("laporan");
      const [txDetail, setTxDetail] = useState(null);
      const [commRate, setCommRate] = useState(parseFloat(localStorage.getItem('comm_rate') || '2.5'));
      const now = new Date();

      const [filterType, setFilterType] = useState("waktu"); // waktu, bulan, tahun, custom
      const [timeRange, setTimeRange] = useState("today"); // today, yesterday, 7days, 30days, etc.
      const [selectedMonth, setSelectedMonth] = useState(now.getMonth());
      const [selectedYear, setSelectedYear] = useState(now.getFullYear());
      const [startDate, setStartDate] = useState("");
      const [endDate, setEndDate] = useState("");

      const filter = t => {
        const d = new Date(t.created_at);
        const tDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
        const nDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        
        if (filterType === "waktu") {
          if (timeRange === "today") return tDate.getTime() === nDate.getTime();
          if (timeRange === "yesterday") {
            const yesterday = new Date(nDate);
            yesterday.setDate(yesterday.getDate() - 1);
            return tDate.getTime() === yesterday.getTime();
          }
          if (timeRange === "7days") return (nDate - tDate) <= 7 * 864e5;
          if (timeRange === "30days") return (nDate - tDate) <= 30 * 864e5;
          if (timeRange === "60days") return (nDate - tDate) <= 60 * 864e5;
          if (timeRange === "90days") return (nDate - tDate) <= 90 * 864e5;
          if (timeRange === "360days") return (nDate - tDate) <= 360 * 864e5;
        }
        
        if (filterType === "bulan") {
          return d.getMonth() === parseInt(selectedMonth) && d.getFullYear() === parseInt(selectedYear);
        }
        
        if (filterType === "tahun") {
          return d.getFullYear() === parseInt(selectedYear);
        }
        
        if (filterType === "custom") {
          if (!startDate || !endDate) return true;
          const s = new Date(startDate);
          const e = new Date(endDate);
          e.setHours(23, 59, 59, 999); // End of day
          return d >= s && d <= e;
        }
        
        return true;
      };

      const filtered = transactions.filter(filter);
      const revenue = filtered.reduce((s, t) => s + t.total, 0);
      const totalDisc = filtered.reduce((s, t) => s + (t.discount_total || 0), 0);
      const byMethod = {}; PAY_METHODS.forEach(m => { byMethod[m] = filtered.filter(t => t.pay_method === m).reduce((s, t) => s + t.total, 0); });
      const soldMap = {}; filtered.forEach(t => (t.transaction_items || []).forEach(i => { soldMap[i.name] = (soldMap[i.name] || 0) + i.qty; }));
      const top = Object.entries(soldMap).sort((a, b) => b[1] - a[1]).slice(0, 5);
      const cashierMap = {}; filtered.forEach(t => { if (t.cashier_name) cashierMap[t.cashier_name] = (cashierMap[t.cashier_name] || 0) + t.total; });

      const expTx = () => {
        const rows = filtered.flatMap(t => (t.transaction_items || []).map(i => ({ KodeTx: txCode(t.tx_code), Tanggal: fmtDate(t.created_at), Pelanggan: t.customer_name, Kasir: t.cashier_name || "-", SKU: i.sku, Produk: i.name, Qty: i.qty, Harga: i.price, Subtotal: i.subtotal, Total: t.total, Metode: t.pay_method || "Cash" })));
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Transaksi");
        XLSX.writeFile(wb, "transaksi_" + Date.now() + ".xlsx");
        notify("Diexport!");
      };
      const expProduk = () => {
        const rows = products.map(p => ({ SKU: p.sku, Nama: p.name, Merk: p.brand, Harga: p.price, Stok: p.stock, Kategori: p.category }));
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Produk");
        XLSX.writeFile(wb, "produk_" + Date.now() + ".xlsx");
        notify("Diexport!");
      };

      const R = ({ label, val, bold, c }) => <div className="flex justify-between items-center py-2.5 border-b border-gray-50 last:border-0 text-sm"><span className="text-gray-500 font-medium">{label}</span><span className={`${bold ? 'font-extrabold' : 'font-semibold'} ${c || 'text-gray-800'}`}>{val}</span></div>;

      // Per-kasir omzet dan komisi
      const cashierStats = {};
      filtered.forEach(t => {
        const name = t.cashier_name || 'Tidak Diketahui';
        if (!cashierStats[name]) cashierStats[name] = { omzet: 0, txCount: 0 };
        cashierStats[name].omzet += t.total;
        cashierStats[name].txCount += 1;
      });
      const cashierList = Object.entries(cashierStats).sort((a, b) => b[1].omzet - a[1].omzet);

      return (
        <div className="p-4">
          <div className="flex gap-2 mb-5 bg-white p-1.5 rounded-2xl border border-gray-100 shadow-sm overflow-x-auto">
            {[
              { id: "laporan", label: "Laporan", path: "M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" }, 
              { id: "transaksi", label: "Transaksi", path: "M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" }, 
              { id: "komisi", label: "Komisi", path: "M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" },
              { id: "ekspor", label: "Export", path: "M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" }
            ].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} className={`flex-1 flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl text-[11px] font-black uppercase tracking-wider transition-all whitespace-nowrap ${tab === t.id ? 'bg-brand text-white shadow-md' : 'text-gray-400 hover:text-gray-600'}`}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d={t.path}/></svg>
                {t.label}
              </button>
            ))}
          </div>

          {/* Filter UI */}
          <div className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm mb-4 space-y-3">
            <div className="flex flex-wrap gap-2">
              <button onClick={() => setFilterType("waktu")} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-colors ${filterType === "waktu" ? 'bg-dark text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>Waktu</button>
              <button onClick={() => setFilterType("bulan")} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-colors ${filterType === "bulan" ? 'bg-dark text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>Bulan</button>
              <button onClick={() => setFilterType("tahun")} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-colors ${filterType === "tahun" ? 'bg-dark text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>Tahun</button>
              <button onClick={() => setFilterType("custom")} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-colors ${filterType === "custom" ? 'bg-dark text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>Custom</button>
            </div>

            {filterType === "waktu" && (
              <div className="flex gap-2 flex-wrap">
                {[
                  ["today", "Hari ini"],
                  ["yesterday", "Kemarin"],
                  ["7days", "7 Hari"],
                  ["30days", "30 Hari"],
                  ["60days", "60 Hari"],
                  ["90days", "90 Hari"],
                  ["360days", "360 Hari"]
                ].map(([id, l]) => (
                  <button key={id} onClick={() => setTimeRange(id)} className={`px-3 py-1.5 rounded-full text-[11px] font-bold transition-colors ${timeRange === id ? 'bg-brand text-white' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}`}>{l}</button>
                ))}
              </div>
            )}

            {filterType === "bulan" && (
              <div className="flex gap-2 items-center">
                <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} className="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-brand/30 outline-none">
                  {["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"].map((m, i) => (
                    <option key={i} value={i}>{m}</option>
                  ))}
                </select>
                <select value={selectedYear} onChange={e => setSelectedYear(e.target.value)} className="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-brand/30 outline-none">
                  {[2024, 2025, 2026, 2027].map(y => (
                    <option key={y} value={y}>{y}</option>
                  ))}
                </select>
              </div>
            )}

            {filterType === "tahun" && (
              <div className="flex gap-2 items-center">
                <select value={selectedYear} onChange={e => setSelectedYear(e.target.value)} className="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-brand/30 outline-none">
                  {[2024, 2025, 2026, 2027].map(y => (
                    <option key={y} value={y}>{y}</option>
                  ))}
                </select>
              </div>
            )}

            {filterType === "custom" && (
              <div className="flex gap-2 items-center text-xs text-gray-500 font-bold">
                <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-brand/30 outline-none" />
                <span>s/d</span>
                <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-brand/30 outline-none" />
              </div>
            )}
          </div>

          {tab === "laporan" && <div className="space-y-4 animate-fade-up">

            <div className="grid grid-cols-2 gap-3">
              {[{ label: "Transaksi", val: filtered.length, c: "text-blue-500" }, { label: "Omzet", val: fmt(revenue), c: "text-green-600" }, { label: "Total Diskon", val: fmt(totalDisc), c: "text-red-500" }, { label: "Pelanggan", val: customers.length, c: "text-purple-500" }].map(s => <div key={s.label} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                <div className={`text-xl font-black mb-1 truncate ${s.c}`}>{s.val}</div>
                <div className="text-xs font-bold text-gray-400 uppercase tracking-wider">{s.label}</div>
              </div>)}
            </div>

            <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
              <div className="font-extrabold text-[11px] text-gray-400 mb-4 uppercase tracking-widest flex items-center gap-2">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                Metode Pembayaran
              </div>
              {PAY_METHODS.map(m => {
                const paths = { "Cash": "M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z", "Transfer Bank": "M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z", "QRIS": "M12 4v1m6 11h2m-6 0h2m-2 4h2m-16-4h2m-2 4h2m1.5-6.236L11 8.586M7 11l2.293-2.293M11 13l2.293-2.293M15 17l2.293-2.293" };
                return <R key={m} label={<div className="flex items-center gap-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d={paths[m] || ""}/></svg>{m}</div>} val={fmt(byMethod[m] || 0)} bold c="text-brand" />;
              })}
            </div>

            <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
              <div className="font-extrabold text-sm text-gray-800 mb-4 uppercase tracking-wider">🏆 Produk Terlaris</div>
              {top.length === 0 ? <div className="text-gray-400 text-sm text-center py-4">Belum ada data</div> : top.map(([name, qty], i) => <R key={name} label={`${i + 1}. ${name}`} val={`${qty} terjual`} bold c="text-brand" />)}
            </div>
          </div>}

          {tab === "transaksi" && <div className="space-y-4 animate-fade-up">

            {loading ? <Spinner /> : <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
              <div className="font-extrabold text-sm text-gray-800 mb-4 pb-3 border-b border-gray-100 flex justify-between">
                <span>{filtered.length} Transaksi</span>
                <span style={{ color }}>{fmt(revenue)}</span>
              </div>
              <div className="flex flex-col gap-2">
                {filtered.length === 0 ? <div className="text-center text-gray-400 py-10 text-sm">Belum ada transaksi</div> : filtered.map(t => <div key={t.id} onClick={() => setTxDetail(t)} className="flex justify-between items-start p-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer hover:border-brand/30 transition-colors">
                  <div>
                    <div className="flex items-center gap-2 mb-1">
                      <span className="font-mono font-bold text-xs" style={{ color }}>{txCode(t.tx_code)}</span>
                      <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider ${t.pay_method === "Cash" ? 'bg-green-100 text-green-700' : t.pay_method === "QRIS" ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}`}>{t.pay_method || "Cash"}</span>
                    </div>
                    <div className="text-xs font-semibold text-gray-700">{t.customer_name || "Umum"}{t.cashier_name ? ` · ${t.cashier_name}` : ""}</div>
                    <div className="text-[10px] text-gray-500 font-medium mt-0.5">{fmtDate(t.created_at)}</div>
                  </div>
                  <div className="text-right">
                    <div className="font-black text-sm text-gray-900">{fmt(t.total)}</div>
                    {t.discount_total > 0 && <div className="text-[10px] text-red-500 font-bold mt-0.5">-{fmt(t.discount_total)}</div>}
                  </div>
                </div>)}
              </div>
            </div>}
          </div>}

          {tab === "komisi" && <div className="space-y-4 animate-fade-up">

            <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
              <div className="font-extrabold text-sm text-gray-800 mb-4 uppercase tracking-wider flex items-center gap-2">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                Pengaturan Komisi
              </div>
              <label className="block text-xs font-bold text-gray-500 mb-2 uppercase">Persentase Komisi (%)</label>
              <div className="flex gap-2 items-center">
                <input value={commRate} onChange={e => { const v = parseFloat(e.target.value)||0; setCommRate(v); localStorage.setItem('comm_rate', v); }} type="number" step="0.1" min="0" max="100" className="w-32 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-xl font-bold focus:outline-none focus:ring-2 focus:ring-brand/30 text-brand" />
                <span className="text-2xl font-black text-gray-400">%</span>
                <div className="flex gap-1 ml-2">{[1, 2, 2.5, 3, 5].map(v => <button key={v} onClick={() => { setCommRate(v); localStorage.setItem('comm_rate', v); }} className={`px-3 py-2 rounded-lg text-xs font-bold border-2 transition-all ${commRate === v ? 'border-brand bg-brandLight text-brand' : 'border-gray-100 text-gray-500 hover:border-gray-200'}`}>{v}%</button>)}</div>
              </div>
              <p className="text-[10px] text-gray-400 mt-2 font-medium">Komisi dihitung dari total omzet per kasir. Disimpan di browser lokal.</p>

    // ── PENGATURAN ────────────────────────────────────────────────
    function Pengaturan({ cashiers, settings, notify, role, onReload, color }) {
      const [tab, setTab] = useState("kasir");
      const [cForm, setCForm] = useState({ code: "", name: "" });
      const [cModal, setCModal] = useState(null);
      const [stForm, setStForm] = useState({ ...settings });
      const [saving, setSaving] = useState(false);
      const [mediaPickerOpen, setMediaPickerOpen] = useState(false);
      const [mediaPickerTarget, setMediaPickerTarget] = useState(null);

      const handleMediaSelect = (url) => {
        setStForm(s => ({ ...s, [mediaPickerTarget]: url }));
        notify("Gambar diperbarui!");
      };

      useEffect(() => { setStForm({ ...settings }); }, [settings]);

      const saveCashier = async () => {
        if (!cForm.code || !cForm.name) return notify("Kode & nama wajib!");
        setSaving(true);
        let error;
        if (cModal === "add") { ({ error } = await db.from("cashiers").insert({ code: cForm.code.toUpperCase(), name: cForm.name, active: true })); if (!error) notify("Kasir ditambahkan!"); }
        else { ({ error } = await db.from("cashiers").update({ code: cForm.code.toUpperCase(), name: cForm.name }).eq("id", cModal)); if (!error) notify("Diupdate!"); }
        setSaving(false); if (error) return notify("Gagal: " + error.message);
        setCModal(null); setCForm({ code: "", name: "" }); onReload();
      };
      const toggleCashier = async (c) => { await db.from("cashiers").update({ active: !c.active }).eq("id", c.id); onReload(); };
      const delCashier = async (id) => { const { error } = await db.from("cashiers").delete().eq("id", id); if (error) return notify("Gagal: " + error.message); notify("Dihapus!"); onReload(); };

      const saveSettings = async () => {
        setSaving(true);
        for (const [key, value] of Object.entries(stForm)) { await db.from("settings").upsert({ key, value: String(value) }, { onConflict: "key" }); }
        setSaving(false); notify("Pengaturan disimpan!"); onReload();
      };

      const resetData = async (type) => {
        const msg = type === 'all' ? 'SEMUA DATA (Produk, Transaksi, Pelanggan, Promo, Sesi Kasir)' : (type === 'transactions' ? 'DATA TRANSAKSI (termasuk Sesi Kasir)' : 'DATA PRODUK');
        if (!confirm(`⚠️ PERINGATAN ⚠️\n\nAnda yakin ingin mereset ${msg}? Tindakan ini PERMANEN dan data yang dihapus tidak dapat dikembalikan!`)) return;
        
        setSaving(true);
        try {
          if (type === 'transactions' || type === 'all') {
            await db.from("transaction_items").delete().not("id", "is", null);
            await db.from("transactions").delete().not("id", "is", null);
            await db.from("cash_sessions").delete().not("id", "is", null);
          }
          if (type === 'products' || type === 'all') {
            await db.from("products").delete().not("id", "is", null);
          }
          if (type === 'all') {
            await db.from("customers").delete().not("id", "is", null);
            await db.from("promos").delete().not("id", "is", null);
          }
          notify("Data berhasil direset!");
          onReload();
        } catch (e) {
          notify("Gagal reset: " + e.message);
        }
        setSaving(false);
      };

      const tabs = [
        { id: "kasir", label: "Kasir", path: "M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" }, 
        { id: "pin", label: "PIN", path: "M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" }, 
        { id: "toko", label: "Toko", path: "M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" }, 
        { id: "struk", label: "Struk", path: "M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" }
      ];
      if (role === "owner") tabs.push({ id: "reset", label: "Reset", path: "M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" });

      return (
        <div className="p-4">
          <div className="flex gap-2 mb-6 overflow-x-auto no-scrollbar pb-2">
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-[11px] font-black uppercase tracking-wider transition-all shadow-sm border whitespace-nowrap ${tab === t.id ? 'bg-dark text-white border-dark' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d={t.path}/></svg>
                {t.label}
              </button>
            ))}
          </div>

          {tab === "kasir" && <div className="animate-fade-up">
            <button onClick={() => { setCModal("add"); setCForm({ code: "", name: "" }); }} className="w-full bg-dark text-white font-black uppercase tracking-wider rounded-xl py-4 mb-6 shadow-md hover:bg-gray-900 transition-all flex items-center justify-center gap-2 text-xs">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M12 5v14M5 12h14"/></svg>
              Tambah Akun Kasir
            </button>

            {cashiers.length === 0 && <div className="text-center text-gray-400 py-10 text-sm font-medium bg-white rounded-2xl border border-gray-100">Belum ada kasir terdaftar</div>}

            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
              {cashiers.map(c => <div key={c.id} className="bg-white rounded-xl p-3 shadow-sm border border-gray-100 flex flex-col items-center text-center relative group">
                <div className={`absolute top-2 right-2 w-2 h-2 rounded-full ${c.active ? 'bg-green-500' : 'bg-gray-300'}`}></div>
                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-dark to-gray-600 flex items-center justify-center text-white font-black text-lg shadow-inner mb-2">{c.name ? c.name[0].toUpperCase() : "?"}</div>
                <div className="font-bold text-gray-800 text-xs truncate w-full">{c.name}</div>
                <div className="text-[10px] text-gray-400 font-mono mb-2">{c.code}</div>
                
                <div className="flex gap-1 w-full border-t border-gray-50 pt-2 mt-auto">
                  <button onClick={() => { setCModal(c.id); setCForm({ code: c.code, name: c.name }); }} className="flex-1 py-1.5 bg-gray-50 hover:bg-gray-100 text-gray-600 rounded-lg text-[10px] font-bold transition-colors border border-gray-100">Edit</button>
                  <button onClick={() => toggleCashier(c)} className={`p-1.5 rounded-lg text-[10px] font-bold transition-colors border ${c.active ? 'text-red-600 border-red-100 hover:bg-red-50' : 'text-brand border-brand/20 hover:bg-brand/10'}`}>
                    {c.active ? (
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18.36 6.64a9 9 0 11-12.73 0M12 2v10"/></svg>
                    ) : (
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.286L13 21l-2.286-6.857L5 12l5.714-2.286L13 3z"/></svg>
                    )}
                  </button>
                  <button onClick={() => delCashier(c.id)} className="p-1.5 text-red-500 hover:bg-red-50 rounded-lg transition-colors border border-red-100 flex justify-center items-center">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                  </button>
                </div>
              </div>)}
            </div>

            {cModal && <Modal onClose={() => setCModal(null)} title={cModal === "add" ? "Tambah Kasir" : "Edit Kasir"}>
              <div className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Kode Kasir *</label>
                  <input value={cForm.code} onChange={e => setCForm(f => ({ ...f, code: e.target.value.toUpperCase() }))} placeholder="cth: KSR-001" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-mono focus:outline-none focus:ring-2 focus:ring-dark/30 uppercase" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Nama Lengkap *</label>
                  <input value={cForm.name} onChange={e => setCForm(f => ({ ...f, name: e.target.value }))} placeholder="cth: Budi Santoso" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-dark/30" />
                </div>
                <div className="flex gap-3 pt-4 border-t border-gray-100 mt-2">
                  <button onClick={() => setCModal(null)} className="flex-1 py-3.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl font-bold text-sm transition-colors">Batal</button>
                  <button onClick={saveCashier} disabled={saving} className="flex-[2] py-3.5 bg-dark hover:bg-gray-900 text-white rounded-xl font-bold text-sm shadow-md transition-all flex justify-center items-center gap-2">{saving ? "Menyimpan..." : "💾 Simpan Data"}</button>
                </div>
              </div>
            </Modal>}
          </div>}

          {tab === "pin" && <div className="animate-fade-up">
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-5">
              <div className="bg-orange-50 border border-orange-100 rounded-xl p-4 mb-6 flex gap-3 items-start">
                <span className="text-xl">⚠️</span>
                <p className="text-xs text-orange-800 font-medium leading-relaxed">Sangat disarankan untuk mengubah PIN default demi keamanan data toko Anda. PIN tersimpan di database.</p>
              </div>
              <div className="space-y-5">
                {[{ label: "PIN Akses Kasir", key: "kasir_pin", hint: "Digunakan staf untuk membuka /kasir.html" }, { label: "PIN Akses Admin", key: "admin_pin", hint: "Akses halaman admin (terbatas laporan)" }, { label: "PIN Akses Owner", key: "owner_pin", hint: "Akses penuh semua fitur & pengaturan" }].map(f => <div key={f.key}>
                  <label className="block text-xs font-bold text-gray-800 mb-2 uppercase tracking-wider">{f.label}</label>
                  <input value={stForm[f.key] || ""} onChange={e => setStForm(s => ({ ...s, [f.key]: e.target.value }))} type="password" placeholder="4-6 digit" maxLength={6} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-xl font-mono tracking-[0.5em] text-center focus:outline-none focus:ring-2 focus:ring-dark/30" onFocus={e => e.target.type = "text"} onBlur={e => e.target.type = "password"} />
                  <div className="text-[10px] text-gray-400 font-medium mt-1.5 text-center">{f.hint}</div>
                </div>)}
              </div>
            </div>
            <button onClick={saveSettings} disabled={saving} className="w-full py-4 bg-dark hover:bg-gray-900 text-white rounded-xl font-bold text-sm shadow-md transition-all flex justify-center items-center gap-2">{saving ? "Menyimpan..." : "💾 Simpan Perubahan PIN"}</button>
          </div>}

          {tab === "toko" && <div className="animate-fade-up">
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-5 space-y-4">
              {[{ label: "Nama Toko", key: "store_name", ph: "Toko Oleh-Oleh Haji & Umroh" }, { label: "Tagline", key: "store_tagline", ph: "Pilihan Berkah dari Tanah Suci" }, { label: "Alamat Lengkap", key: "store_address", ph: "Jl. Contoh No. 1, Semarang" }, { label: "No. Telepon", key: "store_phone", ph: "08xxxxxxxxxx" }, { label: "No. WhatsApp Admin", key: "wa_number", ph: "628xxxxxxxxxx" }, { label: "URL Logo (Image)", key: "store_logo", ph: "https://..." }, { label: "Nomor Rekening Bank", key: "store_bank_account", ph: "BCA 1234567890 a/n Toko Azzahro" }, { label: "URL Gambar QR Code (Pembayaran)", key: "store_qr_image", ph: "https://..." }, { label: "Cloudinary Cloud Name", key: "cloudinary_cloud_name", ph: "dxxxxx" }, { label: "Cloudinary API Key", key: "cloudinary_api_key", ph: "xxxxxxxxxxxxxxx" }, { label: "Cloudinary API Secret", key: "cloudinary_api_secret", ph: "xxxxxxxxxxxxxxxxxxxxxxxxxxx" }].map(f => <div key={f.key}>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">{f.label}</label>
                {['store_logo', 'store_qr_image'].includes(f.key) ? (
                  <div className="flex gap-2">
                    <input value={stForm[f.key] || ""} readOnly className="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none" placeholder={f.ph} />
                    <button onClick={() => { setMediaPickerTarget(f.key); setMediaPickerOpen(true); }} className="bg-brand text-white px-4 py-3 rounded-xl text-xs font-bold hover:bg-dark">Pilih</button>
                  </div>
                ) : (
                  <input type={f.key === "cloudinary_api_secret" ? "password" : "text"} value={stForm[f.key] || ""} onChange={e => setStForm(s => ({ ...s, [f.key]: e.target.value }))} placeholder={f.ph} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-dark/30" />
                )}
              </div>)}
              {stForm.store_logo && <div className="pt-2">
                <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Preview Logo</label>
                <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 flex items-center justify-center">
                  <img src={stForm.store_logo} alt="preview" className="h-16 object-contain" onError={e => e.target.style.display = "none"} />
                </div>
              </div>}
            </div>
            <button onClick={saveSettings} disabled={saving} className="w-full py-4 bg-dark hover:bg-gray-900 text-white rounded-xl font-bold text-sm shadow-md transition-all flex justify-center items-center gap-2">{saving ? "Menyimpan..." : "💾 Simpan Info Toko"}</button>
          </div>}

          {tab === "reset" && role === "owner" && <div className="animate-fade-up">
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-red-100 mb-5 space-y-4">
               <div className="bg-red-50 text-red-600 p-4 rounded-xl border border-red-100 mb-4">
                  <h4 className="font-bold flex items-center gap-2">⚠️ Area Berbahaya</h4>
                  <p className="text-xs mt-1 font-medium">Tindakan ini tidak dapat dibatalkan. Pastikan Anda telah mengekspor data laporan sebelum melakukan reset.</p>
               </div>
               
               <button onClick={() => resetData('transactions')} disabled={saving} className="w-full py-4 bg-white border-2 border-red-200 text-red-600 hover:bg-red-50 hover:border-red-500 rounded-xl font-bold text-sm transition-all text-left px-5 flex justify-between items-center shadow-sm disabled:opacity-50">
                 <div>
                   <div className="text-base">Reset Data Transaksi</div>
                   <div className="text-xs font-medium text-red-400 mt-0.5">Menghapus riwayat transaksi dan sesi kasir</div>
                 </div>
                 <span className="text-2xl">🧾</span>
               </button>
               
               <button onClick={() => resetData('products')} disabled={saving} className="w-full py-4 bg-white border-2 border-red-200 text-red-600 hover:bg-red-50 hover:border-red-500 rounded-xl font-bold text-sm transition-all text-left px-5 flex justify-between items-center shadow-sm disabled:opacity-50 mt-3">
                 <div>
                   <div className="text-base">Reset Data Produk</div>
                   <div className="text-xs font-medium text-red-400 mt-0.5">Menghapus semua katalog produk</div>
                 </div>
                 <span className="text-2xl">📦</span>
               </button>

               <div className="border-t border-dashed border-red-200 my-6"></div>

               <button onClick={() => resetData('all')} disabled={saving} className="w-full py-4 bg-red-600 hover:bg-red-700 text-white rounded-xl font-black text-sm transition-all text-left px-5 flex justify-between items-center shadow-md disabled:opacity-50 hover:shadow-lg active:scale-[0.98]">
                 <div>
                   <div className="text-base">Reset SEMUA DATA</div>
                   <div className="text-xs font-semibold text-red-200 mt-0.5">Hapus Produk, Transaksi, Pelanggan & Promo</div>
                 </div>
                 <span className="text-3xl">🧨</span>
               </button>
            </div>
          </div>}

          {tab === "struk" && <div className="animate-fade-up">
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-5 space-y-5">
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">Ucapan / Footer Struk</label>
                <input value={stForm.store_footer || ""} onChange={e => setStForm(s => ({ ...s, store_footer: e.target.value }))} placeholder="Terima kasih, semoga berkah 🤲" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-dark/30" />
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Warna Tema Utama</label>
                <div className="flex gap-3 items-center mb-3">
                  <div className="relative w-12 h-12 rounded-xl overflow-hidden border-2 border-gray-200 shadow-inner shrink-0 cursor-pointer">
                    <input value={stForm.receipt_color || "#1a6b3c"} onChange={e => setStForm(s => ({ ...s, receipt_color: e.target.value }))} type="color" className="absolute inset-[-10px] w-20 h-20 cursor-pointer" />
                  </div>
                  <input value={stForm.receipt_color || "#1a6b3c"} onChange={e => setStForm(s => ({ ...s, receipt_color: e.target.value }))} placeholder="#1a6b3c" className="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-mono uppercase focus:outline-none focus:ring-2 focus:ring-dark/30" />
                </div>
                <div className="flex gap-2 flex-wrap bg-gray-50 p-3 rounded-xl border border-gray-100">
                  {["#1a6b3c", "#2563eb", "#dc2626", "#d97706", "#7c3aed", "#0891b2", "#1a1a2e", "#065f46"].map(c => <div key={c} onClick={() => setStForm(s => ({ ...s, receipt_color: c }))} className={`w-8 h-8 rounded-lg cursor-pointer shadow-sm transition-transform hover:scale-110 ${stForm.receipt_color === c ? 'ring-2 ring-offset-2 ring-gray-400' : ''}`} style={{ background: c }} />)}
                </div>
              </div>
              <div className="border border-gray-200 rounded-xl p-4 bg-gray-50">
                <div className="text-[10px] font-bold text-gray-400 mb-3 uppercase tracking-widest text-center">Preview Struk Kasir</div>
                <div className="font-mono text-[11px] bg-white p-4 rounded-lg shadow-sm border border-gray-100 max-w-[250px] mx-auto text-gray-600">
                  {stForm.store_logo && <div className="flex justify-center mb-2"><img src={stForm.store_logo} className="h-6 object-contain" onError={e => e.target.style.display = "none"} /></div>}
                  <div className="text-center font-bold text-sm mb-1" style={{ color: stForm.receipt_color || "#1a6b3c" }}>{stForm.store_name || "Nama Toko"}</div>
                  <div className="text-center text-[9px] mb-3 leading-tight">{stForm.store_address || "Alamat Toko"}</div>
                  <div className="border-t border-dashed border-gray-300 py-2 space-y-1">
                    <div className="flex justify-between"><span>Produk A x2</span><span>50.000</span></div>
                    <div className="flex justify-between"><span>Produk B x1</span><span>25.000</span></div>
                  </div>
                  <div className="flex justify-between font-bold text-sm pt-2 border-t border-dashed border-gray-300" style={{ color: stForm.receipt_color || "#1a6b3c" }}><span>TOTAL</span><span>75.000</span></div>
                  <div className="text-center mt-4 text-[9px]">{stForm.store_footer || "Terima kasih 🤲"}</div>
                </div>
              </div>
            </div>
            <button onClick={saveSettings} disabled={saving} className="w-full py-4 bg-dark hover:bg-gray-900 text-white rounded-xl font-bold text-sm shadow-md transition-all flex justify-center items-center gap-2">{saving ? "Menyimpan..." : "💾 Simpan Desain"}</button>
          </div>}
          {mediaPickerOpen && <MediaPickerModal onClose={() => setMediaPickerOpen(false)} onSelect={handleMediaSelect} settings={settings} notify={notify} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
