<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Admin — Toko Azzahro</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { brand: '#114232', brandLight: '#EDF2F0', gold: '#D4AF37', goldLight: '#FDF8E7', dark: '#0A2517', grayLight: '#F8F9FB' },
          animation: { 'fade-up': 'fadeUp 0.3s ease-out', shake: 'shake 0.4s ease-in-out' },
          keyframes: {
            fadeUp: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            shake: { '0%, 100%': { transform: 'translateX(0)' }, '25%': { transform: 'translateX(-6px)' }, '75%': { transform: 'translateX(6px)' } }
          }
        }
      }
    }
  </script>
  <style>
    .card-member {
      background: linear-gradient(135deg, #114232 0%, #1a6b3c 40%, #D4AF37 100%);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
      color: white;
    }
    .card-member::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 140px; height: 140px;
      background: rgba(255,255,255,0.07);
      border-radius: 50%;
    }
    .card-member::after {
      content: '';
      position: absolute;
      bottom: -50px; left: -20px;
      width: 180px; height: 180px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .animate-float { animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .animate-scale-in { animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes scaleIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
  </style>
</head>

<body class="bg-grayLight text-gray-800 font-sans antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = "https://xliwxtakluemverkgwrv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsaXd4dGFrbHVlbXZlcmtnd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjEzNTQsImV4cCI6MjA5MjA5NzM1NH0.XaP6ad5rvhA8EMlCSGy6FIoNltBMiDwQ4fLxe9BwVy8";
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const CATS = ["Semua", "Air Zamzam", "Kurma", "Tasbih", "Sajadah", "Parfum", "Peci & Mukena", "Lainnya"];
    const PAY_METHODS = ["Cash", "Transfer Bank", "QRIS"];
    const fmt = n => new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", minimumFractionDigits: 0 }).format(n);
    const fmtDate = d => new Date(d).toLocaleDateString("id-ID", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
    const uid = () => Math.random().toString(36).substr(2, 9).toUpperCase();
    const txCode = c => `#${c}`;
    const genSKU = (cat, existing) => {
      const p = { "Air Zamzam": "ZAM", "Kurma": "KUR", "Tasbih": "TAS", "Sajadah": "SAJ", "Parfum": "PAR", "Peci & Mukena": "PEC", "Lainnya": "LAN" }[cat] || "PRD";
      const nums = existing.filter(x => x.sku && x.sku.startsWith(p)).map(x => parseInt(x.sku.split("-")[1] || "0")).filter(n => !isNaN(n));
      return `${p}-${String(nums.length > 0 ? Math.max(...nums) + 1 : 1).padStart(3, "0")}`;
    };

    function Toast({ msg }) { if (!msg) return null; return <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-dark text-white px-5 py-2.5 rounded-full z-[9999] text-sm font-medium shadow-xl whitespace-nowrap animate-fade-up">{msg}</div>; }
    function Modal({ children, onClose, title, full, wide }) {
      return (
        <div className="fixed inset-0 bg-black/50 z-[200] flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity" onClick={onClose}>
          <div className={`bg-white rounded-t-2xl sm:rounded-2xl flex flex-col w-full animate-fade-up shadow-2xl max-h-[90vh] ${full ? 'max-w-4xl h-[90vh] sm:h-[85vh]' : wide ? 'max-w-3xl' : 'max-w-md'}`} onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center p-5 border-b border-gray-100 shrink-0">
              <h3 className="font-extrabold text-lg text-gray-900">{title}</h3>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center bg-gray-100 hover:bg-gray-200 rounded-full text-gray-500 font-bold transition-colors">✕</button>
            </div>
            <div className="p-5 overflow-y-auto flex-1">{children}</div>
          </div>
        </div>
      );
    }
    function Spinner() { return <div className="flex items-center justify-center p-10"><div className="w-8 h-8 border-4 border-gray-200 border-t-brand rounded-full animate-spin"></div></div>; }
    
    function MemberCard({ customer, storeName, storeColor }) {
      const color = storeColor || '#114232';
      const joinDate = customer.created_at ? new Date(customer.created_at).toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' }) : new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
      return (
        <div className="card-member p-6 text-white animate-scale-in" style={{ background: `linear-gradient(135deg, #0A2517 0%, ${color} 50%, #D4AF37 100%)` }}>
          <div className="relative z-10 text-left">
            <div className="flex justify-between items-start mb-6">
              <div>
                <div className="text-[10px] font-bold uppercase tracking-widest opacity-70 mb-1">Member Card</div>
                <div className="text-lg font-black leading-tight">{storeName || 'Toko Azzahro'}</div>
              </div>
              <div className="text-3xl animate-float">⭐</div>
            </div>
            <div className="bg-white/10 rounded-2xl p-4 mb-5 backdrop-blur-sm border border-white/20">
              <div className="text-[9px] font-bold uppercase tracking-widest opacity-60 mb-1">ID Member</div>
              <div className="font-mono font-black text-xl tracking-wider text-[#D4AF37]">{customer.customer_code || 'AZR-000000-0000'}</div>
            </div>
            <div className="mb-4">
              <div className="text-[9px] font-bold uppercase tracking-widest opacity-60 mb-1">Nama Member</div>
              <div className="font-extrabold text-lg truncate">{customer.name}</div>
              {customer.phone && <div className="text-sm opacity-70 font-medium mt-0.5">{customer.phone}</div>}
            </div>
            <div className="flex justify-between items-end">
              <div>
                <div className="text-[9px] font-bold uppercase tracking-widest opacity-60 mb-1">Bergabung</div>
                <div className="text-xs font-bold opacity-90">{joinDate}</div>
              </div>
              <div className="text-right">
                <div className="text-[9px] font-bold uppercase tracking-widest opacity-60 mb-1">Saldo Poin</div>
                <div className="text-2xl font-black text-white">{customer.points || 0} <span className="text-sm opacity-80">poin</span></div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── PIN PAD ──────────────────────────────────────────────────
    function PinPad({ onSuccess }) {
      const [pin, setPin] = useState("");
      const [shake, setShake] = useState(false);
      const [settings, setSettings] = useState(null);

      useEffect(() => { db.from("settings").select("*").then(({ data }) => { if (data) { const obj = {}; data.forEach(r => { obj[r.key] = r.value; }); setSettings(obj); } }); }, []);

      const press = d => {
        if (pin.length >= 6) return;
        const next = pin + d; setPin(next);
        if (next.length >= 4 && settings) {
          const adminPin = settings.admin_pin || "0000";
          const ownerPin = settings.owner_pin || "9999";
          if (next === ownerPin) { onSuccess("owner"); return; }
          if (next === adminPin) { onSuccess("admin"); return; }
          if (next.length >= 6) { setShake(true); setTimeout(() => { setPin(""); setShake(false); }, 600); }
        }
      };
      const del = () => setPin(p => p.slice(0, -1));

      return (
        <div className="min-h-screen bg-gradient-to-br from-dark to-brand flex flex-col items-center justify-center p-6">
          <div className="text-5xl mb-3">⚙️</div>
          <div className="text-white font-extrabold text-2xl mb-1">Admin Panel</div>
          <div className="text-white/60 text-sm mb-8 font-medium">Toko Azzahro — Haji & Umroh</div>
          <div className={`bg-white rounded-3xl p-7 w-full max-w-[320px] shadow-2xl ${shake ? 'animate-shake' : ''}`}>
            <div className="flex justify-center gap-3 mb-6">
              {[0, 1, 2, 3, 4, 5].map(i => <div key={i} className={`w-3.5 h-3.5 rounded-full transition-colors ${i < pin.length ? 'bg-dark' : 'bg-gray-200'}`} />)}
            </div>
            <div className="grid grid-cols-3 gap-2.5">
              {[1, 2, 3, 4, 5, 6, 7, 8, 9, "", 0, "⌫"].map((d, i) => (
                <button key={i} onClick={() => d === "" ? null : d === "⌫" ? del() : press(String(d))} disabled={d === ""}
                  className={`py-4 text-xl font-bold rounded-2xl ${d === "" ? 'invisible' : d === "⌫" ? 'bg-red-50 text-red-500 hover:bg-red-100' : 'bg-gray-50 text-dark hover:bg-gray-100 active:bg-gray-200'} transition-colors`}>
                  {d}
                </button>
              ))}
            </div>
            <div className="mt-4 text-center text-xs text-gray-400 font-medium">Admin PIN atau Owner PIN</div>
          </div>
          <a href="/" className="mt-8 text-white/50 text-sm font-medium hover:text-white transition-colors">← Kembali ke Katalog</a>
        </div>
      );
    }

    // ── KONTEN ────────────────────────────────────────────────────
    function KatalogPage({ products, settings, notify, onReload, color }) {
      const [tab, setTab] = useState("element");
      const [saving, setSaving] = useState(false);

      // ── ELEMENT (Banner, Etalase, Produk) ──
      const parseBanners = () => { try { return JSON.parse((settings && settings.banners) || "[]"); } catch(_) { return []; } };
      const defaultLayout = { 
        show_banner: (settings && settings.catalog_banner_active) !== 'false', 
        show_etalase: (settings && settings.catalog_etalase_active) !== 'false', 
        show_category: (settings && settings.catalog_show_category) !== 'false', 
        default_view: (settings && settings.catalog_default_view) || "grid", 
        hidden_etalases: (() => { try { return JSON.parse((settings && settings.catalog_hidden_etalases) || "[]"); } catch(_) { return []; } })()
      };
      const parseHiddenProds = () => { try { return JSON.parse((settings && settings.catalog_hidden_products) || "[]"); } catch(_) { return []; } };

      const [banners, setBanners] = useState(parseBanners);
      const emptyBanner = { title: "", subtitle: "", image: "", link: "", bg_type: "color", bg_val: "#114232", layout: "text_left_img_right", overlay: false, overlay_color: "rgba(0,0,0,0.5)" };
      const [bForm, setBForm] = useState(emptyBanner);
      const [editIdx, setEditIdx] = useState(null);
      const [layout, setLayout] = useState(defaultLayout);
      const [hiddenProducts, setHiddenProducts] = useState(parseHiddenProds);
      const [mediaPickerOpen, setMediaPickerOpen] = useState(false);
      const [showBannerForm, setShowBannerForm] = useState(false);

      const moveBanner = (i, dir) => {
        const newList = [...banners];
        const target = i + dir;
        if (target < 0 || target >= newList.length) return;
        [newList[i], newList[target]] = [newList[target], newList[i]];
        setBanners(newList);
      };

      const moveEtalase = async (idx, dir) => {
        const dynamicEtalase = (settings.product_etalase || "").split(",").map(s => s.trim()).filter(Boolean);
        const newList = [...dynamicEtalase];
        const target = idx + dir;
        if (target < 0 || target >= newList.length) return;
        [newList[idx], newList[target]] = [newList[target], newList[idx]];
        
        const val = newList.join(', ');
        const { error } = await db.from('settings').upsert({ key: 'product_etalase', value: val }, { onConflict: 'key' });
        if (error) return notify("Gagal menyimpan urutan: " + error.message);
        notify("Urutan etalase disimpan!");
        onReload();
      };
      const [mediaPickerTarget, setMediaPickerTarget] = useState(null);
      const [sectionOrder, setSectionOrder] = useState(() => {
        return (settings && settings.catalog_section_order) ? settings.catalog_section_order.split(",") : ["banner", "etalase", "produk"];
      });

      // Generate etalases options from products
      const etalasesSet = new Set();
      (products || []).forEach(p => p.etalase && etalasesSet.add(p.etalase));
      const allEtalases = Array.from(etalasesSet);

      useEffect(() => {
        if (!settings) return;
        setBanners(parseBanners());
        setLayout({
          show_banner: settings.catalog_banner_active !== 'false', 
          show_etalase: settings.catalog_etalase_active !== 'false', 
          show_category: settings.catalog_show_category !== 'false', 
          default_view: settings.catalog_default_view || "grid",
          hidden_etalases: (() => { try { return JSON.parse(settings.catalog_hidden_etalases || "[]"); } catch(_) { return []; } })()
        });
        setHiddenProducts(parseHiddenProds());
        setSectionOrder(settings.catalog_section_order ? settings.catalog_section_order.split(",") : ["banner", "etalase", "produk"]);
      }, [settings]);

      if (!settings) return <div className="p-4 text-center text-gray-500">Memuat data...</div>;

      const saveElement = async () => {
        setSaving(true);
        const pairs = [
          { key: "banners", value: JSON.stringify(banners) },
          { key: "catalog_banner_active", value: String(layout.show_banner) },
          { key: "catalog_etalase_active", value: String(layout.show_etalase) },
          { key: "catalog_hidden_etalases", value: JSON.stringify(layout.hidden_etalases) },
          { key: "catalog_show_category", value: String(layout.show_category) },
          { key: "catalog_default_view", value: layout.default_view },
          { key: "catalog_hidden_products", value: JSON.stringify(hiddenProducts) },
          { key: "catalog_section_order", value: sectionOrder.join(",") }
        ];
        for (const item of pairs) await db.from("settings").upsert(item, { onConflict: "key" });
        setSaving(false); notify("Pengaturan Element disimpan!"); onReload();
      };

      const addBanner = () => {
        if (!bForm.title && !bForm.image) return notify("Isi judul atau gambar banner!");
        const list = editIdx !== null ? banners.map((b, i) => i === editIdx ? { ...bForm } : b) : [...banners, { ...bForm }];
        setBanners(list); setBForm(emptyBanner); setEditIdx(null);
      };
      const delBanner = (i) => setBanners(banners.filter((_, j) => j !== i));
      const editBanner = (i) => { setBForm({ ...banners[i] }); setEditIdx(i); };

      const toggleEtalase = (e) => {
        setLayout(prev => {
          const h = prev.hidden_etalases.includes(e) ? prev.hidden_etalases.filter(x => x !== e) : [...prev.hidden_etalases, e];
          return { ...prev, hidden_etalases: h };
        });
      };

      const toggleHiddenProduct = (pid) => {
        setHiddenProducts(prev => prev.includes(pid) ? prev.filter(x => x !== pid) : [...prev, pid]);
      };

      // ── TENTANG KAMI ──
      const parseServices = () => { try { return JSON.parse(settings.about_services || "[]"); } catch(_) { return [{ icon: "🕌", title: "", desc: "" }]; } };
      const parseLinks = () => { try { return JSON.parse(settings.about_extra_links || "[]"); } catch(_) { return []; } };
      
      const [about, setAbout] = useState({
        about_hero_image: settings.about_hero_image || "",
        about_description: settings.about_description || "",
        about_description_image: settings.about_description_image || "",
        about_cta_label: settings.about_cta_label || "Hubungi Kami via WhatsApp",
        wa_number: settings.wa_number || "6281234567890",
        store_address: settings.store_address || "",
        store_gmap_url: settings.store_gmap_url || "",
      });
      const [services, setServices] = useState(parseServices);
      const [extraLinks, setExtraLinks] = useState(parseLinks);

      useEffect(() => {
        setAbout({
          about_hero_image: settings.about_hero_image || "",
          about_description: settings.about_description || "",
          about_description_image: settings.about_description_image || "",
          about_cta_label: settings.about_cta_label || "Hubungi Kami via WhatsApp",
          wa_number: settings.wa_number || "6281234567890",
          store_address: settings.store_address || "",
          store_gmap_url: settings.store_gmap_url || "",
        });
        setServices(parseServices()); setExtraLinks(parseLinks());
      }, [settings]);

      const saveAbout = async () => {
        setSaving(true);
        const pairs = [
          ...Object.entries(about),
          ["about_services", JSON.stringify(services)],
          ["about_extra_links", JSON.stringify(extraLinks)],
        ];
        for (const [key, value] of pairs) await db.from("settings").upsert({ key, value }, { onConflict: "key" });
        setSaving(false); notify("Tentang Kami disimpan!"); onReload();
      };

      // ── MAINTENANCE ──
      const [maintenance, setMaintenance] = useState({
        maintenance_mode: settings.maintenance_mode === 'true',
        maintenance_text: settings.maintenance_text || "Maaf, katalog kami sedang dalam pemeliharaan.",
        maintenance_image: settings.maintenance_image || "",
        maintenance_btn_text: settings.maintenance_btn_text || "Hubungi via WhatsApp",
        maintenance_btn_link: settings.maintenance_btn_link || "",
        maintenance_bg_type: settings.maintenance_bg_type || "color",
        maintenance_bg_val: settings.maintenance_bg_val || "#114232",
      });

      const handleMediaSelect = (url) => {
        if (mediaPickerTarget === 'banner_image') setBForm(p => ({ ...p, image: url }));
        if (mediaPickerTarget === 'banner_bg') setBForm(p => ({ ...p, bg_val: url }));
        if (mediaPickerTarget === 'about_hero') setAbout(p => ({ ...p, about_hero_image: url }));
        if (mediaPickerTarget === 'about_desc') setAbout(p => ({ ...p, about_description_image: url }));
        if (mediaPickerTarget === 'maintenance_image') setMaintenance(p => ({ ...p, maintenance_image: url }));
        if (mediaPickerTarget === 'maintenance_bg') setMaintenance(p => ({ ...p, maintenance_bg_val: url }));
      };

      useEffect(() => {
        setMaintenance({
          maintenance_mode: settings.maintenance_mode === 'true',
          maintenance_text: settings.maintenance_text || "Maaf, katalog kami sedang dalam pemeliharaan.",
          maintenance_image: settings.maintenance_image || "",
          maintenance_btn_text: settings.maintenance_btn_text || "Hubungi via WhatsApp",
          maintenance_btn_link: settings.maintenance_btn_link || "",
          maintenance_bg_type: settings.maintenance_bg_type || "color",
          maintenance_bg_val: settings.maintenance_bg_val || "#114232",
        });
      }, [settings]);

      const saveMaintenance = async () => {
        setSaving(true);
        const pairs = Object.entries(maintenance).map(([k, v]) => ({ key: k, value: String(v) }));
        for (const { key, value } of pairs) await db.from("settings").upsert({ key, value }, { onConflict: "key" });
        setSaving(false); notify("Pengaturan Maintenance disimpan!"); onReload();
      };

      const tabCls = (t) => `px-4 py-2 rounded-full text-xs font-black uppercase tracking-wider transition-all ${tab === t ? 'bg-dark text-white shadow' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}`;

      return (
        <div className="p-4">
          <div className="flex justify-between items-center mb-5">
            <h2 className="font-extrabold text-lg text-gray-800">Manajemen Katalog</h2>
            <a href="index.html" target="_blank" className="text-xs font-bold text-brand hover:underline flex items-center gap-1">
              Lihat Katalog
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 5l7 7-7 7M3 12h18"/></svg>
            </a>
          </div>
          <div className="flex gap-2 mb-6 overflow-x-auto hide-scrollbar">
            <button onClick={() => setTab("element")} className={tabCls("element")}>🧩 Element</button>
            <button onClick={() => setTab("tentang")} className={tabCls("tentang")}>🏪 Tentang Kami</button>
            <button onClick={() => setTab("maintenance")} className={tabCls("maintenance")}>🔧 Maintenance</button>
          </div>

          {tab === "element" && (() => {
            const bannerSection = (
              /* SECTION BANNER */
              <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                  <div className="font-bold text-gray-800">Section Banner</div>
                  <label className="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" checked={layout.show_banner} onChange={e => setLayout({...layout, show_banner: e.target.checked})} className="sr-only peer" />
                    <div className="w-9 h-5 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-brand"></div>
                  </label>
                </div>
                {layout.show_banner && (
                  <div className="p-4 space-y-4">
                    {banners.length > 0 && (
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                        {banners.map((b, i) => (
                          <div key={i} className="flex items-center gap-3 p-3 bg-white border border-gray-200 rounded-xl shadow-sm relative">
                            <div className="relative w-12 h-12 shrink-0">
                              <img src={b.image} className="w-full h-full object-cover rounded-lg bg-gray-100 border border-gray-100" onError={e=>e.target.style.display='none'}/>
                              {b.bg_type === 'color' ? (
                                <div className="absolute -top-1 -right-1 w-4 h-4 rounded-full border-2 border-white shadow-sm" style={{ backgroundColor: b.bg_val }}></div>
                              ) : (
                                b.bg_val && <div className="absolute -top-1 -right-1 w-4 h-4 rounded-full border-2 border-white shadow-sm bg-cover bg-center" style={{ backgroundImage: `url(${b.bg_val})` }}></div>
                              )}
                            </div>
                            <div className="flex-1 min-w-0">

    // ── MEDIAPANEL ────────────────────────────────────────────────
    function MediaPanel({ notify, settings }) {
      const [media, setMedia] = useState([]);
      const [loading, setLoading] = useState(true);
      const [uploading, setUploading] = useState(false);
      const [previewMedia, setPreviewMedia] = useState(null);

      const cloudName = settings.cloudinary_cloud_name;
      const apiKey = settings.cloudinary_api_key;
      const apiSecret = settings.cloudinary_api_secret;

      const loadMedia = async () => {
        setLoading(true);
        const { data } = await db.from("media").select("*").order("created_at", { ascending: false });
        setMedia(data || []);
        setLoading(false);
      };

      useEffect(() => { loadMedia(); }, []);

      const onUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!cloudName || !apiKey || !apiSecret) return notify("Pengaturan Cloudinary belum lengkap di menu Setting!");

        setUploading(true);
        try {
          let fileToUpload = file;
          if (file.type.startsWith('image/')) {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            await new Promise(res => img.onload = res);
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800;
            const MAX_HEIGHT = 800;
            let width = img.width;
            let height = img.height;
            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            const outputType = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
            fileToUpload = canvas.toDataURL(outputType, outputType === 'image/jpeg' ? 0.7 : 1.0);
          }

          const timestamp = Math.floor(Date.now() / 1000).toString();
          const str = `timestamp=${timestamp}${apiSecret}`;
          const encoder = new TextEncoder();
          const dataToHash = encoder.encode(str);
          const hashBuffer = await crypto.subtle.digest('SHA-1', dataToHash);
          const hashArray = Array.from(new Uint8Array(hashBuffer));
          const signature = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

          const formData = new FormData();
          formData.append('file', fileToUpload);
          formData.append('api_key', apiKey);
          formData.append('timestamp', timestamp);
          formData.append('signature', signature);

          const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
            method: 'POST',
            body: formData
          });
          const data = await res.json();

          if (data.secure_url) {
            const typeData = JSON.stringify({
              type: 'image',
              name: data.original_filename || file.name,
              size: data.bytes || file.size,
              width: data.width || width,
              height: data.height || height
            });
            
            await db.from("media").insert({
              url: data.secure_url,
              public_id: data.public_id,
              type: typeData
            });
            
            notify("Gambar berhasil di-upload!");
            loadMedia();
          } else {
            notify("Gagal upload ke Cloudinary.");
          }
        } catch (err) {
          notify("Error: " + err.message);
        }
        setUploading(false);
      };

      const onDelete = async (item) => {
        if (!confirm("Hapus gambar ini dari galeri?")) return;
        
        const { error } = await db.from("media").delete().eq("id", item.id);
        if (error) return notify("Gagal hapus dari database: " + error.message);

        if (item.public_id && cloudName && apiKey && apiSecret) {
          try {
            const timestamp = Math.floor(Date.now() / 1000).toString();
            const str = `public_id=${item.public_id}&timestamp=${timestamp}${apiSecret}`;
            const encoder = new TextEncoder();
            const dataToHash = encoder.encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-1', dataToHash);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const signature = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            const formData = new FormData();
            formData.append('public_id', item.public_id);
            formData.append('api_key', apiKey);
            formData.append('timestamp', timestamp);
            formData.append('signature', signature);

            await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/destroy`, {
              method: 'POST',
              body: formData
            });
          } catch (err) {
            console.error("Cloudinary delete failed", err);
          }
        }

        notify("Gambar dihapus!");
        loadMedia();
      };

      return (
        <div className="p-4">
          <div className="flex justify-between items-center mb-5">
            <h2 className="font-extrabold text-lg text-gray-800">Media Library</h2>
            <label className="bg-brand text-white px-4 py-2 rounded-xl text-xs font-bold cursor-pointer hover:bg-dark transition-all">
              {uploading ? "Uploading..." : "+ Upload Baru"}
              <input type="file" className="hidden" onChange={onUpload} accept="image/*" disabled={uploading} />
            </label>
          </div>

          {loading ? <Spinner /> : (
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              {media.map(m => {
                let meta = { name: m.url.split('/').pop(), size: null, width: null, height: null };
                try {
                  const parsed = JSON.parse(m.type);
                  if (parsed && typeof parsed === 'object') meta = { ...meta, ...parsed };
                } catch(e) {}
                
                return (
                  <div key={m.id} className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden group relative flex flex-col">
                    <img src={m.url} className="w-full h-40 object-cover" alt="Media" />
                    <div className="p-2 text-[10px] text-gray-500 space-y-0.5">
                      <div className="font-bold text-gray-700 truncate">{meta.name}</div>
                      <div>{m.created_at ? new Date(m.created_at).toLocaleString("id-ID") : "-"}</div>
                      <div>{meta.size ? (meta.size / 1024).toFixed(1) + " KB" : "-"} {meta.width ? `(${meta.width}x${meta.height})` : ""}</div>
                    </div>
                    <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center gap-2">
                      <button onClick={() => setPreviewMedia({ ...m, ...meta })} className="p-2 bg-white rounded-full text-gray-700 hover:bg-gray-100">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                      </button>
                      <button onClick={() => window.open(m.url, '_blank')} className="p-2 bg-white rounded-full text-gray-700 hover:bg-gray-100">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 3h6v6M10 14L21 3M21 13v6a2 2 0 01-2-2H5a2 2 0 01-2-2V5a2 2 0 012-2h6"/></svg>
                      </button>
                      <button onClick={() => onDelete(m)} className="p-2 bg-red-500 rounded-full text-white hover:bg-red-600">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                      </button>
                    </div>
                  </div>
                );
              })}
              {media.length === 0 && (
                <div className="col-span-2 md:col-span-4 text-center text-gray-400 py-10">Belum ada media. Silakan upload.</div>
              )}
            </div>
          )}

          {previewMedia && (
            <Modal onClose={() => setPreviewMedia(null)} title={previewMedia.name || "Preview Media"} wide>
              <div className="flex flex-col items-center gap-4">
                <img src={previewMedia.url} className="max-w-full max-h-[70vh] object-contain rounded-xl" alt="Preview" />
                <div className="text-sm text-gray-600 space-y-1 text-center">
                  <div className="font-bold text-gray-800">{previewMedia.name || "Tanpa Nama"}</div>
                  <div>Dimensi: {previewMedia.width || "-"} x {previewMedia.height || "-"} px</div>
                  <div>Ukuran: {previewMedia.size ? (previewMedia.size / 1024).toFixed(1) + " KB" : "-"}</div>
                  <div>Upload: {previewMedia.created_at ? new Date(previewMedia.created_at).toLocaleString("id-ID") : "-"}</div>
                </div>
                <div className="flex gap-2 mt-4">
                  <button onClick={() => window.open(previewMedia.url, '_blank')} className="px-4 py-2 bg-brand text-white rounded-xl text-xs font-bold hover:bg-dark">Buka di Tab Baru</button>
                  <button onClick={() => setPreviewMedia(null)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded-xl text-xs font-bold">Tutup</button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ── MEDIAPICKERMODAL ──────────────────────────────────────────
    function MediaPickerModal({ onClose, onSelect, settings, notify }) {
      const [media, setMedia] = useState([]);
      const [loading, setLoading] = useState(true);
      const [uploading, setUploading] = useState(false);

      const cloudName = settings.cloudinary_cloud_name;
      const apiKey = settings.cloudinary_api_key;
      const apiSecret = settings.cloudinary_api_secret;

      const loadMedia = async () => {
        setLoading(true);
        const { data } = await db.from("media").select("*").order("created_at", { ascending: false });
        setMedia(data || []);
        setLoading(false);
      };

      useEffect(() => { loadMedia(); }, []);

      const onUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!cloudName || !apiKey || !apiSecret) return notify("Pengaturan Cloudinary belum lengkap!");

        setUploading(true);
        try {
          let fileToUpload = file;
          let width = 0;
          let height = 0;
          
          if (file.type === 'image/png') {
            fileToUpload = file; // Use original file to preserve transparency!
            // Get dimensions
            const img = new Image();
            img.src = URL.createObjectURL(file);
            await new Promise(res => img.onload = res);
            width = img.width;
            height = img.height;
          } else if (file.type.startsWith('image/')) {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            await new Promise(res => img.onload = res);
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800;
            const MAX_HEIGHT = 800;
            width = img.width;
            height = img.height;
            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            fileToUpload = canvas.toDataURL('image/jpeg', 0.7);
          }

          const timestamp = Math.floor(Date.now() / 1000).toString();
          const str = `timestamp=${timestamp}${apiSecret}`;
          const encoder = new TextEncoder();
          const dataToHash = encoder.encode(str);
          const hashBuffer = await crypto.subtle.digest('SHA-1', dataToHash);
          const hashArray = Array.from(new Uint8Array(hashBuffer));
          const signature = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

          const formData = new FormData();
          formData.append('file', fileToUpload);
          formData.append('api_key', apiKey);
          formData.append('timestamp', timestamp);
          formData.append('signature', signature);

          const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
            method: 'POST',
            body: formData
          });
          const data = await res.json();

          if (data.secure_url) {
            await db.from("media").insert({
              url: data.secure_url,
              public_id: data.public_id,
              type: 'image'
            });
            notify("Gambar di-upload!");
            loadMedia();
          }
        } catch (err) {
          notify("Error: " + err.message);
        }

      };

      return (

      const loadTransactions = useCallback(async () => { setLoad("t", true); const { data } = await db.from("transactions").select("*,transaction_items(*)").order("created_at", { ascending: false }).limit(500); setTransactions(data || []); setLoad("t", false); }, []);

    function POPanel({ notify, color }) {
      const [dataKasir, setDataKasir] = useState([]);
      const [dataOnline, setDataOnline] = useState([]);
      const [loading, setLoading] = useState(false);
      const [tab, setTab] = useState('pending'); // pending, delivered

      const loadData = async () => {
        setLoading(true);
        try {
          const db = window.supabase;
          const [kasirRes, onlineRes] = await Promise.all([
            db.from('transactions').select('*, transaction_items(*)').eq('po_status', tab).order('created_at', { ascending: false }),
            db.from('online_orders').select('*').eq('po_status', tab).order('created_at', { ascending: false })
          ]);
          setDataKasir(kasirRes.data || []);
          setDataOnline(onlineRes.data || []);
        } catch (e) { console.error(e); notify("Gagal memuat PO: " + e.message); }
        setLoading(false);
      };

      useEffect(() => { loadData(); }, [tab]);

      const markDelivered = async (type, id) => {
        if (!confirm("Tandai pesanan PO ini sudah diserahkan?")) return;
        try {
          const db = window.supabase;
          if (type === 'kasir') await db.from('transactions').update({ po_status: 'delivered' }).eq('id', id);
          else await db.from('online_orders').update({ po_status: 'delivered' }).eq('id', id);
          notify("Berhasil ditandai.");
          loadData();
        } catch(e) { notify("Gagal update PO: " + e.message); }
      };

      const kData = dataKasir.map(t => ({ ...t, _type: 'kasir' }));
      const oData = dataOnline.map(t => ({ ...t, _type: 'online' }));
      const displayList = [...kData, ...oData].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

      return (
        <div className="p-4 sm:p-6 pb-24 max-w-4xl mx-auto animate-fade-in">
          <div className="flex justify-between items-center mb-6">
            <div>
              <h1 className="text-2xl font-black tracking-tight text-gray-800">Monitor PO</h1>
              <p className="text-sm text-gray-500 font-medium">Pantau pesanan Pre-Order yang belum/sudah diserahkan</p>
            </div>
            <button onClick={loadData} disabled={loading} className="p-2.5 bg-white border border-gray-200 text-gray-600 hover:text-brand hover:border-brand rounded-xl transition-all shadow-sm group">
              <svg className={`w-5 h-5 ${loading ? 'animate-spin text-brand' : 'group-hover:rotate-180 transition-transform duration-500'}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            </button>
          </div>

          <div className="flex bg-gray-100 p-1.5 rounded-xl mb-6">
            <button onClick={() => setTab('pending')} className={`flex-1 py-2.5 text-xs font-black uppercase tracking-wider rounded-lg transition-all ${tab === 'pending' ? 'bg-white text-purple-600 shadow-sm' : 'text-gray-400 hover:text-gray-600'}`}>Antrean (Menunggu)</button>
            <button onClick={() => setTab('delivered')} className={`flex-1 py-2.5 text-xs font-black uppercase tracking-wider rounded-lg transition-all ${tab === 'delivered' ? 'bg-white text-brand shadow-sm' : 'text-gray-400 hover:text-gray-600'}`}>Selesai (Diserahkan)</button>
          </div>

          <div className="space-y-4">
            {displayList.length === 0 && !loading && <div className="text-center py-10 bg-white rounded-2xl border border-gray-100"><div className="text-gray-300 mb-3"><svg className="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg></div><div className="text-gray-400 font-medium text-sm">Belum ada pesanan PO di status ini</div></div>}
            {displayList.map(t => (
              <div key={t.id} className="bg-white p-4 rounded-2xl border border-purple-100 shadow-sm hover:shadow-md hover:border-purple-300 transition-all">
                <div className="flex justify-between items-start mb-3">
                  <div>
                    <div className="flex items-center gap-2 mb-1">
                      <span className={`text-[10px] font-black px-2 py-0.5 rounded uppercase ${t._type === 'online' ? 'bg-blue-100 text-blue-700' : 'bg-orange-100 text-orange-700'}`}>
                        {t._type === 'online' ? 'Order Online' : 'Kasir'}
                      </span>
                      <span className="text-[10px] font-mono font-bold text-gray-500">{t.tx_code || t.order_code}</span>
                    </div>
                    <div className="font-extrabold text-gray-800 text-base">{t.customer_name || 'Umum'}</div>
                    <div className="text-xs text-gray-500 font-medium">{new Date(t.created_at).toLocaleString('id-ID')}</div>
                  </div>
                  {tab === 'pending' && (
                    <button onClick={() => markDelivered(t._type, t.id)} className="px-3 py-1.5 bg-purple-100 hover:bg-purple-600 hover:text-white text-purple-700 rounded-lg text-xs font-bold transition-all border border-purple-200 hover:border-purple-600">
                      Tandai Diserahkan
                    </button>
                  )}
                </div>
                <div className="bg-gray-50 rounded-xl p-3 text-xs text-gray-600 font-medium">
                  {t._type === 'kasir' ? (
                    t.transaction_items?.map((i, idx) => <div key={idx} className="flex justify-between py-0.5 border-b border-gray-100 last:border-0"><span className={i.is_po ? 'text-purple-600 font-bold' : ''}>{i.qty}x {i.name}</span></div>)
                  ) : (
                    Array.isArray(t.items_json) && t.items_json.map((i, idx) => <div key={idx} className="flex justify-between py-0.5 border-b border-gray-100 last:border-0"><span className={i.is_po ? 'text-purple-600 font-bold' : ''}>{i.qty}x {i.name}</span></div>)
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

function Dashboard({ products, transactions, customers, cashiers, sessions, settings, color, notify, onRefresh }) {

          <div className="grid grid-cols-2 gap-3">
            {[
              { label: "Total Produk", val: products.length, d: "M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4", c: "text-blue-500", bg: "bg-blue-50" }, 
              { label: "Pelanggan", val: customers.length, d: "M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z", c: "text-purple-500", bg: "bg-purple-50" }, 
              { label: "Stok Tipis", val: lowStock.length, d: "M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z", c: "text-orange-500", bg: "bg-orange-50" }, 
              { label: "Sesi Aktif", val: openSessions.length, d: "M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15", c: openSessions.length > 0 ? "text-brand" : "text-gray-400", bg: openSessions.length > 0 ? "bg-green-50" : "bg-gray-50" }
            ].map(s => (

    function KonversiPanel({ products, color, notify, onReload }) {

        const grouped = {};
        (data||[]).forEach(d => {
           if (!d.reference_id) return;
           if (!grouped[d.reference_id]) grouped[d.reference_id] = { id: d.reference_id, out: null, in: null, date: d.transaction_date, notes: d.notes };
           if (d.type === 'conversion_out') grouped[d.reference_id].out = d;
           if (d.type === 'conversion_in') grouped[d.reference_id].in = d;
        });
        setTxs(Object.values(grouped).filter(g => g.out && g.in));
        setLoading(false);
      }, []);

      useEffect(() => { loadData(); }, [loadData]);

      const save = async () => {
        if (!form.out_sku || !form.in_sku) return notify("Barang asal & hasil wajib dipilih!");
        if (!form.out_qty || !form.in_qty) return notify("Qty wajib diisi!");

          onReload();

    function OpnamePanel({ products, color, notify, onReload }) {
      const [txs, setTxs] = useState([]);
      const [loading, setLoading] = useState(false);
      const [saving, setSaving] = useState(false);
      const [form, setForm] = useState({ product_sku: "", physical_qty: "", notes: "" });

      const loadData = useCallback(async () => {
        setLoading(true);
        const { data } = await db.from("inventory_transactions").select("*").eq('type', 'opname').order("transaction_date", { ascending: false }).limit(100);
        setTxs(data || []);
        setLoading(false);
      }, []);

      useEffect(() => { loadData(); }, [loadData]);

      const save = async () => {
        if (!form.product_sku) return notify("Produk wajib dipilih!");
        if (form.physical_qty === "") return notify("Stok fisik wajib diisi!");
        
        const prod = products.find(p => p.sku === form.product_sku);
        if (!prod) return notify("Produk tidak ditemukan!");
        
        const sysQty = prod.stock || 0;
        const physQty = parseInt(form.physical_qty);
        const diff = physQty - sysQty;
        
        if (diff === 0) return notify("Stok fisik sama dengan sistem, tidak ada penyesuaian.");
        
        setSaving(true);
        try {
          const { error } = await db.from("inventory_transactions").insert([{
            type: 'opname', product_sku: form.product_sku, qty: diff, notes: form.notes || `Sistem: ${sysQty}, Fisik: ${physQty}`
          }]);
          if (error) throw error;
          notify("Opname berhasil dicatat!");
          setForm({ product_sku: "", physical_qty: "", notes: "" });
          loadData();
          onReload();
        } catch (e) { notify("Gagal: " + e.message); }
        setSaving(false);
      };

      const productOpts = useMemo(() => products.map(p => ({ sku: p.sku, name: p.variant_name ? `${p.name} - ${p.variant_name}` : p.name, stock: p.stock||0 })).sort((a,b) => a.name.localeCompare(b.name)), [products]);
      const selectedProd = form.product_sku ? productOpts.find(p => p.sku === form.product_sku) : null;
      const sysQty = selectedProd ? selectedProd.stock : 0;
      const diff = form.physical_qty !== "" ? parseInt(form.physical_qty) - sysQty : 0;

      return (
        <div className="space-y-4 animate-fade-up">
          <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex flex-col md:flex-row gap-4 items-end">
            <div className="flex-[2] w-full space-y-4">
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-widest">Pilih Produk *</label>
                <select value={form.product_sku} onChange={e => setForm({...form, product_sku: e.target.value})} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30">
                  <option value="">-- Pilih Produk --</option>
                  {productOpts.map(p => <option key={p.sku} value={p.sku}>{p.name} (Stok: {p.stock})</option>)}
                </select>
              </div>
            </div>
            
            <div className="flex-1 w-full space-y-4">
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-widest">Stok Aktual (Fisik) *</label>
                <input type="number" min="0" value={form.physical_qty} onChange={e => setForm({...form, physical_qty: e.target.value})} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-bold focus:outline-none focus:ring-2 focus:ring-brand/30" placeholder="0" />
              </div>
            </div>

            <div className="flex-1 w-full flex flex-col gap-2">
              <div className="text-xs text-center py-2 px-3 bg-gray-50 rounded-lg border border-gray-200">
                Selisih: <span className={`font-black ${diff > 0 ? 'text-green-600' : diff < 0 ? 'text-red-500' : 'text-gray-500'}`}>{diff > 0 ? '+'+diff : diff}</span>
              </div>
              <button onClick={save} disabled={saving || !form.product_sku || form.physical_qty === ""} className="w-full py-2.5 bg-blue-600 text-white font-bold rounded-lg shadow-sm hover:bg-blue-700 active:scale-95 transition-all text-sm disabled:opacity-50 disabled:active:scale-100">Sesuaikan Stok</button>
            </div>
          </div>

          {loading ? <Spinner /> : txs.length === 0 ? <div className="text-center text-gray-400 py-10 text-sm font-medium bg-white rounded-2xl border border-gray-100">Belum ada riwayat opname</div> : (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
              <table className="w-full text-left text-sm min-w-[500px]">
                <thead className="bg-gray-50 text-gray-500 text-xs uppercase tracking-widest font-bold">
                  <tr>
                    <th className="px-4 py-3 border-b">Tanggal</th>
                    <th className="px-4 py-3 border-b">Produk</th>
                    <th className="px-4 py-3 border-b">Penyesuaian</th>
                    <th className="px-4 py-3 border-b">Keterangan</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {txs.map(t => {
                    const prod = productOpts.find(p => p.sku === t.product_sku);
                    return (
                      <tr key={t.id} className="hover:bg-gray-50/50 transition-colors">
                        <td className="px-4 py-3 text-gray-500 text-xs">{new Date(t.transaction_date).toLocaleString('id-ID')}</td>
                        <td className="px-4 py-3">
                          <div className="font-bold text-gray-800">{prod ? prod.name : t.product_sku}</div>
                          <div className="text-[10px] text-gray-400 font-mono">{t.product_sku}</div>
                        </td>
                        <td className="px-4 py-3">
                          <span className={`px-2 py-1 rounded text-[11px] font-black ${t.qty > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}`}>
                            {t.qty > 0 ? '+' : ''}{t.qty}
                          </span>
                        </td>
                        <td className="px-4 py-3 text-xs text-gray-500 italic">
                          {t.notes || '-'}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    // ── PRODUK ────────────────────────────────────────────────────
    function Produk({ products, notify, onReload, loading, color, settings, onReloadSettings }) {
      const defaultCats = ["Kurma", "Parfum", "Madu", "Tasbih", "Sajadah", "Busana Muslim", "Herbal", "Air Zamzam", "Souvenir", "Lainnya"];
      const dynamicCats = settings.product_categories ? settings.product_categories.split(",").map(s => s.trim()).filter(Boolean) : defaultCats;
      const dynamicBrands = (settings.product_brands || "").split(",").map(s => s.trim()).filter(Boolean);
      const dynamicEtalase = (settings.product_etalase || "").split(",").map(s => s.trim()).filter(Boolean);
      const [modal, setModal] = useState(null);
      const [form, setForm] = useState({ sku: "", name: "", brand: "", description: "", cost_price: "", price: "", promo_price: "", promo_percentage: "", stock: "", category: "Kurma", sub_category: "", weight: "", weight_unit: "g", has_variants: false, variant_types: [], variants: [], image_url: "", etalase: "", is_po: false });
      const [search, setSearch] = useState("");
      const [filterCategory, setFilterCategory] = useState("");
      const [filterEtalase, setFilterEtalase] = useState("");
      const [saving, setSaving] = useState(false);
      const [showMenu, setShowMenu] = useState(false);
      const [activeTab, setActiveTab] = useState('daftar');
      const [editVariants, setEditVariants] = useState(false);
      const fileRef = useRef();
      const imageRef = useRef();
      const [uploadingImage, setUploadingImage] = useState(false);
      const [sliderIdx, setSliderIdx] = useState(0);
      const [uploadTarget, setUploadTarget] = useState('main');

      const [mediaPickerOpen, setMediaPickerOpen] = useState(false);
      const [mediaPickerTarget, setMediaPickerTarget] = useState('main');

      const openMediaPicker = (target) => {
        setMediaPickerTarget(target);
        setMediaPickerOpen(true);
      };

      const handleMediaSelect = (url) => {
        if (typeof mediaPickerTarget === 'number') {
          setForm(f => {
            const nv = [...f.variants];
            nv[mediaPickerTarget].image_url = url;
            return { ...f, variants: nv };
          });
          notify("Foto varian diperbarui!");
        } else {
          setForm(f => {
            const currentUrls = f.image_url ? f.image_url.split(',').map(s => s.trim()).filter(Boolean) : [];
            currentUrls.push(url);
            return { ...f, image_url: currentUrls.join(', ') };
          });
          notify("Media ditambahkan!");
        }
      };

      const grouped = useMemo(() => {
        const map = {};
        products.forEach(p => {
          if (!p.sku) return;
          const key = p.sku.split('-')[0];
          const isVariant = p.sku.includes('-');
          if (!map[key]) {
            map[key] = { ...p, variants: [] };
          }
          if (isVariant) {
            map[key].variants.push(p);
          } else {
            // If it's a base product (no -), it's the main representative
            const vars = map[key].variants;
            map[key] = { ...p, variants: vars };
          }
        });
        return Object.values(map).sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
      }, [products]);

      const filtered = grouped.filter(p => {
        const matchesSearch = (p.name || "").toLowerCase().includes(search.toLowerCase()) || 
                              (p.sku || "").toLowerCase().includes(search.toLowerCase()) || 
                              (p.brand || "").toLowerCase().includes(search.toLowerCase());
        const matchesCategory = !filterCategory || p.category === filterCategory;
        const matchesEtalase = !filterEtalase || p.etalase === filterEtalase;
        return matchesSearch && matchesCategory && matchesEtalase;
      });
      const handleSKUChange = (val) => {
        const clean = val.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
        setForm(f => ({ 
          ...f, 
          sku: clean,
          variants: f.variants.map(v => {
            const suffix = v.sku.includes('-') ? v.sku.split('-')[1] : v.name.replace(/\s+/g, '').toUpperCase();
            return { ...v, sku: clean ? `${clean}-${suffix}` : "" };
          })
        }));
      };
      const autoName = () => {
        const parts = [form.category, form.sub_category, form.brand];
        if (!form.has_variants && form.weight) parts.push(`${form.weight} ${form.weight_unit}`);
        setForm(f => ({ ...f, name: parts.filter(Boolean).join(" ") }));
      };
      const autoSKU = () => {
        const p1 = (form.category || "").slice(0, 3).toUpperCase();
        const p2 = (form.sub_category || "").slice(0, 3).toUpperCase();
        const p3 = (form.brand || "").slice(0, 3).toUpperCase();
        const prefix = [p1, p2, p3].filter(Boolean).join("-") || "PRD";
        const nums = products.filter(x => x.sku && x.sku.startsWith(prefix)).map(x => parseInt(x.sku.replace(prefix + '-', ''))).filter(n => !isNaN(n));
        const newSku = `${prefix}-${String(nums.length > 0 ? Math.max(...nums) + 1 : 1).padStart(3, "0")}`;
        handleSKUChange(newSku);
      };
      const generateAI = () => {
        const parts = [form.category, form.sub_category, form.brand].filter(Boolean).join(" ");
        let desc = `Produk ${parts} berkualitas premium.`;
        if (form.weight && !form.has_variants) desc += ` Hadir dalam kemasan praktis ${form.weight} ${form.weight_unit}.`;
        if (form.has_variants && form.variants.length > 0) {
          desc += ` Tersedia dalam berbagai pilihan menarik: ${form.variants.map(v => v.name).join(", ")}.`;
        }
        desc += `\n\nSangat cocok untuk Anda jadikan oleh-oleh haji dan umroh maupun untuk pemakaian pribadi. Dapatkan segera dengan harga terbaik di ${settings?.store_name || 'Toko Azzahro'}!`;
        setForm(f => ({ ...f, description: desc }));
        notify("Deskripsi otomatis berhasil dibuat!");
      };

      const [vModal, setVModal] = useState(false);
      const [vForm, setVForm] = useState({ categories: settings.product_categories, brands: settings.product_brands });
      const saveVars = async () => {
        setSaving(true);
        await db.from("settings").upsert({ key: "product_categories", value: vForm.categories }, { onConflict: "key" });
        await db.from("settings").upsert({ key: "product_brands", value: vForm.brands }, { onConflict: "key" });
        notify("Variabel diupdate!");
        setSaving(false); setVModal(false); onReloadSettings();
      };
      
      const [etModal, setEtModal] = useState(false);
      const [etActive, setEtActive] = useState("");
      const [etList, setEtList] = useState((settings.product_etalase || "").split(",").map(s => s.trim()).filter(Boolean));
      const [etSelectedProds, setEtSelectedProds] = useState([]);
      const [etEditMode, setEtEditMode] = useState(false);
      const [etNamesForm, setEtNamesForm] = useState(settings.product_etalase || "");

      useEffect(() => {
        if (etActive) {
          const selected = products.filter(p => p.etalase === etActive).map(p => p.sku.split('-')[0]);
          setEtSelectedProds(Array.from(new Set(selected)));
        } else {
          setEtSelectedProds([]);
        }
      }, [etActive, products]);

      const saveEtProducts = async () => {
        if (!etActive) return notify("Pilih etalase dulu!");
        setSaving(true);
        try {
          await db.from("products").update({ etalase: null }).eq("etalase", etActive);
          if (etSelectedProds.length > 0) {
             for (const prefix of etSelectedProds) {
                await db.from("products").update({ etalase: etActive }).ilike("sku", `${prefix}%`);
             }
          }
          notify("Produk etalase diperbarui!");
          onReload();
          setEtModal(false);
        } catch (e) { notify("Gagal: " + e.message); }
        setSaving(false);
      };

      const saveEtNames = async () => {
        setSaving(true);
        await db.from("settings").upsert({ key: "product_etalase", value: etNamesForm }, { onConflict: "key" });
        setEtList(etNamesForm.split(",").map(s => s.trim()).filter(Boolean));
        setEtEditMode(false);
        onReloadSettings();
        setSaving(false);
      };
      
      const generateMatrix = () => {
        setForm(f => {
          let combs = [[]];
          f.variant_types.forEach(t => { 
            const opts = (t.options_string || "").split(",").map(s => s.trim()).filter(Boolean);
            if(opts.length > 0) { const temp = []; combs.forEach(c => { opts.forEach(o => temp.push([...c, o])); }); combs = temp; } 
          });
          if (combs.length === 1 && combs[0].length === 0) combs = [];
          const newVariants = combs.map(c => {
            const name = c.join(" ");
            const suffix = c.map(x => x.slice(0, 3).toUpperCase().replace(/[^A-Z0-9]/g, '')).join("");
            const existing = f.variants.find(v => v.name === name);
            if (existing) return { ...existing, sku: f.sku ? `${f.sku}-${suffix}` : "" };
            // Partial match: if this new combo contains an old variant name, inherit its values
            const partial = f.variants.find(v => name.includes(v.name) || v.name.includes(name));
            if (partial) return { ...partial, name, sku: f.sku ? `${f.sku}-${suffix}` : "" };
            return { sku: f.sku ? `${f.sku}-${suffix}` : "", name, cost_price: 0, price: 0, stock: 0, is_po: false, weight: "", weight_unit: f.weight_unit || "g" };
          });
          return { ...f, variants: newVariants };
        });
        setEditVariants(false);
        notify("Matrix diperbarui!");
      };
      const addVarType = () => { if(form.variant_types.length >= 2) return notify("Maksimal 2 tipe varian!"); setForm(f => ({ ...f, variant_types: [...f.variant_types, { name: "", options_string: "" }] })); };
      const updateVarType = (idx, field, val) => { const nt = [...form.variant_types]; nt[idx][field] = val; setForm(f => ({ ...f, variant_types: nt })); };
      const remVarType = idx => { const nt = form.variant_types.filter((_, i) => i !== idx); setForm(f => ({ ...f, variant_types: nt })); };
      const updateVarItem = (idx, field, val) => { setForm(f => { const nv = [...f.variants]; nv[idx][field] = val; return { ...f, variants: nv }; }); };

      const save = async () => {
        if (!form.name || (!form.has_variants && !form.price)) return notify("Nama & harga utama wajib!");
        if (form.has_variants && form.variants.length === 0) return notify("Varian belum ditambahkan!");
        if (!form.sku) return notify("SKU wajib!");
        setSaving(true);
        
        const variantPayloads = form.has_variants ? form.variants.map(v => ({
          sku: v.sku || `${form.sku}-${v.name.replace(/\s+/g, '').toUpperCase()}`,
          name: form.name, brand: form.brand, description: form.description,
          category: form.category, sub_category: form.sub_category, etalase: form.etalase, 
          image_url: form.image_url ? (v.image_url ? `${form.image_url}, ${v.image_url}` : form.image_url) : (v.image_url || ''),
          variant_name: v.name,
          variant_options: form.variant_types.map(vt => ({ name: vt.name, options: (vt.options_string||"").split(",").map(s=>s.trim()).filter(Boolean) })),
          cost_price: parseInt(v.cost_price)||0,
          price: parseInt(v.price)||0,
          promo_price: parseInt(v.promo_price)||0,
          promo_percentage: parseInt(v.promo_percentage)||0,
          stock: parseInt(v.stock)||0,
          is_po: !!v.is_po,
          weight: v.weight,
          weight_unit: v.weight_unit || "g",
          active: true
        })) : [{
          sku: form.sku, name: form.name, brand: form.brand, description: form.description,
          category: form.category, sub_category: form.sub_category, etalase: form.etalase, image_url: form.image_url || `https://placehold.co/400x400/114232/white?text=${encodeURIComponent(form.name.slice(0, 4))}`,
          variant_options: [],
          cost_price: parseInt(form.cost_price)||0,
          price: parseInt(form.price)||0,
          promo_price: parseInt(form.promo_price)||0,
          promo_percentage: parseInt(form.promo_percentage)||0,
          stock: parseInt(form.stock) || 0,
          is_po: !!form.is_po,
          weight: form.weight,
          weight_unit: form.weight_unit,
          active: true
        }];

        // Delete old rows if editing
        if (modal !== "add") {
          const old = products.find(p => p.id === modal);
          const oldPrefix = (old.sku || "").split('-')[0];
          await db.from("products").delete().ilike('sku', `${oldPrefix}%`);
        }

        const { error } = await db.from("products").insert(variantPayloads);
        
        setSaving(false);
        if (error) return notify("Gagal: " + error.message);
        setModal(null); onReload();
      };
      const del = async (p) => {
        const prefix = (p.sku || "").split('-')[0];
        const { error } = await db.from("products").delete().ilike('sku', `${prefix}%`);
        if (error) return notify("Gagal: " + error.message);
        notify("Dihapus!"); onReload();
      };
      const openEdit = p => {
        const prefix = (p.sku || "").split('-')[0];
        const items = products.filter(x => (x.sku || "").startsWith(prefix));
        const first = items[0] || p;
        const variants = items.filter(x => x.sku.includes('-'));
        
        // Extract product images (shared by all variants)
        const allUrls = items.map(x => (x.image_url || '').split(',').map(s=>s.trim()).filter(Boolean));
        const firstUrls = allUrls[0] || [];
        const productUrls = firstUrls.filter(u => allUrls.every(urls => urls.includes(u)));
        const prodImageUrlStr = productUrls.join(', ');
        
        setModal(first.id);
        setForm({
          sku: prefix, name: first.name, brand: first.brand || "", description: first.description || "",
          cost_price: first.cost_price || "", price: first.price || "", promo_price: first.promo_price || "", promo_percentage: first.promo_percentage || "", stock: first.stock || "",
          category: first.category, sub_category: first.sub_category || "", etalase: first.etalase || "", is_po: first.is_po || false, weight: first.weight || "", weight_unit: first.weight_unit || "g",
          has_variants: variants.length > 0,
          variant_types: (first.variant_options || []).map(vt => ({ name: vt.name, options_string: (vt.options || []).join(", ") })),
          variants: variants.map(v => {
            const vUrls = (v.image_url || '').split(',').map(s=>s.trim()).filter(Boolean);
            const specificUrls = vUrls.filter(u => !productUrls.includes(u));
            return {
              sku: v.sku, name: v.variant_name, cost_price: v.cost_price, price: v.price, promo_price: v.promo_price, promo_percentage: v.promo_percentage, stock: v.stock, is_po: !!v.is_po, weight: v.weight, weight_unit: v.weight_unit,
              image_url: specificUrls.join(', ') // store only variant specific image
            };
          }),
          image_url: prodImageUrlStr || first.image_url || ""
        });
      };

      const exportXLSX = () => { const ws = XLSX.utils.json_to_sheet(products.map(p => ({ SKU: p.sku, Nama: p.name, NamaVarian: p.variant_name || "", Merk: p.brand, Deskripsi: p.description, HargaBeli: p.cost_price, Harga: p.price, Stok: p.stock, Kategori: p.category, SubKategori: p.sub_category || "", Etalase: p.etalase || "", PO: p.is_po ? "Ya" : "Tidak", Berat: `${p.weight || ""}${p.weight_unit || ""}`, Foto: p.image_url }))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Produk"); XLSX.writeFile(wb, `produk_${Date.now()}.xlsx`); notify("Diexport!"); setShowMenu(false); };
      const dlTemplate = () => { const ws = XLSX.utils.json_to_sheet([{ SKU: "KUR001", Nama: "Kurma Ajwa", NamaVarian: "", Merk: "Azzahro", Deskripsi: "Kurma premium", HargaBeli: 40000, Harga: 50000, Stok: 10, Kategori: "Kurma", SubKategori: "Premium", Etalase: "Depan", PO: "Tidak", Berat: "500g", Foto: "https://link-foto1.com, https://link-foto2.com" }, { SKU: "KUR002-MER500", Nama: "Kurma Sukari", NamaVarian: "Merah 500g", Merk: "Azzahro", Deskripsi: "Manis lembut", HargaBeli: 35000, Harga: 45000, Stok: 5, Kategori: "Kurma", SubKategori: "Basah", Etalase: "Rak A", PO: "Tidak", Berat: "500g", Foto: "" }]); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Produk"); XLSX.writeFile(wb, "template_produk.xlsx"); notify("Template didownload!"); setShowMenu(false); };
      const importFile = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async ev => {
          try {
            const wb = XLSX.read(ev.target.result, { type: "binary" });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            const imported = rows.map(r => ({
              sku: String(r.SKU || uid()),
              name: r.Nama || "Tanpa Nama",
              variant_name: r.NamaVarian || "",
              brand: r.Merk || "",
              description: r.Deskripsi || "",
              cost_price: parseInt(r.HargaBeli) || 0,
              price: parseInt(r.Harga) || 0,
              stock: parseInt(r.Stok) || 0,
              category: r.Kategori || "Umum",
              sub_category: r.SubKategori || "",
              etalase: r.Etalase || "",
              is_po: String(r.PO).toLowerCase() === "ya",
              weight: String(r.Berat || "").replace(/[^0-9.]/g, ""),
              weight_unit: String(r.Berat || "g").replace(/[0-9.]/g, "") || "g",
              image_url: r.Foto || "",
              is_parent: !String(r.SKU).includes('-'),
              parent_sku: String(r.SKU).split('-')[0],
              active: true
            }));
            let added = 0, updated = 0;
            for (const item of imported) { 
              const { error } = await db.from("products").upsert(item, { onConflict: "sku" });
              if (!error) added++;
            }
            notify(`${added} baris diproses`); onReload();
          } catch (err) { notify("Gagal import: " + err.message); }
          e.target.value = "";
        };
        reader.readAsBinaryString(file);
      };

      return (
        <div className="p-4">
          <div className="flex gap-1 overflow-x-auto no-scrollbar mb-4 bg-gray-100 p-1 rounded-xl border border-gray-200">
            {[
              { id: 'daftar', label: 'Daftar Produk' },

              ) : (

          {activeTab === 'vendor' && <VendorPanel color={color} notify={notify} />}
