<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Admin — Toko Azzahro</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { brand: '#114232', brandLight: '#EDF2F0', gold: '#D4AF37', goldLight: '#FDF8E7', dark: '#0A2517', grayLight: '#F8F9FB' },
          animation: { 'fade-up': 'fadeUp 0.3s ease-out', shake: 'shake 0.4s ease-in-out' },
          keyframes: {
            fadeUp: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            shake: { '0%, 100%': { transform: 'translateX(0)' }, '25%': { transform: 'translateX(-6px)' }, '75%': { transform: 'translateX(6px)' } }
          }
        }
      }
    }
  </script>
  <style>
    .card-member {
      background: linear-gradient(135deg, #114232 0%, #1a6b3c 40%, #D4AF37 100%);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
      color: white;
    }
    .card-member::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 140px; height: 140px;
      background: rgba(255,255,255,0.07);
      border-radius: 50%;
    }
    .card-member::after {
      content: '';
      position: absolute;
      bottom: -50px; left: -20px;
      width: 180px; height: 180px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .animate-float { animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .animate-scale-in { animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes scaleIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
  </style>
</head>

<body class="bg-grayLight text-gray-800 font-sans antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = "https://xliwxtakluemverkgwrv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsaXd4dGFrbHVlbXZlcmtnd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjEzNTQsImV4cCI6MjA5MjA5NzM1NH0.XaP6ad5rvhA8EMlCSGy6FIoNltBMiDwQ4fLxe9BwVy8";
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const CATS = ["Semua", "Air Zamzam", "Kurma", "Tasbih", "Sajadah", "Parfum", "Peci & Mukena", "Lainnya"];
    const PAY_METHODS = ["Cash", "Transfer Bank", "QRIS"];
    const fmt = n => new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", minimumFractionDigits: 0 }).format(n);
    const fmtDate = d => new Date(d).toLocaleDateString("id-ID", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
    const uid = () => Math.random().toString(36).substr(2, 9).toUpperCase();
    const txCode = c => `#${c}`;
    const genSKU = (cat, existing) => {
      const p = { "Air Zamzam": "ZAM", "Kurma": "KUR", "Tasbih": "TAS", "Sajadah": "SAJ", "Parfum": "PAR", "Peci & Mukena": "PEC", "Lainnya": "LAN" }[cat] || "PRD";
      const nums = existing.filter(x => x.sku && x.sku.startsWith(p)).map(x => parseInt(x.sku.split("-")[1] || "0")).filter(n => !isNaN(n));
      return `${p}-${String(nums.length > 0 ? Math.max(...nums) + 1 : 1).padStart(3, "0")}`;
    };

    function Toast({ msg }) { if (!msg) return null; return <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-dark text-white px-5 py-2.5 rounded-full z-[9999] text-sm font-medium shadow-xl whitespace-nowrap animate-fade-up">{msg}</div>; }
    function Modal({ children, onClose, title }) {
      return (
        <div className="fixed inset-0 bg-black/50 z-[200] flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity" onClick={onClose}>
          <div className="bg-white rounded-t-2xl sm:rounded-2xl flex flex-col w-full max-w-md max-h-[90vh] animate-fade-up shadow-2xl" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center p-5 border-b border-gray-100 shrink-0">
              <h3 className="font-extrabold text-lg text-gray-900">{title}</h3>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center bg-gray-100 hover:bg-gray-200 rounded-full text-gray-500 font-bold transition-colors">✕</button>
            </div>
            <div className="p-5 overflow-y-auto flex-1">{children}</div>
          </div>
        </div>
      );
    }
    function Spinner() { return <div className="flex items-center justify-center p-10"><div className="w-8 h-8 border-4 border-gray-200 border-t-brand rounded-full animate-spin"></div></div>; }
    
    function MemberCard({ customer, storeName, storeColor }) {
      const color = storeColor || '#114232';
      const joinDate = customer.created_at ? new Date(customer.created_at).toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' }) : new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
      return (
        <div className="card-member p-6 text-white animate-scale-in" style={{ background: `linear-gradient(135deg, #0A2517 0%, ${color} 50%, #D4AF37 100%)` }}>
          <div className="relative z-10 text-left">
            <div className="flex justify-between items-start mb-6">
              <div>
                <div className="text-[10px] font-bold uppercase tracking-widest opacity-70 mb-1">Member Card</div>
                <div className="text-lg font-black leading-tight">{storeName || 'Toko Azzahro'}</div>
              </div>
              <div className="text-3xl animate-float">⭐</div>
            </div>
            <div className="bg-white/10 rounded-2xl p-4 mb-5 backdrop-blur-sm border border-white/20">
              <div className="text-[9px] font-bold uppercase tracking-widest opacity-60 mb-1">ID Member</div>
              <div className="font-mono font-black text-xl tracking-wider text-[#D4AF37]">{customer.customer_code || 'AZR-000000-0000'}</div>
            </div>
            <div className="mb-4">
              <div className="text-[9px] font-bold uppercase tracking-widest opacity-60 mb-1">Nama Member</div>
              <div className="font-extrabold text-lg truncate">{customer.name}</div>
              {customer.phone && <div className="text-sm opacity-70 font-medium mt-0.5">{customer.phone}</div>}
            </div>
            <div className="flex justify-between items-end">
              <div>
                <div className="text-[9px] font-bold uppercase tracking-widest opacity-60 mb-1">Bergabung</div>
                <div className="text-xs font-bold opacity-90">{joinDate}</div>
              </div>
              <div className="text-right">
                <div className="text-[9px] font-bold uppercase tracking-widest opacity-60 mb-1">Saldo Poin</div>
                <div className="text-2xl font-black text-white">{customer.points || 0} <span className="text-sm opacity-80">poin</span></div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── PIN PAD ──────────────────────────────────────────────────
    function PinPad({ onSuccess }) {
      const [pin, setPin] = useState("");
      const [shake, setShake] = useState(false);
      const [settings, setSettings] = useState(null);

      useEffect(() => { db.from("settings").select("*").then(({ data }) => { if (data) { const obj = {}; data.forEach(r => { obj[r.key] = r.value; }); setSettings(obj); } }); }, []);

      const press = d => {
        if (pin.length >= 6) return;
        const next = pin + d; setPin(next);
        if (next.length >= 4 && settings) {
          const adminPin = settings.admin_pin || "0000";
          const ownerPin = settings.owner_pin || "9999";
          if (next === ownerPin) { onSuccess("owner"); return; }
          if (next === adminPin) { onSuccess("admin"); return; }
          if (next.length >= 6) { setShake(true); setTimeout(() => { setPin(""); setShake(false); }, 600); }
        }
      };
      const del = () => setPin(p => p.slice(0, -1));

      return (
        <div className="min-h-screen bg-gradient-to-br from-dark to-brand flex flex-col items-center justify-center p-6">
          <div className="text-5xl mb-3">⚙️</div>
          <div className="text-white font-extrabold text-2xl mb-1">Admin Panel</div>
          <div className="text-white/60 text-sm mb-8 font-medium">Toko Azzahro — Haji & Umroh</div>
          <div className={`bg-white rounded-3xl p-7 w-full max-w-[320px] shadow-2xl ${shake ? 'animate-shake' : ''}`}>
            <div className="flex justify-center gap-3 mb-6">
              {[0, 1, 2, 3, 4, 5].map(i => <div key={i} className={`w-3.5 h-3.5 rounded-full transition-colors ${i < pin.length ? 'bg-dark' : 'bg-gray-200'}`} />)}
            </div>
            <div className="grid grid-cols-3 gap-2.5">
              {[1, 2, 3, 4, 5, 6, 7, 8, 9, "", 0, "⌫"].map((d, i) => (
                <button key={i} onClick={() => d === "" ? null : d === "⌫" ? del() : press(String(d))} disabled={d === ""}
                  className={`py-4 text-xl font-bold rounded-2xl ${d === "" ? 'invisible' : d === "⌫" ? 'bg-red-50 text-red-500 hover:bg-red-100' : 'bg-gray-50 text-dark hover:bg-gray-100 active:bg-gray-200'} transition-colors`}>
                  {d}
                </button>
              ))}
            </div>
            <div className="mt-4 text-center text-xs text-gray-400 font-medium">Admin PIN atau Owner PIN</div>
          </div>
          <a href="/" className="mt-8 text-white/50 text-sm font-medium hover:text-white transition-colors">← Kembali ke Katalog</a>
        </div>
      );
    }

    // ── KONTEN ────────────────────────────────────────────────────
    function KatalogPage({ settings, notify, onReload, color }) {
      const [tab, setTab] = useState("banner");
      const [saving, setSaving] = useState(false);

      // ── BANNER ──
      const parseBanners = () => { try { return JSON.parse(settings.banners || "[]"); } catch(_) { return []; } };
      const [banners, setBanners] = useState(parseBanners);
      const emptyBanner = { title: "", subtitle: "", image: "", link: "" };
      const [bForm, setBForm] = useState(emptyBanner);
      const [editIdx, setEditIdx] = useState(null);

      useEffect(() => { setBanners(parseBanners()); }, [settings.banners]);

      const saveBanners = async (list) => {
        setSaving(true);
        await db.from("settings").upsert({ key: "banners", value: JSON.stringify(list) }, { onConflict: "key" });
        setSaving(false); notify("Banner disimpan!"); onReload();
      };
      const addBanner = () => {
        if (!bForm.title && !bForm.image) return notify("Isi judul atau gambar!");
        const list = editIdx !== null ? banners.map((b, i) => i === editIdx ? { ...bForm } : b) : [...banners, { ...bForm }];
        setBanners(list); saveBanners(list); setBForm(emptyBanner); setEditIdx(null);
      };
      const delBanner = (i) => { const list = banners.filter((_n, j) => j !== i); setBanners(list); saveBanners(list); };
      const editBanner = (i) => { setBForm({ ...banners[i] }); setEditIdx(i); };

      // ── TENTANG KAMI ──
      const parseServices = () => { try { return JSON.parse(settings.about_services || "[]"); } catch(_) { return [{ icon: "🕌", title: "", desc: "" }]; } };
      const parseLinks = () => { try { return JSON.parse(settings.about_extra_links || "[]"); } catch(_) { return []; } };
      const defaultLayout = { show_banner: true, show_category: true, show_etalase: true, default_view: "grid", hidden_etalases: [] };
      const parseLayout = () => { try { return { ...defaultLayout, ...JSON.parse(settings.catalog_layout || "{}") }; } catch(_) { return defaultLayout; } };
      
      const [about, setAbout] = useState({
        about_hero_image: settings.about_hero_image || "",
        about_description: settings.about_description || "",
        about_cta_label: settings.about_cta_label || "Hubungi Kami via WhatsApp",
      });
      const [services, setServices] = useState(parseServices);
      const [extraLinks, setExtraLinks] = useState(parseLinks);
      const [layout, setLayout] = useState(parseLayout);

      useEffect(() => {
        setAbout({ about_hero_image: settings.about_hero_image || "", about_description: settings.about_description || "", about_cta_label: settings.about_cta_label || "Hubungi Kami via WhatsApp" });
        setServices(parseServices()); setExtraLinks(parseLinks());
        setLayout(parseLayout());
      }, [settings]);

      const saveAbout = async () => {
        setSaving(true);
        const pairs = [
          ...Object.entries(about),
          ["about_services", JSON.stringify(services)],
          ["about_extra_links", JSON.stringify(extraLinks)],
        ];
        for (const [key, value] of pairs) {
          await db.from("settings").upsert({ key, value }, { onConflict: "key" });
        }
        setSaving(false); notify("Tentang Kami disimpan!"); onReload();
      };

      const tabCls = (t) => `px-4 py-2 rounded-full text-xs font-black uppercase tracking-wider transition-all ${tab === t ? 'bg-dark text-white shadow' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}`;

      return (
        <div className="p-4">
          <div className="flex justify-between items-center mb-5">
            <h2 className="font-extrabold text-lg text-gray-800">Manajemen Katalog</h2>
            <a href="tentangkami.html" target="_blank" className="text-xs font-bold text-brand hover:underline flex items-center gap-1">
              Lihat Halaman
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 5l7 7-7 7M3 12h18"/></svg>
            </a>
          </div>
          <div className="flex gap-2 mb-6">
            <button onClick={() => setTab("banner")} className={tabCls("banner")}>🖼 Banner</button>
            <button onClick={() => setTab("tentang")} className={tabCls("tentang")}>🏪 Tentang Kami</button>
            <button onClick={() => setTab("layout")} className={tabCls("layout")}>⚙️ Layout</button>
          </div>

          {tab === "banner" && (
            <div className="space-y-4 animate-fade-up">
              <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 space-y-3">
                <div className="font-bold text-sm text-gray-700 mb-2">{editIdx !== null ? "Edit Banner" : "Tambah Banner Baru"}</div>
                <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">Judul</label><input value={bForm.title} onChange={e => setBForm(p => ({ ...p, title: e.target.value }))} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" placeholder="Promo Spesial Ramadan..." /></div>
                <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">Subjudul</label><input value={bForm.subtitle} onChange={e => setBForm(p => ({ ...p, subtitle: e.target.value }))} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" placeholder="Diskon hingga 20%..." /></div>
                <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">URL Gambar (opsional)</label><input value={bForm.image} onChange={e => setBForm(p => ({ ...p, image: e.target.value }))} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" placeholder="https://..." /></div>
                <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">Link (opsional)</label><input value={bForm.link} onChange={e => setBForm(p => ({ ...p, link: e.target.value }))} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" placeholder="index.html?sku=... atau https://..." /></div>
                <div className="flex gap-2 pt-1">
                  {editIdx !== null && <button onClick={() => { setBForm(emptyBanner); setEditIdx(null); }} className="px-4 py-2 bg-gray-100 rounded-xl text-sm font-bold text-gray-600">Batal</button>}
                  <button onClick={addBanner} disabled={saving} className="flex-1 py-2.5 bg-dark hover:bg-gray-900 text-white rounded-xl font-bold text-sm transition-all disabled:opacity-50">{saving ? "Menyimpan..." : editIdx !== null ? "Update Banner" : "Tambah Banner"}</button>
                </div>
              </div>

              {banners.length === 0 && <div className="text-center text-gray-400 py-8 text-sm bg-white rounded-2xl border border-gray-100">Belum ada banner</div>}
              <div className="flex flex-col gap-3">
                {banners.map((b, i) => (
                  <div key={i} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-3 flex gap-3 items-center">
                    {b.image ? <img src={b.image} className="w-16 h-12 rounded-xl object-cover shrink-0 bg-gray-100" onError={e => e.target.style.display='none'} /> : <div className="w-16 h-12 rounded-xl shrink-0 flex items-center justify-center text-2xl" style={{ background: `${color}20` }}>🖼</div>}
                    <div className="flex-1 min-w-0">
                      <div className="font-bold text-sm text-gray-800 truncate">{b.title || "(tanpa judul)"}</div>
                      {b.subtitle && <div className="text-xs text-gray-500 truncate">{b.subtitle}</div>}
                      {b.link && <div className="text-[10px] text-brand font-mono truncate">{b.link}</div>}
                    </div>
                    <div className="flex gap-1 shrink-0">
                      <button onClick={() => editBanner(i)} className="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 transition-colors"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>
                      <button onClick={() => delBanner(i)} className="p-2 bg-red-50 hover:bg-red-100 rounded-lg text-red-500 transition-colors"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {tab === "tentang" && (
            <div className="space-y-4 animate-fade-up">
              <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 space-y-4">
                <div className="font-bold text-sm text-gray-700">Konten Halaman "Tentang Kami"</div>
                <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">URL Gambar Hero</label><input value={about.about_hero_image} onChange={e => setAbout(p => ({ ...p, about_hero_image: e.target.value }))} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" placeholder="https://..." /></div>
                {about.about_hero_image && <img src={about.about_hero_image} className="w-full h-32 object-cover rounded-xl border border-gray-100" onError={e => e.target.style.display='none'} />}
                <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">Deskripsi Toko</label><textarea value={about.about_description} onChange={e => setAbout(p => ({ ...p, about_description: e.target.value }))} rows={5} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 resize-none" placeholder="Cerita tentang toko Anda..." /></div>
                <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">Label Tombol WA</label><input value={about.about_cta_label} onChange={e => setAbout(p => ({ ...p, about_cta_label: e.target.value }))} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" placeholder="Hubungi Kami via WhatsApp" /></div>
              </div>

              <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 space-y-3">
                <div className="flex justify-between items-center">
                  <div className="font-bold text-sm text-gray-700">Layanan Unggulan</div>
                  <button onClick={() => setServices(sv => [...sv, { icon: "⭐", title: "", desc: "" }])} className="text-xs font-bold px-3 py-1.5 rounded-full border border-brand text-brand hover:bg-brandLight transition-colors">+ Tambah</button>
                </div>
                {services.map((sv, i) => (
                  <div key={i} className="flex gap-2 items-start bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <input value={sv.icon} onChange={e => setServices(s => s.map((x, j) => j === i ? { ...x, icon: e.target.value } : x))} className="w-10 text-center px-1 py-2 bg-white border border-gray-200 rounded-lg text-lg focus:outline-none" />
                    <div className="flex-1 space-y-1.5">
                      <input value={sv.title} onChange={e => setServices(s => s.map((x, j) => j === i ? { ...x, title: e.target.value } : x))} className="w-full px-2 py-1.5 bg-white border border-gray-200 rounded-lg text-xs font-bold focus:outline-none" placeholder="Judul layanan" />
                      <input value={sv.desc} onChange={e => setServices(s => s.map((x, j) => j === i ? { ...x, desc: e.target.value } : x))} className="w-full px-2 py-1.5 bg-white border border-gray-200 rounded-lg text-xs focus:outline-none" placeholder="Deskripsi singkat" />
                    </div>
                    <button onClick={() => setServices(s => s.filter((_n, j) => j !== i))} className="p-1.5 text-red-400 hover:bg-red-50 rounded-lg transition-colors"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
                  </div>
                ))}
              </div>

              <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 space-y-3">
                <div className="flex justify-between items-center">

    // ── MAIN APP ─────────────────────────────────────────────────
    function App() {
      const [role, setRole] = useState(null);
      const [page, setPage] = useState("dashboard");
      const [products, setProducts] = useState([]);
      const [customers, setCustomers] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [promos, setPromos] = useState([]);
      const [cashiers, setCashiers] = useState([]);
      const [sessions, setSessions] = useState([]);
      const [settings, setSettings] = useState({ store_name: "Toko Azzahro", store_tagline: "Pilihan Berkah dari Tanah Suci", store_address: "", store_phone: "", store_footer: "Terima kasih, semoga berkah 🤲", store_logo: "", receipt_color: "#1a6b3c", wa_number: "6281234567890", kasir_pin: "1234", admin_pin: "0000", owner_pin: "9999", product_categories: "Air Zamzam, Kurma, Tasbih, Sajadah, Parfum, Peci & Mukena, Lainnya", product_brands: "Umum, Ajwa, Sukari, Khalas" });
      const [toast, setToast] = useState("");
      const [loading, setLoading] = useState({});

      const notify = msg => { setToast(msg); setTimeout(() => setToast(""), 2500); };
      const color = settings.receipt_color || "#114232";
      const setLoad = (k, v) => setLoading(l => ({ ...l, [k]: v }));

      const loadProducts = useCallback(async () => { setLoad("p", true); const { data } = await db.from("products").select("*").order("created_at", { ascending: false }); setProducts(data || []); setLoad("p", false); }, []);
      const loadCustomers = useCallback(async () => { setLoad("c", true); const { data } = await db.from("customers").select("*").order("name"); setCustomers(data || []); setLoad("c", false); }, []);
      const loadTransactions = useCallback(async () => { setLoad("t", true); const { data } = await db.from("transactions").select("*,transaction_items(*)").order("created_at", { ascending: false }).limit(500); setTransactions(data || []); setLoad("t", false); }, []);
      const loadPromos = useCallback(async () => { const { data } = await db.from("promos").select("*").order("created_at", { ascending: false }); setPromos(data || []); }, []);
      const loadCashiers = useCallback(async () => { const { data } = await db.from("cashiers").select("*").order("code"); setCashiers(data || []); }, []);
      const loadSessions = useCallback(async () => { const { data } = await db.from("cash_sessions").select("*").order("opened_at", { ascending: false }).limit(50); setSessions(data || []); }, []);
      const loadSettings = useCallback(async () => { const { data } = await db.from("settings").select("*"); if (data?.length) { const obj = {}; data.forEach(r => { obj[r.key] = r.value; }); setSettings(s => ({ ...s, ...obj })); } }, []);

      useEffect(() => {
        if (!role) return;
        const p = page;
        if (p === "dashboard") { loadProducts(); loadCustomers(); loadTransactions(); loadCashiers(); loadSessions(); loadSettings(); }
        if (p === "produk") { loadProducts(); loadSettings(); }
        if (p === "pelanggan") { loadCustomers(); loadTransactions(); }
        if (p === "promo") { loadPromos(); loadProducts(); }
        if (p === "laporan") { loadTransactions(); loadProducts(); loadCustomers(); }
        if (p === "sesi") loadSessions();
        if (p === "pengaturan") { loadCashiers(); loadSettings(); }
        if (p === "konten") loadSettings();
      }, [page, role]);

      useEffect(() => {
        const handleMessage = (e) => {
          if (e.data?.type === 'CUSTOMER_ADDED') {
            loadCustomers();
            // notify("Pelanggan baru ditambahkan!");
          }
        };
        window.addEventListener('message', handleMessage);
        return () => window.removeEventListener('message', handleMessage);
      }, [loadCustomers]);

      if (!role) return <PinPad onSuccess={setRole} />;

      const allPages = [
        { id: "dashboard", label: "Home", path: "M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" },
        { id: "produk", label: "Produk", path: "M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" },
        { id: "pelanggan", label: "Pelanggan", path: "M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" },
        { id: "promo", label: "Promo", path: "M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" },
        { id: "laporan", label: "Laporan", path: "M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" },
        { id: "sesi", label: "Sesi", path: "M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" },
        { id: "konten", label: "Katalog", path: "M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" },
        { id: "pengaturan", label: "Setting", path: "M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" },
      ];

      const navItems = allPages.filter(p => role === "admin" ? !["laporan"].includes(p.id) : true);

      return (
        <div className="min-h-screen bg-grayLight flex flex-col md:flex-row">
          <Toast msg={toast} />
          
          {/* Sidebar Desktop */}
          <aside className="hidden md:flex flex-col w-64 bg-dark text-white fixed h-full z-50">
            <div className="p-6 border-b border-white/10">
              <div className="font-black text-xl tracking-tight mb-1">AZZAHRO</div>
              <div className="text-[10px] text-white/50 uppercase tracking-widest font-bold">{role === "owner" ? "Owner Panel" : "Admin Panel"}</div>
            </div>
            <nav className="flex-1 p-4 space-y-1">
              {navItems.map(t => (
                <button key={t.id} onClick={() => setPage(t.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-bold text-sm ${page === t.id ? 'bg-brand text-white' : 'text-white/60 hover:bg-white/5 hover:text-white'}`}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d={t.path}/></svg>
                  {t.label}
                </button>
              ))}
            </nav>
            <div className="p-4 border-t border-white/10">
              <a href="kasir.html" className="w-full flex items-center justify-between px-4 py-3 bg-white/10 hover:bg-white/20 rounded-xl text-white font-bold text-xs transition-colors mb-2">
                <span>Buka Kasir</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 5l7 7-7 7M3 12h18"/></svg>
              </a>
              <button onClick={() => setRole(null)} className="w-full flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-red-400/10 rounded-xl font-bold text-xs transition-colors">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Keluar
              </button>
            </div>
          </aside>

          {/* Header Mobile */}
          <header className="md:hidden bg-dark text-white p-4 flex items-center justify-between sticky top-0 z-50 rounded-b-2xl shadow-md">
            <div>
              <div className="font-extrabold text-lg tracking-tight">{navItems.find(p => p.id === page)?.label || "Admin"}</div>
              <div className="text-[10px] text-white/50 font-bold uppercase tracking-wider">{settings.store_name}</div>
            </div>
            <div className="flex gap-2">
              <a href="kasir.html" className="bg-white/10 px-3 py-1.5 rounded-xl text-white font-bold text-[10px]">Kasir</a>
              <button onClick={() => setRole(null)} className="bg-red-500/20 text-red-300 px-3 py-1.5 rounded-xl font-bold text-[10px]">Logout</button>
            </div>
          </header>

          <main className="flex-1 md:ml-64 pb-24 md:pb-8">
            <div className="max-w-5xl mx-auto">
              {page === "dashboard" && <Dashboard products={products} transactions={transactions} customers={customers} cashiers={cashiers} sessions={sessions} settings={settings} color={color} notify={notify} onRefresh={() => { loadProducts(); loadCustomers(); loadTransactions(); loadCashiers(); loadSessions(); }} />}
              {page === "produk" && <Produk products={products} notify={notify} onReload={loadProducts} loading={loading.p} color={color} settings={settings} onReloadSettings={loadSettings} />}
              {page === "pelanggan" && <Pelanggan customers={customers} transactions={transactions} notify={notify} onReload={() => { loadCustomers(); loadTransactions(); }} loading={loading.c} color={color} settings={settings} />}
              {page === "promo" && <PromoPage promos={promos} products={products} notify={notify} onReload={loadPromos} color={color} />}
              {page === "laporan" && <Laporan transactions={transactions} products={products} customers={customers} notify={notify} loading={loading.t} color={color} />}
              {page === "sesi" && <SesiPage sessions={sessions} onReload={loadSessions} notify={notify} color={color} />}
              {page === "konten" && <KatalogPage settings={settings} notify={notify} onReload={loadSettings} color={color} />}
              {page === "pengaturan" && <Pengaturan cashiers={cashiers} settings={settings} notify={notify} role={role} onReload={() => { loadCashiers(); loadSettings(); }} color={color} />}
            </div>

          {/* Navigation Mobile */}
          <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-2 pb-5 z-40 rounded-t-3xl shadow-[0_-8px_30px_rgba(0,0,0,0.05)]">

    // ── DASHBOARD ────────────────────────────────────────────────
    function Dashboard({ products, transactions, customers, cashiers, sessions, settings, color, notify, onRefresh }) {
      const today = new Date().toDateString();
      const todayTx = transactions.filter(t => new Date(t.created_at).toDateString() === today);
      const todayRev = todayTx.reduce((s, t) => s + t.total, 0);
      const lowStock = products.filter(p => p.stock <= 5);
      const openSessions = sessions.filter(s => s.status === "open");

      return (
        <div className="p-4 flex flex-col gap-4">
          <div className="bg-gradient-to-br from-dark to-brand rounded-2xl p-5 text-white shadow-md">
            {settings.store_logo && <img src={settings.store_logo} alt="logo" className="h-10 bg-white/10 p-1 rounded-lg object-contain mb-3" onError={e => e.target.style.display = "none"} />}

            <div className="text-xl font-extrabold leading-tight">{settings.store_name}</div>

              <div className="text-xs text-white/70 font-semibold uppercase tracking-wider mb-1">Omzet Hari Ini</div>
              <div className="text-3xl font-black">{fmt(todayRev)}</div>
              <div className="text-xs text-white/70 font-medium mt-1">{todayTx.length} transaksi hari ini</div>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3">
            {[
              { label: "Total Produk", val: products.length, d: "M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4", c: "text-blue-500", bg: "bg-blue-50" }, 
              { label: "Pelanggan", val: customers.length, d: "M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z", c: "text-purple-500", bg: "bg-purple-50" }, 
              { label: "Stok Tipis", val: lowStock.length, d: "M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z", c: "text-orange-500", bg: "bg-orange-50" }, 
              { label: "Sesi Aktif", val: openSessions.length, d: "M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15", c: openSessions.length > 0 ? "text-brand" : "text-gray-400", bg: openSessions.length > 0 ? "bg-green-50" : "bg-gray-50" }
            ].map(s => (
              <div key={s.label} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex flex-col justify-between">
                <div className={`w-10 h-10 flex items-center justify-center rounded-full ${s.bg} ${s.c}`}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d={s.d}/></svg>
                </div>
                <div className="mt-4">
                  <div className={`text-2xl font-black ${s.c}`}>{s.val}</div>
                  <div className="text-[10px] text-gray-500 font-bold uppercase tracking-wider mt-1">{s.label}</div>
                </div>
              </div>
            ))}
          </div>

          <button onClick={onRefresh} className="w-full bg-white border border-gray-200 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-50 transition-colors shadow-sm text-xs flex justify-center items-center gap-2">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            Refresh Data
          </button>

    // ── PRODUK ────────────────────────────────────────────────────
    function Produk({ products, notify, onReload, loading, color, settings, onReloadSettings }) {
      const defaultCats = ["Kurma", "Parfum", "Madu", "Tasbih", "Sajadah", "Busana Muslim", "Herbal", "Air Zamzam", "Souvenir", "Lainnya"];
      const dynamicCats = settings.product_categories ? settings.product_categories.split(",").map(s => s.trim()).filter(Boolean) : defaultCats;
      const dynamicBrands = (settings.product_brands || "").split(",").map(s => s.trim()).filter(Boolean);
      const dynamicEtalase = (settings.product_etalase || "").split(",").map(s => s.trim()).filter(Boolean);
      const [modal, setModal] = useState(null);
      const [form, setForm] = useState({ sku: "", name: "", brand: "", description: "", cost_price: "", price: "", promo_price: "", promo_percentage: "", stock: "", category: "Kurma", sub_category: "", weight: "", weight_unit: "g", has_variants: false, variant_types: [], variants: [], image_url: "", etalase: "", is_po: false });
      const [search, setSearch] = useState("");
      const [saving, setSaving] = useState(false);
      const [showMenu, setShowMenu] = useState(false);
      const [editVariants, setEditVariants] = useState(false);
      const fileRef = useRef();

      const grouped = useMemo(() => {
        const map = {};
        products.forEach(p => {
          if (!p.sku) return;
          const key = p.sku.split('-')[0];
          const isVariant = p.sku.includes('-');
          if (!map[key]) {
            map[key] = { ...p, variants: [] };
          }
          if (isVariant) {
            map[key].variants.push(p);
          } else {
            // If it's a base product (no -), it's the main representative
            const vars = map[key].variants;
            map[key] = { ...p, variants: vars };
          }
        });
        return Object.values(map).sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
      }, [products]);

      const filtered = grouped.filter(p => (p.name || "").toLowerCase().includes(search.toLowerCase()) || (p.sku || "").toLowerCase().includes(search.toLowerCase()) || (p.brand || "").toLowerCase().includes(search.toLowerCase()));
      const handleSKUChange = (val) => {
        const clean = val.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
        setForm(f => ({ 
          ...f, 
          sku: clean,
          variants: f.variants.map(v => {
            const suffix = v.sku.includes('-') ? v.sku.split('-')[1] : v.name.replace(/\s+/g, '').toUpperCase();
            return { ...v, sku: clean ? `${clean}-${suffix}` : "" };
          })
        }));
      };
      const autoName = () => {
        const parts = [form.category, form.sub_category, form.brand];
        if (!form.has_variants && form.weight) parts.push(`${form.weight} ${form.weight_unit}`);
        setForm(f => ({ ...f, name: parts.filter(Boolean).join(" ") }));
      };
      const autoSKU = () => {
        const p1 = (form.category || "").slice(0, 3).toUpperCase();
        const p2 = (form.sub_category || "").slice(0, 3).toUpperCase();
        const p3 = (form.brand || "").slice(0, 3).toUpperCase();
        const prefix = [p1, p2, p3].filter(Boolean).join("-") || "PRD";
        const nums = products.filter(x => x.sku && x.sku.startsWith(prefix)).map(x => parseInt(x.sku.replace(prefix + '-', ''))).filter(n => !isNaN(n));
        const newSku = `${prefix}-${String(nums.length > 0 ? Math.max(...nums) + 1 : 1).padStart(3, "0")}`;
        handleSKUChange(newSku);
      };
      const generateAI = () => {
        const parts = [form.category, form.sub_category, form.brand].filter(Boolean).join(" ");
        let desc = `Produk ${parts} berkualitas premium.`;
        if (form.weight && !form.has_variants) desc += ` Hadir dalam kemasan praktis ${form.weight} ${form.weight_unit}.`;

          desc += ` Tersedia dalam berbagai pilihan menarik: ${form.variants.map(v => v.name).join(", ")}.`;
        }
        desc += `\n\nSangat cocok untuk Anda jadikan oleh-oleh haji dan umroh maupun untuk pemakaian pribadi. Dapatkan segera dengan harga terbaik di ${settings?.store_name || 'Toko Azzahro'}!`;
        setForm(f => ({ ...f, description: desc }));

      const [vModal, setVModal] = useState(false);

      const saveVars = async () => {
        setSaving(true);

        await db.from("settings").upsert({ key: "product_brands", value: vForm.brands }, { onConflict: "key" });

          setEtSelectedProds([]);

      const saveEtProducts = async () => {
        if (!etActive) return notify("Pilih etalase dulu!");
        setSaving(true);
        try {
          await db.from("products").update({ etalase: null }).eq("etalase", etActive);
          if (etSelectedProds.length > 0) {
             for (const prefix of etSelectedProds) {
                await db.from("products").update({ etalase: etActive }).ilike("sku", `${prefix}%`);
             }
          }
          notify("Produk etalase diperbarui!");
          onReload();
          setEtModal(false);
        } catch (e) { notify("Gagal: " + e.message); }
        setSaving(false);
      };

      const saveEtNames = async () => {
        setSaving(true);
        await db.from("settings").upsert({ key: "product_etalase", value: etNamesForm }, { onConflict: "key" });
        setEtList(etNamesForm.split(",").map(s => s.trim()).filter(Boolean));
        setEtEditMode(false);
        onReloadSettings();
        setSaving(false);
      };
      
      const generateMatrix = () => {
        setForm(f => {
          let combs = [[]];
          f.variant_types.forEach(t => { 
            const opts = (t.options_string || "").split(",").map(s => s.trim()).filter(Boolean);
            if(opts.length > 0) { const temp = []; combs.forEach(c => { opts.forEach(o => temp.push([...c, o])); }); combs = temp; } 
          });
          if (combs.length === 1 && combs[0].length === 0) combs = [];
          const newVariants = combs.map(c => {
            const name = c.join(" ");
            const suffix = c.map(x => x.slice(0, 3).toUpperCase().replace(/[^A-Z0-9]/g, '')).join("");
            const existing = f.variants.find(v => v.name === name);
            if (existing) return { ...existing, sku: f.sku ? `${f.sku}-${suffix}` : "" };
            // Partial match: if this new combo contains an old variant name, inherit its values
            const partial = f.variants.find(v => name.includes(v.name) || v.name.includes(name));
            if (partial) return { ...partial, name, sku: f.sku ? `${f.sku}-${suffix}` : "" };
            return { sku: f.sku ? `${f.sku}-${suffix}` : "", name, cost_price: 0, price: 0, stock: 0, weight: "", weight_unit: f.weight_unit || "g" };
          });
          return { ...f, variants: newVariants };
        });
        setEditVariants(false);
        notify("Matrix diperbarui!");
      };
      const addVarType = () => { if(form.variant_types.length >= 2) return notify("Maksimal 2 tipe varian!"); setForm(f => ({ ...f, variant_types: [...f.variant_types, { name: "", options_string: "" }] })); };
      const updateVarType = (idx, field, val) => { const nt = [...form.variant_types]; nt[idx][field] = val; setForm(f => ({ ...f, variant_types: nt })); };
      const remVarType = idx => { const nt = form.variant_types.filter((_, i) => i !== idx); setForm(f => ({ ...f, variant_types: nt })); };
      const updateVarItem = (idx, field, val) => { setForm(f => { const nv = [...f.variants]; nv[idx][field] = val; return { ...f, variants: nv }; }); };

      const save = async () => {
        if (!form.name || (!form.has_variants && !form.price)) return notify("Nama & harga utama wajib!");
        if (form.has_variants && form.variants.length === 0) return notify("Varian belum ditambahkan!");
        if (!form.sku) return notify("SKU wajib!");
        setSaving(true);
        
        const variantPayloads = form.has_variants ? form.variants.map(v => ({
          sku: v.sku || `${form.sku}-${v.name.replace(/\s+/g, '').toUpperCase()}`,
          name: form.name, brand: form.brand, description: form.description,
          category: form.category, sub_category: form.sub_category, etalase: form.etalase, image_url: form.image_url,
          variant_name: v.name,
          variant_options: form.variant_types.map(vt => ({ name: vt.name, options: (vt.options_string||"").split(",").map(s=>s.trim()).filter(Boolean) })),
          cost_price: parseInt(v.cost_price)||0,
          price: parseInt(v.price)||0,
          promo_price: parseInt(v.promo_price)||0,
          promo_percentage: parseInt(v.promo_percentage)||0,
          stock: parseInt(v.stock)||0,
          is_po: !!form.is_po,
          weight: v.weight,
          weight_unit: v.weight_unit || "g",
          active: true
        })) : [{
          sku: form.sku, name: form.name, brand: form.brand, description: form.description,
          category: form.category, sub_category: form.sub_category, etalase: form.etalase, image_url: form.image_url || `https://placehold.co/400x400/114232/white?text=${encodeURIComponent(form.name.slice(0, 4))}`,
          variant_options: [],
          cost_price: parseInt(form.cost_price)||0,
          price: parseInt(form.price)||0,
          promo_price: parseInt(form.promo_price)||0,
          promo_percentage: parseInt(form.promo_percentage)||0,
          stock: parseInt(form.stock) || 0,
          is_po: !!form.is_po,
          weight: form.weight,
          weight_unit: form.weight_unit,
          active: true
        }];

        // Delete old rows if editing
        if (modal !== "add") {
          const old = products.find(p => p.id === modal);
          const oldPrefix = (old.sku || "").split('-')[0];
          await db.from("products").delete().ilike('sku', `${oldPrefix}%`);
        }

        const { error } = await db.from("products").insert(variantPayloads);
        
        setSaving(false);
        if (error) return notify("Gagal: " + error.message);
        setModal(null); onReload();
      };
      const del = async (p) => {
        const prefix = (p.sku || "").split('-')[0];
        const { error } = await db.from("products").delete().ilike('sku', `${prefix}%`);
        if (error) return notify("Gagal: " + error.message);
        notify("Dihapus!"); onReload();
      };
      const openEdit = p => {
        const prefix = (p.sku || "").split('-')[0];
        const items = products.filter(x => (x.sku || "").startsWith(prefix));
        const first = items[0] || p;
        const variants = items.filter(x => x.sku.includes('-'));
        
        setModal(first.id);
        setForm({
          sku: prefix, name: first.name, brand: first.brand || "", description: first.description || "",
          cost_price: first.cost_price || "", price: first.price || "", promo_price: first.promo_price || "", promo_percentage: first.promo_percentage || "", stock: first.stock || "",
          category: first.category, sub_category: first.sub_category || "", etalase: first.etalase || "", is_po: first.is_po || false, weight: first.weight || "", weight_unit: first.weight_unit || "g",
          has_variants: variants.length > 0,
          variant_types: (first.variant_options || []).map(vt => ({ name: vt.name, options_string: (vt.options || []).join(", ") })),
          variants: variants.map(v => ({ sku: v.sku, name: v.variant_name, cost_price: v.cost_price, price: v.price, promo_price: v.promo_price, promo_percentage: v.promo_percentage, stock: v.stock, weight: v.weight, weight_unit: v.weight_unit })),
          image_url: first.image_url || ""
        });
      };

      const exportXLSX = () => { const ws = XLSX.utils.json_to_sheet(products.map(p => ({ SKU: p.sku, Nama: p.name, NamaVarian: p.variant_name || "", Merk: p.brand, Deskripsi: p.description, HargaBeli: p.cost_price, Harga: p.price, Stok: p.stock, Kategori: p.category, SubKategori: p.sub_category || "", Etalase: p.etalase || "", PO: p.is_po ? "Ya" : "Tidak", Berat: `${p.weight || ""}${p.weight_unit || ""}`, Foto: p.image_url }))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Produk"); XLSX.writeFile(wb, `produk_${Date.now()}.xlsx`); notify("Diexport!"); setShowMenu(false); };
      const dlTemplate = () => { const ws = XLSX.utils.json_to_sheet([{ SKU: "KUR001", Nama: "Kurma Ajwa", NamaVarian: "", Merk: "Azzahro", Deskripsi: "Kurma premium", HargaBeli: 40000, Harga: 50000, Stok: 10, Kategori: "Kurma", SubKategori: "Premium", Etalase: "Depan", PO: "Tidak", Berat: "500g", Foto: "" }, { SKU: "KUR002-MER500", Nama: "Kurma Sukari", NamaVarian: "Merah 500g", Merk: "Azzahro", Deskripsi: "Manis lembut", HargaBeli: 35000, Harga: 45000, Stok: 5, Kategori: "Kurma", SubKategori: "Basah", Etalase: "Rak A", PO: "Tidak", Berat: "500g", Foto: "" }]); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Produk"); XLSX.writeFile(wb, "template_produk.xlsx"); notify("Template didownload!"); setShowMenu(false); };
      const importFile = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async ev => {
          try {
            const wb = XLSX.read(ev.target.result, { type: "binary" });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            const imported = rows.map(r => ({
              sku: String(r.SKU || uid()),
              name: r.Nama || "Tanpa Nama",
              variant_name: r.NamaVarian || "",
              brand: r.Merk || "",
              description: r.Deskripsi || "",
              cost_price: parseInt(r.HargaBeli) || 0,
              price: parseInt(r.Harga) || 0,
              stock: parseInt(r.Stok) || 0,
              category: r.Kategori || "Umum",
              sub_category: r.SubKategori || "",
              etalase: r.Etalase || "",
              is_po: String(r.PO).toLowerCase() === "ya",
              weight: String(r.Berat || "").replace(/[^0-9.]/g, ""),
              weight_unit: String(r.Berat || "g").replace(/[0-9.]/g, "") || "g",
              image_url: r.Foto || "",
              is_parent: !String(r.SKU).includes('-'),
              parent_sku: String(r.SKU).split('-')[0],
              active: true
            }));
            let added = 0, updated = 0;
            for (const item of imported) { 
              const { error } = await db.from("products").upsert(item, { onConflict: "sku" });
              if (!error) added++;
            }
            notify(`${added} baris diproses`); onReload();
          } catch (err) { notify("Gagal import: " + err.message); }
          e.target.value = "";
        };
        reader.readAsBinaryString(file);
      };

      return (
        <div className="p-4">
          <div className="flex gap-2 mb-4">
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Cari nama / SKU..." className="flex-1 px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand/30 outline-none shadow-sm" />
            <button onClick={() => { setModal("add"); setForm({ sku: "", name: "", brand: "", description: "", cost_price: "", price: "", promo_price: "", promo_percentage: "", stock: "", category: "Kurma", sub_category: "", etalase: "", is_po: false, weight: "", weight_unit: "g", has_variants: false, variant_types: [], variants: [], image_url: "" }); }} className="px-4 bg-brand text-white font-bold rounded-xl shadow-sm text-sm hover:opacity-90 active:scale-95 transition-all whitespace-nowrap">+ Tambah</button>
            <div className="relative">
              <button onClick={() => setShowMenu(m => !m)} className="px-3 bg-white border border-gray-200 text-gray-600 rounded-xl h-full font-bold shadow-sm hover:bg-gray-50 flex items-center justify-center">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
              </button>

                {[
                  { l: "Import Excel", a: () => { fileRef.current.click(); setShowMenu(false); }, d: "M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" },

                  { l: "Kelola Variabel", a: () => { setVModal(true); setVForm({ categories: settings.product_categories, brands: settings.product_brands }); setShowMenu(false); }, d: "M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" }, 
                  { l: "Kelola Etalase", a: () => { setEtModal(true); setShowMenu(false); }, d: "M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" }, 
                  { l: "Refresh", a: () => { onReload(); setShowMenu(false); }, d: "M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" }
                ].map(item => <button key={item.l} onClick={item.a} className="w-full text-left px-4 py-3 text-xs font-black uppercase tracking-wider text-gray-700 hover:bg-gray-50 border-b border-gray-50 last:border-0 flex items-center gap-3">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d={item.d}/></svg>
                  {item.l}
                </button>)}
              </div>}
            </div>
          </div>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={importFile} className="hidden" />

                <div className="animate-fade-in space-y-3 shrink-0">
