    // ── PENGATURAN ────────────────────────────────────────────────
    function Pengaturan({ cashiers, settings, notify, role, onReload, color }) {
      const [tab, setTab] = useState("kasir");
      const [cForm, setCForm] = useState({ code: "", name: "" });
      const [cModal, setCModal] = useState(null);
      const [stForm, setStForm] = useState({ ...settings });
      const [saving, setSaving] = useState(false);

      useEffect(() => { setStForm({ ...settings }); }, [settings]);

      const saveCashier = async () => {
        if (!cForm.code || !cForm.name) return notify("Kode & nama wajib!");
        setSaving(true);
        let error;
        if (cModal === "add") { ({ error } = await db.from("cashiers").insert({ code: cForm.code.toUpperCase(), name: cForm.name, active: true })); if (!error) notify("Kasir ditambahkan!"); }
        else { ({ error } = await db.from("cashiers").update({ code: cForm.code.toUpperCase(), name: cForm.name }).eq("id", cModal)); if (!error) notify("Diupdate!"); }
        setSaving(false); if (error) return notify("Gagal: " + error.message);
        setCModal(null); setCForm({ code: "", name: "" }); onReload();
      };
      const toggleCashier = async (c) => { await db.from("cashiers").update({ active: !c.active }).eq("id", c.id); onReload(); };
      const delCashier = async (id) => { const { error } = await db.from("cashiers").delete().eq("id", id); if (error) return notify("Gagal: " + error.message); notify("Dihapus!"); onReload(); };

      const saveSettings = async () => {
        setSaving(true);
        for (const [key, value] of Object.entries(stForm)) { await db.from("settings").upsert({ key, value: String(value) }, { onConflict: "key" }); }
        setSaving(false); notify("Pengaturan disimpan!"); onReload();
      };

      const resetData = async (type) => {
        const msg = type === 'all' ? 'SEMUA DATA (Produk, Transaksi, Pelanggan, Promo, Sesi Kasir)' : (type === 'transactions' ? 'DATA TRANSAKSI (termasuk Sesi Kasir)' : 'DATA PRODUK');
        if (!confirm(`⚠️ PERINGATAN ⚠️\n\nAnda yakin ingin mereset ${msg}? Tindakan ini PERMANEN dan data yang dihapus tidak dapat dikembalikan!`)) return;
        
        setSaving(true);
        try {
          if (type === 'transactions' || type === 'all') {
            await db.from("transaction_items").delete().not("id", "is", null);
            await db.from("transactions").delete().not("id", "is", null);
            await db.from("cash_sessions").delete().not("id", "is", null);
          }
          if (type === 'products' || type === 'all') {
            await db.from("products").delete().not("id", "is", null);
          }
          if (type === 'all') {
            await db.from("customers").delete().not("id", "is", null);
            await db.from("promos").delete().not("id", "is", null);
          }
          notify("Data berhasil direset!");
          onReload();
        } catch (e) {
          notify("Gagal reset: " + e.message);
        }
        setSaving(false);
      };

      const tabs = [
        { id: "kasir", label: "Kasir", path: "M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" }, 
        { id: "pin", label: "PIN", path: "M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" }, 
        { id: "toko", label: "Toko", path: "M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" }, 
        { id: "struk", label: "Struk", path: "M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" }
      ];
      if (role === "owner") tabs.push({ id: "reset", label: "Reset", path: "M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" });

      return (
        <div className="p-4">
          <div className="flex gap-2 mb-6 overflow-x-auto no-scrollbar pb-2">
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-[11px] font-black uppercase tracking-wider transition-all shadow-sm border whitespace-nowrap ${tab === t.id ? 'bg-dark text-white border-dark' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d={t.path}/></svg>
                {t.label}
              </button>
            ))}
          </div>

          {tab === "kasir" && <div className="animate-fade-up">
            <button onClick={() => { setCModal("add"); setCForm({ code: "", name: "" }); }} className="w-full bg-dark text-white font-black uppercase tracking-wider rounded-xl py-4 mb-6 shadow-md hover:bg-gray-900 transition-all flex items-center justify-center gap-2 text-xs">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M12 5v14M5 12h14"/></svg>
              Tambah Akun Kasir
            </button>

            {cashiers.length === 0 && <div className="text-center text-gray-400 py-10 text-sm font-medium bg-white rounded-2xl border border-gray-100">Belum ada kasir terdaftar</div>}

            <div className="flex flex-col gap-3">
              {cashiers.map(c => <div key={c.id} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex flex-col gap-4">
                <div className="flex items-center gap-3">
                  <div className="w-12 h-12 rounded-full bg-gradient-to-br from-dark to-gray-600 flex items-center justify-center text-white font-black text-xl shadow-inner shrink-0">{c.name[0].toUpperCase()}</div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-1">
                      <h3 className="font-bold text-gray-800 text-sm truncate">{c.name}</h3>
                      <span className={`px-2 py-0.5 rounded-md text-[9px] font-bold uppercase tracking-wider ${c.active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>{c.active ? "Aktif" : "Off"}</span>
                    </div>
                    <div className="text-xs text-gray-400 font-mono font-medium">{c.code}</div>
                  </div>
                </div>
                <div className="flex gap-2 border-t border-gray-50 pt-3">
                  <button onClick={() => { setCModal(c.id); setCForm({ code: c.code, name: c.name }); }} className="flex-1 py-2 bg-gray-50 hover:bg-gray-100 text-gray-600 rounded-lg text-xs font-bold transition-colors border border-gray-200">Edit</button>
                  <button onClick={() => toggleCashier(c)} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-colors border ${c.active ? 'bg-red-50 text-red-600 border-red-100 hover:bg-red-100' : 'bg-brandLight text-brand border-brand/20 hover:bg-brand/10'}`}>{c.active ? "Matikan" : "Aktifkan"}</button>
                  <button onClick={() => delCashier(c.id)} className="w-12 py-2 bg-red-50 hover:bg-red-100 text-red-500 rounded-lg text-xs font-bold transition-colors border border-red-100 flex justify-center items-center">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                  </button>
                </div>
              </div>)}
            </div>

            {cModal && <Modal onClose={() => setCModal(null)} title={cModal === "add" ? "Tambah Kasir" : "Edit Kasir"}>
              <div className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Kode Kasir *</label>
                  <input value={cForm.code} onChange={e => setCForm(f => ({ ...f, code: e.target.value.toUpperCase() }))} placeholder="cth: KSR-001" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-mono focus:outline-none focus:ring-2 focus:ring-dark/30 uppercase" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Nama Lengkap *</label>
                  <input value={cForm.name} onChange={e => setCForm(f => ({ ...f, name: e.target.value }))} placeholder="cth: Budi Santoso" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-dark/30" />
                </div>
                <div className="flex gap-3 pt-4 border-t border-gray-100 mt-2">
                  <button onClick={() => setCModal(null)} className="flex-1 py-3.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl font-bold text-sm transition-colors">Batal</button>
                  <button onClick={saveCashier} disabled={saving} className="flex-[2] py-3.5 bg-dark hover:bg-gray-900 text-white rounded-xl font-bold text-sm shadow-md transition-all flex justify-center items-center gap-2">{saving ? "Menyimpan..." : "💾 Simpan Data"}</button>
                </div>
              </div>
            </Modal>}
          </div>}

          {tab === "pin" && <div className="animate-fade-up">
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-5">
              <div className="bg-orange-50 border border-orange-100 rounded-xl p-4 mb-6 flex gap-3 items-start">
                <span className="text-xl">⚠️</span>
                <p className="text-xs text-orange-800 font-medium leading-relaxed">Sangat disarankan untuk mengubah PIN default demi keamanan data toko Anda. PIN tersimpan di database.</p>
              </div>
              <div className="space-y-5">
                {[{ label: "PIN Akses Kasir", key: "kasir_pin", hint: "Digunakan staf untuk membuka /kasir.html" }, { label: "PIN Akses Admin", key: "admin_pin", hint: "Akses halaman admin (terbatas laporan)" }, { label: "PIN Akses Owner", key: "owner_pin", hint: "Akses penuh semua fitur & pengaturan" }].map(f => <div key={f.key}>
                  <label className="block text-xs font-bold text-gray-800 mb-2 uppercase tracking-wider">{f.label}</label>
                  <input value={stForm[f.key] || ""} onChange={e => setStForm(s => ({ ...s, [f.key]: e.target.value }))} type="password" placeholder="4-6 digit" maxLength={6} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-xl font-mono tracking-[0.5em] text-center focus:outline-none focus:ring-2 focus:ring-dark/30" onFocus={e => e.target.type = "text"} onBlur={e => e.target.type = "password"} />
                  <div className="text-[10px] text-gray-400 font-medium mt-1.5 text-center">{f.hint}</div>
                </div>)}
              </div>
            </div>
            <button onClick={saveSettings} disabled={saving} className="w-full py-4 bg-dark hover:bg-gray-900 text-white rounded-xl font-bold text-sm shadow-md transition-all flex justify-center items-center gap-2">{saving ? "Menyimpan..." : "💾 Simpan Perubahan PIN"}</button>
          </div>}

          {tab === "toko" && <div className="animate-fade-up">
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-5 space-y-4">
              {[{ label: "Nama Toko", key: "store_name", ph: "Toko Oleh-Oleh Haji & Umroh" }, { label: "Tagline", key: "store_tagline", ph: "Pilihan Berkah dari Tanah Suci" }, { label: "Alamat Lengkap", key: "store_address", ph: "Jl. Contoh No. 1, Semarang" }, { label: "No. Telepon", key: "store_phone", ph: "08xxxxxxxxxx" }, { label: "No. WhatsApp Admin", key: "wa_number", ph: "628xxxxxxxxxx" }, { label: "URL Logo (Image)", key: "store_logo", ph: "https://..." }].map(f => <div key={f.key}>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">{f.label}</label>
                <input value={stForm[f.key] || ""} onChange={e => setStForm(s => ({ ...s, [f.key]: e.target.value }))} placeholder={f.ph} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-dark/30" />
              </div>)}
              {stForm.store_logo && <div className="pt-2">
                <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Preview Logo</label>
                <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 flex items-center justify-center">
                  <img src={stForm.store_logo} alt="preview" className="h-16 object-contain" onError={e => e.target.style.display = "none"} />
                </div>
              </div>}
            </div>
            <button onClick={saveSettings} disabled={saving} className="w-full py-4 bg-dark hover:bg-gray-900 text-white rounded-xl font-bold text-sm shadow-md transition-all flex justify-center items-center gap-2">{saving ? "Menyimpan..." : "💾 Simpan Info Toko"}</button>
          </div>}

          {tab === "reset" && role === "owner" && <div className="animate-fade-up">
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-red-100 mb-5 space-y-4">
               <div className="bg-red-50 text-red-600 p-4 rounded-xl border border-red-100 mb-4">
                  <h4 className="font-bold flex items-center gap-2">⚠️ Area Berbahaya</h4>
                  <p className="text-xs mt-1 font-medium">Tindakan ini tidak dapat dibatalkan. Pastikan Anda telah mengekspor data laporan sebelum melakukan reset.</p>
               </div>
               
               <button onClick={() => resetData('transactions')} disabled={saving} className="w-full py-4 bg-white border-2 border-red-200 text-red-600 hover:bg-red-50 hover:border-red-500 rounded-xl font-bold text-sm transition-all text-left px-5 flex justify-between items-center shadow-sm disabled:opacity-50">
                 <div>
                   <div className="text-base">Reset Data Transaksi</div>
                   <div className="text-xs font-medium text-red-400 mt-0.5">Menghapus riwayat transaksi dan sesi kasir</div>
                 </div>
                 <span className="text-2xl">🧾</span>
               </button>
               
               <button onClick={() => resetData('products')} disabled={saving} className="w-full py-4 bg-white border-2 border-red-200 text-red-600 hover:bg-red-50 hover:border-red-500 rounded-xl font-bold text-sm transition-all text-left px-5 flex justify-between items-center shadow-sm disabled:opacity-50 mt-3">
                 <div>
                   <div className="text-base">Reset Data Produk</div>
                   <div className="text-xs font-medium text-red-400 mt-0.5">Menghapus semua katalog produk</div>
                 </div>
                 <span className="text-2xl">📦</span>
               </button>

               <div className="border-t border-dashed border-red-200 my-6"></div>

               <button onClick={() => resetData('all')} disabled={saving} className="w-full py-4 bg-red-600 hover:bg-red-700 text-white rounded-xl font-black text-sm transition-all text-left px-5 flex justify-between items-center shadow-md disabled:opacity-50 hover:shadow-lg active:scale-[0.98]">
                 <div>
                   <div className="text-base">Reset SEMUA DATA</div>
                   <div className="text-xs font-semibold text-red-200 mt-0.5">Hapus Produk, Transaksi, Pelanggan & Promo</div>
                 </div>
                 <span className="text-3xl">🧨</span>
               </button>
            </div>
          </div>}

          {tab === "struk" && <div className="animate-fade-up">
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-5 space-y-5">
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">Ucapan / Footer Struk</label>
                <input value={stForm.store_footer || ""} onChange={e => setStForm(s => ({ ...s, store_footer: e.target.value }))} placeholder="Terima kasih, semoga berkah 🤲" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-dark/30" />
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Warna Tema Utama</label>
                <div className="flex gap-3 items-center mb-3">
                  <div className="relative w-12 h-12 rounded-xl overflow-hidden border-2 border-gray-200 shadow-inner shrink-0 cursor-pointer">
                    <input value={stForm.receipt_color || "#1a6b3c"} onChange={e => setStForm(s => ({ ...s, receipt_color: e.target.value }))} type="color" className="absolute inset-[-10px] w-20 h-20 cursor-pointer" />
                  </div>
                  <input value={stForm.receipt_color || "#1a6b3c"} onChange={e => setStForm(s => ({ ...s, receipt_color: e.target.value }))} placeholder="#1a6b3c" className="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-mono uppercase focus:outline-none focus:ring-2 focus:ring-dark/30" />
                </div>
                <div className="flex gap-2 flex-wrap bg-gray-50 p-3 rounded-xl border border-gray-100">
                  {["#1a6b3c", "#2563eb", "#dc2626", "#d97706", "#7c3aed", "#0891b2", "#1a1a2e", "#065f46"].map(c => <div key={c} onClick={() => setStForm(s => ({ ...s, receipt_color: c }))} className={`w-8 h-8 rounded-lg cursor-pointer shadow-sm transition-transform hover:scale-110 ${stForm.receipt_color === c ? 'ring-2 ring-offset-2 ring-gray-400' : ''}`} style={{ background: c }} />)}
                </div>
              </div>
              <div className="border border-gray-200 rounded-xl p-4 bg-gray-50">
                <div className="text-[10px] font-bold text-gray-400 mb-3 uppercase tracking-widest text-center">Preview Struk Kasir</div>
                <div className="font-mono text-[11px] bg-white p-4 rounded-lg shadow-sm border border-gray-100 max-w-[250px] mx-auto text-gray-600">
                  {stForm.store_logo && <div className="flex justify-center mb-2"><img src={stForm.store_logo} className="h-6 object-contain" onError={e => e.target.style.display = "none"} /></div>}
                  <div className="text-center font-bold text-sm mb-1" style={{ color: stForm.receipt_color || "#1a6b3c" }}>{stForm.store_name || "Nama Toko"}</div>
                  <div className="text-center text-[9px] mb-3 leading-tight">{stForm.store_address || "Alamat Toko"}</div>
                  <div className="border-t border-dashed border-gray-300 py-2 space-y-1">
                    <div className="flex justify-between"><span>Produk A x2</span><span>50.000</span></div>
                    <div className="flex justify-between"><span>Produk B x1</span><span>25.000</span></div>
                  </div>
                  <div className="flex justify-between font-bold text-sm pt-2 border-t border-dashed border-gray-300" style={{ color: stForm.receipt_color || "#1a6b3c" }}><span>TOTAL</span><span>75.000</span></div>
                  <div className="text-center mt-4 text-[9px]">{stForm.store_footer || "Terima kasih 🤲"}</div>
                </div>
              </div>
            </div>
            <button onClick={saveSettings} disabled={saving} className="w-full py-4 bg-dark hover:bg-gray-900 text-white rounded-xl font-bold text-sm shadow-md transition-all flex justify-center items-center gap-2">{saving ? "Menyimpan..." : "💾 Simpan Desain"}</button>
          </div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
