<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Admin — Toko Azzahro</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { brand: '#114232', brandLight: '#EDF2F0', gold: '#D4AF37', goldLight: '#FDF8E7', dark: '#0A2517', grayLight: '#F8F9FB' },
          animation: { 'fade-up': 'fadeUp 0.3s ease-out', shake: 'shake 0.4s ease-in-out' },
          keyframes: {
            fadeUp: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            shake: { '0%, 100%': { transform: 'translateX(0)' }, '25%': { transform: 'translateX(-6px)' }, '75%': { transform: 'translateX(6px)' } }
          }
        }
      }
    }
  </script>
</head>

<body class="bg-grayLight text-gray-800 font-sans antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = "https://xliwxtakluemverkgwrv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsaXd4dGFrbHVlbXZlcmtnd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjEzNTQsImV4cCI6MjA5MjA5NzM1NH0.XaP6ad5rvhA8EMlCSGy6FIoNltBMiDwQ4fLxe9BwVy8";
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const CATS = ["Semua", "Air Zamzam", "Kurma", "Tasbih", "Sajadah", "Parfum", "Peci & Mukena", "Lainnya"];
    const PAY_METHODS = ["Cash", "Transfer Bank", "QRIS"];
    const fmt = n => new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", minimumFractionDigits: 0 }).format(n);
    const fmtDate = d => new Date(d).toLocaleDateString("id-ID", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
    const uid = () => Math.random().toString(36).substr(2, 9).toUpperCase();
    const txCode = c => `#${c}`;
    const genSKU = (cat, existing) => {
      const p = { "Air Zamzam": "ZAM", "Kurma": "KUR", "Tasbih": "TAS", "Sajadah": "SAJ", "Parfum": "PAR", "Peci & Mukena": "PEC", "Lainnya": "LAN" }[cat] || "PRD";
      const nums = existing.filter(x => x.sku && x.sku.startsWith(p)).map(x => parseInt(x.sku.split("-")[1] || "0")).filter(n => !isNaN(n));
      return `${p}-${String(nums.length > 0 ? Math.max(...nums) + 1 : 1).padStart(3, "0")}`;
    };

    function Toast({ msg }) { if (!msg) return null; return <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-dark text-white px-5 py-2.5 rounded-full z-[9999] text-sm font-medium shadow-xl whitespace-nowrap animate-fade-up">{msg}</div>; }
    function Modal({ children, onClose, title }) {
      return (
        <div className="fixed inset-0 bg-black/50 z-[200] flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity" onClick={onClose}>
          <div className="bg-white rounded-t-2xl sm:rounded-2xl flex flex-col w-full max-w-md max-h-[90vh] animate-fade-up shadow-2xl" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center p-5 border-b border-gray-100 shrink-0">
              <h3 className="font-extrabold text-lg text-gray-900">{title}</h3>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center bg-gray-100 hover:bg-gray-200 rounded-full text-gray-500 font-bold transition-colors">✕</button>
            </div>
            <div className="p-5 overflow-y-auto flex-1">{children}</div>
          </div>
        </div>
      );
    }
    function Spinner() { return <div className="flex items-center justify-center p-10"><div className="w-8 h-8 border-4 border-gray-200 border-t-brand rounded-full animate-spin"></div></div>; }

    // ── PIN PAD ──────────────────────────────────────────────────
    function PinPad({ onSuccess }) {
      const [pin, setPin] = useState("");
      const [shake, setShake] = useState(false);
      const [settings, setSettings] = useState(null);

      useEffect(() => { db.from("settings").select("*").then(({ data }) => { if (data) { const obj = {}; data.forEach(r => { obj[r.key] = r.value; }); setSettings(obj); } }); }, []);

      const press = d => {
        if (pin.length >= 6) return;
        const next = pin + d; setPin(next);
        if (next.length >= 4 && settings) {
          const adminPin = settings.admin_pin || "0000";
          const ownerPin = settings.owner_pin || "9999";
          if (next === ownerPin) { onSuccess("owner"); return; }
          if (next === adminPin) { onSuccess("admin"); return; }
          if (next.length >= 6) { setShake(true); setTimeout(() => { setPin(""); setShake(false); }, 600); }
        }
      };
      const del = () => setPin(p => p.slice(0, -1));

      return (
        <div className="min-h-screen bg-gradient-to-br from-dark to-brand flex flex-col items-center justify-center p-6">
          <div className="text-5xl mb-3">⚙️</div>
          <div className="text-white font-extrabold text-2xl mb-1">Admin Panel</div>
          <div className="text-white/60 text-sm mb-8 font-medium">Toko Azzahro — Haji & Umroh</div>
          <div className={`bg-white rounded-3xl p-7 w-full max-w-[320px] shadow-2xl ${shake ? 'animate-shake' : ''}`}>
            <div className="flex justify-center gap-3 mb-6">
              {[0, 1, 2, 3, 4, 5].map(i => <div key={i} className={`w-3.5 h-3.5 rounded-full transition-colors ${i < pin.length ? 'bg-dark' : 'bg-gray-200'}`} />)}
            </div>
            <div className="grid grid-cols-3 gap-2.5">
              {[1, 2, 3, 4, 5, 6, 7, 8, 9, "", 0, "⌫"].map((d, i) => (
                <button key={i} onClick={() => d === "" ? null : d === "⌫" ? del() : press(String(d))} disabled={d === ""}
                  className={`py-4 text-xl font-bold rounded-2xl ${d === "" ? 'invisible' : d === "⌫" ? 'bg-red-50 text-red-500 hover:bg-red-100' : 'bg-gray-50 text-dark hover:bg-gray-100 active:bg-gray-200'} transition-colors`}>
                  {d}
                </button>
              ))}
            </div>
            <div className="mt-4 text-center text-xs text-gray-400 font-medium">Admin PIN atau Owner PIN</div>
          </div>
          <a href="/" className="mt-8 text-white/50 text-sm font-medium hover:text-white transition-colors">← Kembali ke Katalog</a>
        </div>
      );
    }

    // ── MAIN APP ─────────────────────────────────────────────────
    function App() {
      const [role, setRole] = useState(null);
      const [page, setPage] = useState("dashboard");
      const [products, setProducts] = useState([]);
      const [customers, setCustomers] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [promos, setPromos] = useState([]);
      const [cashiers, setCashiers] = useState([]);
      const [sessions, setSessions] = useState([]);
      const [settings, setSettings] = useState({ store_name: "Toko Azzahro", store_tagline: "Pilihan Berkah dari Tanah Suci", store_address: "", store_phone: "", store_footer: "Terima kasih, semoga berkah 🤲", store_logo: "", receipt_color: "#1a6b3c", wa_number: "6281234567890", kasir_pin: "1234", admin_pin: "0000", owner_pin: "9999", product_categories: "Air Zamzam, Kurma, Tasbih, Sajadah, Parfum, Peci & Mukena, Lainnya", product_brands: "Umum, Ajwa, Sukari, Khalas" });
      const [toast, setToast] = useState("");
      const [loading, setLoading] = useState({});

      const notify = msg => { setToast(msg); setTimeout(() => setToast(""), 2500); };
      const color = settings.receipt_color || "#114232";
      const setLoad = (k, v) => setLoading(l => ({ ...l, [k]: v }));

      const loadProducts = useCallback(async () => { setLoad("p", true); const { data } = await db.from("products").select("*").order("created_at", { ascending: false }); setProducts(data || []); setLoad("p", false); }, []);
      const loadCustomers = useCallback(async () => { setLoad("c", true); const { data } = await db.from("customers").select("*").order("name"); setCustomers(data || []); setLoad("c", false); }, []);
      const loadTransactions = useCallback(async () => { setLoad("t", true); const { data } = await db.from("transactions").select("*,transaction_items(*)").order("created_at", { ascending: false }).limit(500); setTransactions(data || []); setLoad("t", false); }, []);
      const loadPromos = useCallback(async () => { const { data } = await db.from("promos").select("*").order("created_at", { ascending: false }); setPromos(data || []); }, []);
      const loadCashiers = useCallback(async () => { const { data } = await db.from("cashiers").select("*").order("code"); setCashiers(data || []); }, []);
      const loadSessions = useCallback(async () => { const { data } = await db.from("cash_sessions").select("*").order("opened_at", { ascending: false }).limit(50); setSessions(data || []); }, []);
      const loadSettings = useCallback(async () => { const { data } = await db.from("settings").select("*"); if (data?.length) { const obj = {}; data.forEach(r => { obj[r.key] = r.value; }); setSettings(s => ({ ...s, ...obj })); } }, []);

      useEffect(() => {
        if (!role) return;
        const p = page;
        if (p === "dashboard") { loadProducts(); loadCustomers(); loadTransactions(); loadCashiers(); loadSessions(); loadSettings(); }
        if (p === "produk") { loadProducts(); loadSettings(); }
        if (p === "pelanggan") { loadCustomers(); loadTransactions(); }
        if (p === "promo") { loadPromos(); loadProducts(); }
        if (p === "laporan") { loadTransactions(); loadProducts(); loadCustomers(); }
        if (p === "sesi") loadSessions();
        if (p === "pengaturan") { loadCashiers(); loadSettings(); }
      }, [page, role]);

      if (!role) return <PinPad onSuccess={setRole} />;

      const allPages = [
        { id: "dashboard", label: "Home", path: "M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" },
        { id: "produk", label: "Produk", path: "M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" },
        { id: "pelanggan", label: "Pelanggan", path: "M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" },
        { id: "promo", label: "Promo", path: "M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" },
        { id: "laporan", label: "Laporan", path: "M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" },
        { id: "sesi", label: "Sesi", path: "M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" },
        { id: "pengaturan", label: "Setting", path: "M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" },
      ];

      const navItems = allPages.filter(p => role === "admin" ? !["laporan"].includes(p.id) : true);

      return (
        <div className="min-h-screen bg-grayLight flex flex-col md:flex-row">
          <Toast msg={toast} />
          
          {/* Sidebar Desktop */}
          <aside className="hidden md:flex flex-col w-64 bg-dark text-white fixed h-full z-50">
            <div className="p-6 border-b border-white/10">
              <div className="font-black text-xl tracking-tight mb-1">AZZAHRO</div>
              <div className="text-[10px] text-white/50 uppercase tracking-widest font-bold">{role === "owner" ? "Owner Panel" : "Admin Panel"}</div>
            </div>
            <nav className="flex-1 p-4 space-y-1">
              {navItems.map(t => (
                <button key={t.id} onClick={() => setPage(t.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-bold text-sm ${page === t.id ? 'bg-brand text-white' : 'text-white/60 hover:bg-white/5 hover:text-white'}`}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d={t.path}/></svg>
                  {t.label}
                </button>
              ))}
            </nav>
            <div className="p-4 border-t border-white/10">
              <a href="kasir.html" className="w-full flex items-center justify-between px-4 py-3 bg-white/10 hover:bg-white/20 rounded-xl text-white font-bold text-xs transition-colors mb-2">
                <span>Buka Kasir</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 5l7 7-7 7M3 12h18"/></svg>
              </a>
              <button onClick={() => setRole(null)} className="w-full flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-red-400/10 rounded-xl font-bold text-xs transition-colors">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Keluar
              </button>
            </div>
          </aside>

          {/* Header Mobile */}
          <header className="md:hidden bg-dark text-white p-4 flex items-center justify-between sticky top-0 z-50 rounded-b-2xl shadow-md">
            <div>
              <div className="font-extrabold text-lg tracking-tight">{navItems.find(p => p.id === page)?.label || "Admin"}</div>
              <div className="text-[10px] text-white/50 font-bold uppercase tracking-wider">{settings.store_name}</div>
            </div>
            <div className="flex gap-2">
              <a href="kasir.html" className="bg-white/10 px-3 py-1.5 rounded-xl text-white font-bold text-[10px]">Kasir</a>
              <button onClick={() => setRole(null)} className="bg-red-500/20 text-red-300 px-3 py-1.5 rounded-xl font-bold text-[10px]">Logout</button>
            </div>
          </header>

          <main className="flex-1 md:ml-64 pb-24 md:pb-8">
            <div className="max-w-5xl mx-auto">
              {page === "dashboard" && <Dashboard products={products} transactions={transactions} customers={customers} cashiers={cashiers} sessions={sessions} settings={settings} color={color} notify={notify} onRefresh={() => { loadProducts(); loadCustomers(); loadTransactions(); loadCashiers(); loadSessions(); }} />}
              {page === "produk" && <Produk products={products} notify={notify} onReload={loadProducts} loading={loading.p} color={color} settings={settings} onReloadSettings={loadSettings} />}
              {page === "pelanggan" && <Pelanggan customers={customers} transactions={transactions} notify={notify} onReload={() => { loadCustomers(); loadTransactions(); }} loading={loading.c} color={color} />}
              {page === "promo" && <PromoPage promos={promos} products={products} notify={notify} onReload={loadPromos} color={color} />}
              {page === "laporan" && <Laporan transactions={transactions} products={products} customers={customers} notify={notify} loading={loading.t} color={color} />}
              {page === "sesi" && <SesiPage sessions={sessions} onReload={loadSessions} notify={notify} color={color} />}
              {page === "pengaturan" && <Pengaturan cashiers={cashiers} settings={settings} notify={notify} role={role} onReload={() => { loadCashiers(); loadSettings(); }} color={color} />}
            </div>
          </main>

          {/* Navigation Mobile */}
          <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-2 pb-5 z-40 rounded-t-3xl shadow-[0_-8px_30px_rgba(0,0,0,0.05)]">
            {navItems.map(t => (
              <button key={t.id} onClick={() => setPage(t.id)} className={`flex flex-col items-center gap-1 p-2 rounded-2xl transition-all flex-1 ${page === t.id ? 'bg-brandLight text-brand scale-110' : 'text-gray-400 hover:text-gray-600'}`}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d={t.path}/></svg>
                <span className={`text-[8px] uppercase tracking-widest font-black`}>{t.label}</span>
              </button>
            ))}
          </nav>
        </div>
      );
    }

    // ── DASHBOARD ────────────────────────────────────────────────
    function Dashboard({ products, transactions, customers, cashiers, sessions, settings, color, notify, onRefresh }) {
      const today = new Date().toDateString();
      const todayTx = transactions.filter(t => new Date(t.created_at).toDateString() === today);
      const todayRev = todayTx.reduce((s, t) => s + t.total, 0);
      const lowStock = products.filter(p => p.stock <= 5);
      const openSessions = sessions.filter(s => s.status === "open");

      return (
        <div className="p-4 flex flex-col gap-4">
          <div className="bg-gradient-to-br from-dark to-brand rounded-2xl p-5 text-white shadow-md">
            {settings.store_logo && <img src={settings.store_logo} alt="logo" className="h-10 bg-white/10 p-1 rounded-lg object-contain mb-3" onError={e => e.target.style.display = "none"} />}
            <div className="text-xs text-white/60 font-semibold tracking-wider uppercase mb-0.5">Admin Panel</div>
            <div className="text-xl font-extrabold leading-tight">{settings.store_name}</div>
            <div className="text-xs text-white/70 font-medium mt-1">{new Date().toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</div>
            <div className="mt-5 bg-white/10 rounded-xl p-4 backdrop-blur-sm border border-white/10">
              <div className="text-xs text-white/70 font-semibold uppercase tracking-wider mb-1">Omzet Hari Ini</div>
              <div className="text-3xl font-black">{fmt(todayRev)}</div>
              <div className="text-xs text-white/70 font-medium mt-1">{todayTx.length} transaksi hari ini</div>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3">
            {[
              { label: "Total Produk", val: products.length, d: "M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4", c: "text-blue-500", bg: "bg-blue-50" }, 
              { label: "Pelanggan", val: customers.length, d: "M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z", c: "text-purple-500", bg: "bg-purple-50" }, 
              { label: "Stok Tipis", val: lowStock.length, d: "M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z", c: "text-orange-500", bg: "bg-orange-50" }, 
              { label: "Sesi Aktif", val: openSessions.length, d: "M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15", c: openSessions.length > 0 ? "text-brand" : "text-gray-400", bg: openSessions.length > 0 ? "bg-green-50" : "bg-gray-50" }
            ].map(s => (
              <div key={s.label} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex flex-col justify-between">
                <div className={`w-10 h-10 flex items-center justify-center rounded-full ${s.bg} ${s.c}`}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d={s.d}/></svg>
                </div>
                <div className="mt-4">
                  <div className={`text-2xl font-black ${s.c}`}>{s.val}</div>
                  <div className="text-[10px] text-gray-500 font-bold uppercase tracking-wider mt-1">{s.label}</div>
                </div>
              </div>
            ))}
          </div>

          <button onClick={onRefresh} className="w-full bg-white border border-gray-200 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-50 transition-colors shadow-sm text-xs flex justify-center items-center gap-2">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            Refresh Data
          </button>

          {openSessions.length > 0 && <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
            <div className="font-bold text-sm mb-3 flex items-center gap-2 text-brand uppercase tracking-wider text-[11px]">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
              Sesi Kasir Aktif
            </div>
            <div className="flex flex-col gap-1">
              {openSessions.map(s => <div key={s.id} className="flex justify-between items-center py-2 border-b border-gray-50 last:border-0">
                <div>
                  <div className="font-bold text-sm text-gray-800">{s.cashier_name}</div>
                  <div className="text-xs text-gray-500">PIC: {s.opened_by || "-"} · {fmtDate(s.opened_at)}</div>
                </div>
                <div className="text-right">
                  <div className="text-xs font-bold text-brand bg-brandLight px-2 py-1 rounded-lg">Modal: {fmt(s.opening_amount || 0)}</div>
                </div>
              </div>)}
            </div>
          </div>}

          {lowStock.length > 0 && <div className="bg-white rounded-2xl p-4 shadow-sm border border-orange-100">
            <div className="font-bold text-sm mb-3 flex items-center gap-2 text-orange-600 uppercase tracking-wider text-[11px]">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
              Stok Menipis
            </div>
            <div className="flex flex-col gap-1">
              {lowStock.map(p => <div key={p.id} className="flex justify-between items-center py-2 border-b border-gray-50 last:border-0 text-sm font-medium text-gray-700">
                <span className="truncate pr-4">{p.name}</span>
                <span className="bg-orange-500 text-white px-2 py-0.5 rounded-full text-[10px] font-bold shrink-0">{p.stock} tersisa</span>
              </div>)}
            </div>
          </div>}

          {transactions.length > 0 && <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
            <div className="font-bold text-sm mb-3 flex items-center gap-2">🕒 Transaksi Terakhir</div>
            <div className="flex flex-col gap-1">
              {transactions.slice(0, 5).map(t => <div key={t.id} className="flex justify-between items-center py-2 border-b border-gray-50 last:border-0">
                <div>
                  <div className="font-bold text-sm text-gray-800">{t.customer_name || "Umum"}</div>
                  <div className="text-[11px] text-gray-500 mt-0.5">{fmtDate(t.created_at)} · <span className="font-mono font-semibold" style={{ color }}>{txCode(t.tx_code)}</span>{t.cashier_name ? ` · ${t.cashier_name}` : ""}</div>
                </div>
                <div className="font-black text-sm" style={{ color }}>{fmt(t.total)}</div>
              </div>)}
            </div>
          </div>}
        </div>
      );
    }

    // ── PRODUK ────────────────────────────────────────────────────
    function Produk({ products, notify, onReload, loading, color, settings, onReloadSettings }) {
      const dynamicCats = (settings.product_categories || "").split(",").map(s => s.trim()).filter(Boolean);
      const dynamicBrands = (settings.product_brands || "").split(",").map(s => s.trim()).filter(Boolean);
      const [modal, setModal] = useState(null);
      const [form, setForm] = useState({ sku: "", name: "", brand: "", description: "", cost_price: "", price: "", stock: "", category: "Kurma", weight: "", weight_unit: "g", has_variants: false, variant_types: [], variants: [], image_url: "" });
      const [search, setSearch] = useState("");
      const [saving, setSaving] = useState(false);
      const [showMenu, setShowMenu] = useState(false);
      const [editVariants, setEditVariants] = useState(false);
      const fileRef = useRef();

      const grouped = useMemo(() => {
        const map = {};
        products.forEach(p => {
          if (!p.sku) return;
          const key = p.sku.split('-')[0];
          const isVariant = p.sku.includes('-');
          if (!map[key]) {
            map[key] = { ...p, variants: [] };
          }
          if (isVariant) {
            map[key].variants.push(p);
          } else {
            // If it's a base product (no -), it's the main representative
            const vars = map[key].variants;
            map[key] = { ...p, variants: vars };
          }
        });
        return Object.values(map).sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
      }, [products]);

      const filtered = grouped.filter(p => (p.name || "").toLowerCase().includes(search.toLowerCase()) || (p.sku || "").toLowerCase().includes(search.toLowerCase()) || (p.brand || "").toLowerCase().includes(search.toLowerCase()));
      const handleSKUChange = (val) => {
        const clean = val.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
        setForm(f => ({ 
          ...f, 
          sku: clean,
          variants: f.variants.map(v => {
            const suffix = v.sku.includes('-') ? v.sku.split('-')[1] : v.name.replace(/\s+/g, '').toUpperCase();
            return { ...v, sku: clean ? `${clean}-${suffix}` : "" };
          })
        }));
      };
      const autoSKU = () => handleSKUChange(genSKU(form.category, products));

      const [vModal, setVModal] = useState(false);
      const [vForm, setVForm] = useState({ categories: settings.product_categories, brands: settings.product_brands });
      const saveVars = async () => {
        setSaving(true);
        await db.from("settings").upsert({ key: "product_categories", value: vForm.categories }, { onConflict: "key" });
        await db.from("settings").upsert({ key: "product_brands", value: vForm.brands }, { onConflict: "key" });
        notify("Variabel diupdate!");
        setSaving(false); setVModal(false); onReloadSettings();
      };
      
      const generateMatrix = () => {
        setForm(f => {
          let combs = [[]];
          f.variant_types.forEach(t => { 
            const opts = (t.options_string || "").split(",").map(s => s.trim()).filter(Boolean);
            if(opts.length > 0) { const temp = []; combs.forEach(c => { opts.forEach(o => temp.push([...c, o])); }); combs = temp; } 
          });
          if (combs.length === 1 && combs[0].length === 0) combs = [];
          const newVariants = combs.map(c => {
            const name = c.join(" ");
            const suffix = c.map(x => x.slice(0, 3).toUpperCase().replace(/[^A-Z0-9]/g, '')).join("");
            const existing = f.variants.find(v => v.name === name);
            if (existing) return { ...existing, sku: f.sku ? `${f.sku}-${suffix}` : "" };
            // Partial match: if this new combo contains an old variant name, inherit its values
            const partial = f.variants.find(v => name.includes(v.name) || v.name.includes(name));
            if (partial) return { ...partial, name, sku: f.sku ? `${f.sku}-${suffix}` : "" };
            return { sku: f.sku ? `${f.sku}-${suffix}` : "", name, cost_price: 0, price: 0, stock: 0, weight: "", weight_unit: f.weight_unit || "g" };
          });
          return { ...f, variants: newVariants };
        });
        setEditVariants(false);
        notify("Matrix diperbarui!");
      };
      const addVarType = () => { if(form.variant_types.length >= 2) return notify("Maksimal 2 tipe varian!"); setForm(f => ({ ...f, variant_types: [...f.variant_types, { name: "", options_string: "" }] })); };
      const updateVarType = (idx, field, val) => { const nt = [...form.variant_types]; nt[idx][field] = val; setForm(f => ({ ...f, variant_types: nt })); };
      const remVarType = idx => { const nt = form.variant_types.filter((_, i) => i !== idx); setForm(f => ({ ...f, variant_types: nt })); };
      const updateVarItem = (idx, field, val) => { setForm(f => { const nv = [...f.variants]; nv[idx][field] = val; return { ...f, variants: nv }; }); };

      const save = async () => {
        if (!form.name || (!form.has_variants && !form.price)) return notify("Nama & harga utama wajib!");
        if (form.has_variants && form.variants.length === 0) return notify("Varian belum ditambahkan!");
        if (!form.sku) return notify("SKU wajib!");
        setSaving(true);
        
        const variantPayloads = form.has_variants ? form.variants.map(v => ({
          sku: v.sku || `${form.sku}-${v.name.replace(/\s+/g, '').toUpperCase()}`,
          name: form.name, brand: form.brand, description: form.description,
          category: form.category, image_url: form.image_url,
          variant_name: v.name,
          variant_options: form.variant_types.map(vt => ({ name: vt.name, options: (vt.options_string||"").split(",").map(s=>s.trim()).filter(Boolean) })),
          cost_price: parseInt(v.cost_price)||0,
          price: parseInt(v.price)||0,
          stock: parseInt(v.stock)||0,
          weight: v.weight,
          weight_unit: v.weight_unit || "g",
          active: true
        })) : [{
          sku: form.sku, name: form.name, brand: form.brand, description: form.description,
          category: form.category, image_url: form.image_url || `https://placehold.co/400x400/114232/white?text=${encodeURIComponent(form.name.slice(0, 4))}`,
          variant_options: [],
          cost_price: parseInt(form.cost_price)||0,
          price: parseInt(form.price),
          stock: parseInt(form.stock) || 0,
          weight: form.weight,
          weight_unit: form.weight_unit,
          active: true
        }];

        // Delete old rows if editing
        if (modal !== "add") {
          const old = products.find(p => p.id === modal);
          const oldPrefix = (old.sku || "").split('-')[0];
          await db.from("products").delete().ilike('sku', `${oldPrefix}%`);
        }

        const { error } = await db.from("products").insert(variantPayloads);
        
        setSaving(false);
        if (error) return notify("Gagal: " + error.message);
        setModal(null); onReload();
      };
      const del = async (p) => {
        const prefix = (p.sku || "").split('-')[0];
        const { error } = await db.from("products").delete().ilike('sku', `${prefix}%`);
        if (error) return notify("Gagal: " + error.message);
        notify("Dihapus!"); onReload();
      };
      const openEdit = p => {
        const prefix = (p.sku || "").split('-')[0];
        const items = products.filter(x => (x.sku || "").startsWith(prefix));
        const first = items[0] || p;
        const variants = items.filter(x => x.sku.includes('-'));
        
        setModal(first.id);
        setForm({
          sku: prefix, name: first.name, brand: first.brand || "", description: first.description || "",
          cost_price: first.cost_price || "", price: first.price || "", stock: first.stock || "",
          category: first.category, weight: first.weight || "", weight_unit: first.weight_unit || "g",
          has_variants: variants.length > 0,
          variant_types: (first.variant_options || []).map(vt => ({ name: vt.name, options_string: (vt.options || []).join(", ") })),
          variants: variants.map(v => ({ sku: v.sku, name: v.variant_name, cost_price: v.cost_price, price: v.price, stock: v.stock, weight: v.weight, weight_unit: v.weight_unit })),
          image_url: first.image_url || ""
        });
      };

      const exportXLSX = () => { const ws = XLSX.utils.json_to_sheet(products.map(p => ({ SKU: p.sku, Nama: p.name, NamaVarian: p.variant_name || "", Merk: p.brand, Deskripsi: p.description, HargaBeli: p.cost_price, Harga: p.price, Stok: p.stock, Kategori: p.category, Berat: `${p.weight || ""}${p.weight_unit || ""}`, Foto: p.image_url }))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Produk"); XLSX.writeFile(wb, `produk_${Date.now()}.xlsx`); notify("Diexport!"); setShowMenu(false); };
      const dlTemplate = () => { const ws = XLSX.utils.json_to_sheet([{ SKU: "KUR001", Nama: "Kurma Ajwa", NamaVarian: "", Merk: "Azzahro", Deskripsi: "Kurma premium", HargaBeli: 40000, Harga: 50000, Stok: 10, Kategori: "Kurma", Berat: "500g", Foto: "" }, { SKU: "KUR002-MER500", Nama: "Kurma Sukari", NamaVarian: "Merah 500g", Merk: "Azzahro", Deskripsi: "Manis lembut", HargaBeli: 35000, Harga: 45000, Stok: 5, Kategori: "Kurma", Berat: "500g", Foto: "" }]); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Produk"); XLSX.writeFile(wb, "template_produk.xlsx"); notify("Template didownload!"); setShowMenu(false); };
      const importFile = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async ev => {
          try {
            const wb = XLSX.read(ev.target.result, { type: "binary" });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            const imported = rows.map(r => ({
              sku: String(r.SKU || uid()),
              name: r.Nama || "Tanpa Nama",
              variant_name: r.NamaVarian || "",
              brand: r.Merk || "",
              description: r.Deskripsi || "",
              cost_price: parseInt(r.HargaBeli) || 0,
              price: parseInt(r.Harga) || 0,
              stock: parseInt(r.Stok) || 0,
              category: r.Kategori || "Umum",
              weight: String(r.Berat || "").replace(/[^0-9.]/g, ""),
              weight_unit: String(r.Berat || "g").replace(/[0-9.]/g, "") || "g",
              image_url: r.Foto || "",
              is_parent: !String(r.SKU).includes('-'),
              parent_sku: String(r.SKU).split('-')[0],
              active: true
            }));
            let added = 0, updated = 0;
            for (const item of imported) { 
              const { error } = await db.from("products").upsert(item, { onConflict: "sku" });
              if (!error) added++;
            }
            notify(`${added} baris diproses`); onReload();
          } catch (err) { notify("Gagal import: " + err.message); }
          e.target.value = "";
        };
        reader.readAsBinaryString(file);
      };

      return (
        <div className="p-4">
          <div className="flex gap-2 mb-4">
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Cari nama / SKU..." className="flex-1 px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand/30 outline-none shadow-sm" />
            <button onClick={() => { setModal("add"); setForm({ sku: "", name: "", brand: "", description: "", cost_price: "", price: "", stock: "", category: "Kurma", weight: "", weight_unit: "g", has_variants: false, variant_types: [], variants: [], image_url: "" }); }} className="px-4 bg-brand text-white font-bold rounded-xl shadow-sm text-sm hover:opacity-90 active:scale-95 transition-all whitespace-nowrap">+ Tambah</button>
            <div className="relative">
              <button onClick={() => setShowMenu(m => !m)} className="px-3 bg-white border border-gray-200 text-gray-600 rounded-xl h-full font-bold shadow-sm hover:bg-gray-50 flex items-center justify-center">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
              </button>
              {showMenu && <div className="absolute right-0 top-full mt-2 bg-white rounded-xl shadow-lg border border-gray-100 min-w-[180px] z-50 overflow-hidden">
                {[
                  { l: "Import Excel", a: () => { fileRef.current.click(); setShowMenu(false); }, d: "M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" }, 
                  { l: "Export Excel", a: exportXLSX, d: "M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" }, 
                  { l: "Download Template", a: dlTemplate, d: "M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" }, 
                  { l: "Kelola Variabel", a: () => { setVModal(true); setVForm({ categories: settings.product_categories, brands: settings.product_brands }); setShowMenu(false); }, d: "M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" }, 
                  { l: "Refresh", a: () => { onReload(); setShowMenu(false); }, d: "M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" }
                ].map(item => <button key={item.l} onClick={item.a} className="w-full text-left px-4 py-3 text-xs font-black uppercase tracking-wider text-gray-700 hover:bg-gray-50 border-b border-gray-50 last:border-0 flex items-center gap-3">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d={item.d}/></svg>
                  {item.l}
                </button>)}
              </div>}
            </div>
          </div>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={importFile} className="hidden" />

          <div className="flex flex-col gap-3">
            {loading ? <Spinner /> : filtered.length === 0 ? <div className="text-center text-gray-400 py-10 text-sm font-medium bg-white rounded-2xl border border-gray-100">Tidak ada produk</div> : filtered.map(p => <div key={p.id} className="bg-white rounded-2xl p-3 shadow-sm border border-gray-100 flex gap-3 items-center group">
              <img src={p.image_url || `https://placehold.co/80x80/114232/white?text=${encodeURIComponent(p.name.slice(0, 2))}`} alt={p.name} className="w-16 h-16 rounded-xl object-cover shrink-0" onError={e => e.target.src = `https://placehold.co/80x80/114232/white?text=${encodeURIComponent(p.name.slice(0, 2))}`} />
              <div className="flex-1 min-w-0">
                <div className="flex flex-wrap gap-1.5 mb-1">
                  <span className="bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider">{p.sku}</span>
                  <span className="bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider">{p.brand || "Umum"}</span>
                  {p.weight && <span className="bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider">{p.weight}{p.weight_unit}</span>}
                </div>
                <h3 className="font-bold text-gray-800 text-sm truncate">{p.name}</h3>
                {p.variants && p.variants.length > 0 && <div className="text-[10px] text-blue-500 font-medium mt-0.5">Varian: {p.variants.map(v => v.variant_name).join(", ")}</div>}
                <div className="flex gap-3 items-center mt-1.5">
                  <span className="font-extrabold text-[15px]" style={{ color }}>
                    {p.variants && p.variants.length > 0 
                      ? (() => { const prices = [p.price, ...p.variants.map(v=>v.price)]; const min = Math.min(...prices); const max = Math.max(...prices); return min === max ? fmt(min) : `${fmt(min)} - ${fmt(max)}`; })()
                      : fmt(p.price)
                    }
                  </span>
                  <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold ${p.stock <= 5 ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-700'}`}>{p.variants?.length > 0 ? [p.stock, ...p.variants.map(v=>v.stock)].reduce((a,b)=>a+b,0) : p.stock} {p.variants?.length > 0 ? "stok (gabungan)" : "stok"}</span>
                </div>
              </div>
              <div className="flex flex-col gap-1.5 shrink-0">
                <button onClick={() => openEdit(p)} className="px-3 py-1.5 bg-orange-50 text-orange-600 hover:bg-orange-100 rounded-lg text-xs font-bold transition-colors">Edit</button>
                <button onClick={() => del(p)} className="px-3 py-1.5 bg-red-50 text-red-600 hover:bg-red-100 rounded-lg text-xs font-bold transition-colors">Hapus</button>
              </div>
            </div>)}
          </div>

          {modal && <Modal onClose={() => setModal(null)} title={modal === "add" ? "Tambah Produk" : "Edit Produk"}>
            <div className="space-y-4">
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Kategori</label>
                <select value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30">{dynamicCats.map(c => <option key={c}>{c}</option>)}</select>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">SKU Induk *</label>
                <div className="flex gap-2">
                  <input value={form.sku} onChange={e => handleSKUChange(e.target.value)} placeholder="cth: KUR001" className="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-mono focus:outline-none focus:ring-2 focus:ring-brand/30 uppercase" />
                  <button onClick={autoSKU} className="px-4 bg-brandLight text-brand hover:bg-brand/20 font-black uppercase tracking-wider text-[10px] rounded-xl transition-all flex items-center gap-1.5">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    Auto
                  </button>
                </div>
                <div className="text-[10px] text-gray-400 mt-1">Hanya huruf dan angka (Alphanumeric). SKU Varian akan mengikuti kode ini.</div>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Nama *</label>
                <input value={form.name} onChange={e => setForm(p => ({ ...p, name: e.target.value }))} placeholder="Nama produk" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" />
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Merk</label>
                  <select value={form.brand} onChange={e => setForm(p => ({ ...p, brand: e.target.value }))} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30">
                    <option value="">- Tanpa Merk -</option>
                    {dynamicBrands.map(b => <option key={b}>{b}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">URL Foto</label>
                  <input value={form.image_url} onChange={e => setForm(p => ({ ...p, image_url: e.target.value }))} placeholder="https://..." className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" />
                </div>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Deskripsi</label>
                <textarea value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} rows={2} placeholder="Deskripsi singkat..." className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 resize-none" />
              </div>
              <div className="flex items-center justify-between bg-brandLight p-3 rounded-xl border border-brand/20">
                <label className="text-sm font-bold text-brand">Aktifkan Varian Produk</label>
                <input type="checkbox" checked={form.has_variants} onChange={e => setForm(f => ({ ...f, has_variants: e.target.checked }))} className="w-5 h-5 rounded text-brand focus:ring-brand" />
              </div>
              {!form.has_variants && <div className="grid grid-cols-3 gap-3">
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Harga Beli</label>
                  <input value={form.cost_price} onChange={e => setForm(p => ({ ...p, cost_price: e.target.value }))} type="number" placeholder="40000" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Harga Jual *</label>
                  <input value={form.price} onChange={e => setForm(p => ({ ...p, price: e.target.value }))} type="number" placeholder="50000" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 font-bold text-brand" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Stok Utama *</label>
                  <input value={form.stock} onChange={e => setForm(p => ({ ...p, stock: e.target.value }))} type="number" placeholder="10" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" />
                </div>
              </div>}
              {!form.has_variants && <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Berat Utama</label>
                <div className="flex gap-2">
                  <input value={form.weight} onChange={e => setForm(f => ({ ...f, weight: e.target.value }))} type="number" placeholder="500" className="flex-[2] px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" />
                  <select value={form.weight_unit} onChange={e => setForm(f => ({ ...f, weight_unit: e.target.value }))} className="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30"><option>g</option><option>kg</option><option>ml</option><option>L</option></select>
                </div>
              </div>}

              {form.has_variants && <div className="space-y-4">
                <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                  <div className="flex justify-between items-center mb-3">
                    <label className="text-xs font-bold text-gray-500 uppercase tracking-widest">⚙️ Konfigurasi Varian</label>
                    <button onClick={() => setEditVariants(!editVariants)} className="px-3 py-1.5 bg-white border border-gray-200 text-brand text-[10px] font-bold rounded-lg hover:bg-gray-50 transition-all shadow-sm">
                      {editVariants ? "Batal Edit" : "✏️ Edit Tipe Varian"}
                    </button>
                  </div>
                  
                  {editVariants ? (
                    <div className="space-y-3 animate-fade-in">
                      {form.variant_types.map((vt, i) => <div key={i} className="p-3 bg-white border border-gray-100 rounded-lg shadow-sm">
                        <div className="flex gap-2 mb-2">
                          <input value={vt.name} onChange={e => updateVarType(i, 'name', e.target.value)} placeholder="Tipe (cth: Warna)" className="flex-1 px-3 py-1.5 bg-gray-50 border border-gray-200 rounded text-sm focus:outline-none focus:ring-1 focus:ring-brand font-bold" />
                          <button onClick={() => remVarType(i)} className="px-3 text-red-400 hover:text-red-600 transition-colors">✕</button>
                        </div>
                        <input value={vt.options_string || ""} onChange={e => updateVarType(i, 'options_string', e.target.value)} placeholder="Pilihan: Merah, Hijau, Biru" className="w-full px-3 py-1.5 bg-gray-50 border border-gray-200 rounded text-xs focus:outline-none focus:ring-1 focus:ring-brand" />
                      </div>)}
                      <div className="flex gap-2 mt-2">
                        {form.variant_types.length < 2 && <button onClick={addVarType} className="flex-1 py-2 bg-white border border-dashed border-gray-300 text-gray-500 text-xs font-bold rounded-lg hover:border-brand hover:text-brand transition-all">+ Tambah Tipe</button>}
                        <button onClick={generateMatrix} className="flex-[1.5] py-2 bg-brand text-white text-xs font-bold rounded-lg shadow-md hover:opacity-90 active:scale-95 transition-all">🔄 Terapkan & Update Matrix</button>
                      </div>
                    </div>
                  ) : (
                    <div className="flex flex-wrap gap-2">
                      {form.variant_types.length === 0 ? <div className="text-[10px] text-gray-400 italic">Belum ada varian. Klik "Edit Tipe Varian" untuk menambahkan.</div> : form.variant_types.map((vt, i) => <div key={i} className="px-3 py-2 bg-white border border-gray-100 rounded-lg text-[11px]">
                        <span className="font-bold text-gray-400 uppercase mr-2">{vt.name}:</span>
                        <span className="text-gray-700 font-semibold">{vt.options_string}</span>
                      </div>)}
                    </div>
                  )}
                </div>

                {form.variants.length > 0 && <div className="bg-white p-4 rounded-xl border border-gray-200 overflow-hidden shadow-sm">
                  <div className="flex justify-between items-center mb-3">
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-widest">📊 Matrix Varian</label>
                    <span className="text-[10px] text-gray-400 font-medium">{form.variants.length} kombinasi</span>
                  </div>
                  <div className="overflow-x-auto -mx-4 px-4 sm:mx-0 sm:px-0">
                    <table className="w-full text-left border-collapse min-w-[650px]">
                      <thead>
                        <tr className="border-b border-gray-100">
                          <th className="pb-3 text-[10px] font-bold text-gray-400 uppercase tracking-wider w-[20%]">Varian</th>
                          <th className="pb-3 text-[10px] font-bold text-gray-400 uppercase tracking-wider w-[20%]">SKU Varian</th>
                          <th className="pb-3 text-[10px] font-bold text-gray-400 uppercase tracking-wider w-[15%]">H. Beli</th>
                          <th className="pb-3 text-[10px] font-bold text-gray-400 uppercase tracking-wider w-[15%]">H. Jual</th>
                          <th className="pb-3 text-[10px] font-bold text-gray-400 uppercase tracking-wider w-[10%] text-center">Stok</th>
                          <th className="pb-3 text-[10px] font-bold text-gray-400 uppercase tracking-wider w-[20%]">Berat</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {form.variants.map((v, i) => <tr key={i} className="hover:bg-gray-100/50 transition-colors">
                          <td className="py-2.5 pr-2 text-sm font-bold text-gray-800">{v.name}</td>
                          <td className="py-2 pr-2"><input value={v.sku} onChange={e => updateVarItem(i, 'sku', e.target.value.toUpperCase())} placeholder="SKU" className="w-full px-2 py-1.5 bg-white border border-gray-200 rounded text-xs focus:outline-none uppercase font-mono" /></td>
                          <td className="py-2 pr-2"><input value={v.cost_price || ""} onChange={e => updateVarItem(i, 'cost_price', parseInt(e.target.value)||0)} type="number" placeholder="0" className="w-full px-2 py-1.5 bg-white border border-gray-200 rounded text-xs focus:outline-none" /></td>
                          <td className="py-2 pr-2"><input value={v.price || ""} onChange={e => updateVarItem(i, 'price', parseInt(e.target.value)||0)} type="number" placeholder="0" className="w-full px-2 py-1.5 bg-white border border-gray-200 rounded text-xs focus:outline-none font-bold text-brand" /></td>
                          <td className="py-2 pr-2"><input value={v.stock || ""} onChange={e => updateVarItem(i, 'stock', parseInt(e.target.value)||0)} type="number" placeholder="0" className="w-full px-2 py-1.5 bg-white border border-gray-200 rounded text-xs focus:outline-none" /></td>
                          <td className="py-2">
                            <div className="flex bg-white border border-gray-200 rounded overflow-hidden">
                              <input value={v.weight || ""} onChange={e => updateVarItem(i, 'weight', e.target.value)} type="number" placeholder="0" className="w-full px-2 py-1.5 text-xs focus:outline-none" />
                              <select value={v.weight_unit || form.weight_unit} onChange={e => updateVarItem(i, 'weight_unit', e.target.value)} className="bg-gray-50 px-1 text-[10px] focus:outline-none border-l border-gray-200"><option>g</option><option>kg</option><option>ml</option><option>L</option></select>
                            </div>
                          </td>
                        </tr>)}
                      </tbody>
                    </table>
                  </div>
                </div>}
              </div>}
              <div className="flex gap-3 pt-4 border-t border-gray-100 mt-2">
                <button onClick={() => setModal(null)} className="flex-1 py-3.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl font-bold text-sm transition-colors">Batal</button>
                <button onClick={save} disabled={saving} className="flex-[2] py-3.5 bg-gold hover:bg-[#c29d2f] text-dark rounded-xl font-bold text-sm shadow-md transition-all flex justify-center items-center gap-2">{saving ? "Menyimpan..." : "💾 Simpan Produk"}</button>
              </div>
            </div>
          </Modal>}

          {vModal && <Modal onClose={() => setVModal(false)} title="Kelola Variabel Produk">
            <div className="space-y-4">
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Daftar Kategori</label>
                <textarea value={vForm.categories} onChange={e => setVForm(v => ({ ...v, categories: e.target.value }))} rows={4} placeholder="Pisahkan dengan koma..." className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 resize-none" />
                <p className="text-[10px] text-gray-400 mt-1">Pisahkan setiap kategori dengan koma.</p>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Daftar Merk/Brand</label>
                <textarea value={vForm.brands} onChange={e => setVForm(v => ({ ...v, brands: e.target.value }))} rows={4} placeholder="Pisahkan dengan koma..." className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30 resize-none" />
                <p className="text-[10px] text-gray-400 mt-1">Pisahkan setiap merk dengan koma.</p>
              </div>
              <button onClick={saveVars} disabled={saving} className="w-full bg-brand text-white font-bold py-4 rounded-2xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all disabled:opacity-50 mt-4">{saving ? "Menyimpan..." : "Simpan Variabel"}</button>
            </div>
          </Modal>}
        </div>
      );
    }

    // ── PELANGGAN ────────────────────────────────────────────────
    function Pelanggan({ customers, transactions, notify, onReload, loading, color }) {
      const [modal, setModal] = useState(null);
      const [form, setForm] = useState({ name: "", phone: "", email: "", address: "", city: "", birthdate: "", gender: "", notes: "" });
      const [search, setSearch] = useState("");
      const [detail, setDetail] = useState(null);
      const [saving, setSaving] = useState(false);
      const [showMenu, setShowMenu] = useState(false);
      const fileRef = useRef();

      const filtered = customers.filter(c => c.name.toLowerCase().includes(search.toLowerCase()) || c.phone.includes(search) || (c.email || "").toLowerCase().includes(search.toLowerCase()));
      const custTx = id => transactions.filter(t => t.customer_id === id);
      const custTotal = id => custTx(id).reduce((s, t) => s + t.total, 0);

      const save = async () => {
        if (!form.name || !form.phone) return notify("Nama & HP wajib!");
        setSaving(true);
        const payload = { name: form.name, phone: form.phone, email: form.email, address: form.address, city: form.city, birthdate: form.birthdate || null, gender: form.gender, notes: form.notes };
        let error;
        if (modal === "add") { ({ error } = await db.from("customers").insert(payload)); if (!error) notify("Ditambahkan!"); }
        else { ({ error } = await db.from("customers").update(payload).eq("id", modal)); if (!error) notify("Diupdate!"); }
        setSaving(false); if (error) return notify("Gagal: " + error.message);
        setModal(null); onReload();
      };
      const del = async (id) => { const { error } = await db.from("customers").delete().eq("id", id); if (error) return notify("Gagal: " + error.message); notify("Dihapus!"); setDetail(null); onReload(); };
      const openEdit = c => { setDetail(null); setModal(c.id); setForm({ name: c.name, phone: c.phone, email: c.email || "", address: c.address || "", city: c.city || "", birthdate: c.birthdate || "", gender: c.gender || "", notes: c.notes || "" }); };

      const exportXLSX = () => { const ws = XLSX.utils.json_to_sheet(customers.map(c => ({ Nama: c.name, HP: c.phone, Email: c.email || "", Alamat: c.address || "", Kota: c.city || "", TglLahir: c.birthdate || "", Kelamin: c.gender || "", TotalBelanja: custTotal(c.id), JmlTransaksi: custTx(c.id).length }))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Pelanggan"); XLSX.writeFile(wb, `pelanggan_${Date.now()}.xlsx`); notify("Diexport!"); setShowMenu(false); };
      const dlTemplate = () => { const ws = XLSX.utils.json_to_sheet([{ Nama: "Contoh Pelanggan", HP: "08123456789", Email: "email@contoh.com", Alamat: "Jl. Contoh No. 1", Kota: "Semarang", TglLahir: "1990-01-15", Kelamin: "Laki-laki", Catatan: "" }]); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Pelanggan"); XLSX.writeFile(wb, "template_pelanggan.xlsx"); notify("Template didownload!"); setShowMenu(false); };
      const importFile = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async ev => {
          try {
            const wb = XLSX.read(ev.target.result, { type: "binary" });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            const imported = rows.map(r => ({ name: r.Nama || "", phone: String(r.HP || ""), email: r.Email || "", address: r.Alamat || "", city: r.Kota || "", birthdate: r.TglLahir || null, gender: r.Kelamin || "", notes: r.Catatan || "" })).filter(r => r.name && r.phone);
            let added = 0, skipped = 0;
            for (const item of imported) { const ex = customers.find(c => c.phone === item.phone); if (ex) { skipped++; continue; } await db.from("customers").insert(item); added++; }
            notify(`${added} ditambah, ${skipped} dilewati`); onReload();
          } catch (err) { notify("Gagal: " + err.message); }
          e.target.value = "";
        };
        reader.readAsBinaryString(file);
      };

      return (
        <div className="p-4">
          <div className="flex gap-2 mb-4">
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Cari nama / HP / email..." className="flex-1 px-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand/30 outline-none shadow-sm" />
            <button onClick={() => { setModal("add"); setForm({ name: "", phone: "", email: "", address: "", city: "", birthdate: "", gender: "", notes: "" }); }} className="px-4 bg-brand text-white font-bold rounded-xl shadow-sm text-sm hover:opacity-90 active:scale-95 transition-all whitespace-nowrap">+ Tambah</button>
            <div className="relative">
              <button onClick={() => setShowMenu(m => !m)} className="px-3 bg-white border border-gray-200 text-gray-600 rounded-xl h-full font-bold shadow-sm hover:bg-gray-50 flex items-center justify-center">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
              </button>
              {showMenu && <div className="absolute right-0 top-full mt-2 bg-white rounded-xl shadow-lg border border-gray-100 min-w-[180px] z-50 overflow-hidden">
                {[{ l: "Import Excel", a: () => { fileRef.current.click(); setShowMenu(false); } }, { l: "Export Excel", a: exportXLSX }, { l: "Download Template", a: dlTemplate }, { l: "Refresh", a: () => { onReload(); setShowMenu(false); } }].map(item => <button key={item.l} onClick={item.a} className="w-full text-left px-4 py-3 text-sm font-semibold text-gray-700 hover:bg-gray-50 border-b border-gray-50 last:border-0">{item.l}</button>)}
              </div>}
            </div>
          </div>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={importFile} className="hidden" />

          <div className="flex flex-col gap-3">
            {loading ? <Spinner /> : filtered.length === 0 ? <div className="text-center text-gray-400 py-10 text-sm font-medium bg-white rounded-2xl border border-gray-100 mt-2">Belum ada pelanggan</div> : filtered.map(c => <div key={c.id} onClick={() => setDetail(c)} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-4 cursor-pointer hover:border-brand/30 transition-colors group">
              <div className="w-12 h-12 rounded-full flex items-center justify-center text-white font-black text-xl shrink-0 shadow-inner" style={{ background: `linear-gradient(135deg, ${color}, #2d9e5f)` }}>{c.name[0].toUpperCase()}</div>
              <div className="flex-1 min-w-0">
                <h3 className="font-bold text-gray-800 text-sm truncate">{c.name}</h3>
                <div className="text-[11px] text-gray-500 font-medium mt-0.5">{c.phone}{c.city ? ` · ${c.city}` : ""}</div>
              </div>
              <div className="text-right shrink-0">
                <div className="font-extrabold text-[15px]" style={{ color }}>{fmt(custTotal(c.id))}</div>
                <div className="text-[10px] text-gray-400 font-semibold">{custTx(c.id).length} tx</div>
              </div>
            </div>)}
          </div>

          {modal && <Modal onClose={() => setModal(null)} title={modal === "add" ? "Tambah Pelanggan" : "Edit Pelanggan"}>
            <div className="space-y-4">
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-2 uppercase">Jenis Kelamin</label>
                <div className="flex gap-2">
                  {["Laki-laki", "Perempuan", "—"].map(g => <button key={g} onClick={() => setForm(f => ({ ...f, gender: g === "—" ? "" : g }))} className={`flex-1 py-2.5 rounded-xl text-xs font-bold transition-colors border-2 ${form.gender === (g === "—" ? "" : g) ? 'border-brand bg-brandLight text-brand' : 'border-gray-100 bg-white text-gray-500 hover:border-gray-200'}`}>{g}</button>)}
                </div>
              </div>
              {[{ label: "Nama Lengkap *", key: "name", ph: "Sesuai KTP" }, { label: "No. HP / WA *", key: "phone", ph: "08xxxxxxxxxx", type: "tel" }, { label: "Email", key: "email", ph: "email@domain.com", type: "email" }, { label: "Alamat", key: "address", ph: "Alamat domisili" }, { label: "Kota", key: "city", ph: "cth: Semarang" }, { label: "Tgl Lahir", key: "birthdate", type: "date", ph: "" }, { label: "Catatan", key: "notes", ph: "Alergi / referensi..." }].map(f => <div key={f.key}>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">{f.label}</label>
                <input value={form[f.key]} onChange={e => setForm(p => ({ ...p, [f.key]: e.target.value }))} type={f.type || "text"} placeholder={f.ph} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" />
              </div>)}
              <div className="flex gap-3 pt-4 border-t border-gray-100 mt-2">
                <button onClick={() => setModal(null)} className="flex-1 py-3.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl font-bold text-sm transition-colors">Batal</button>
                <button onClick={save} disabled={saving} className="flex-[2] py-3.5 bg-gold hover:bg-[#c29d2f] text-dark rounded-xl font-bold text-sm shadow-md transition-all flex justify-center items-center gap-2">{saving ? "Menyimpan..." : "💾 Simpan Data"}</button>
              </div>
            </div>
          </Modal>}

          {detail && <Modal onClose={() => setDetail(null)} title="Detail Pelanggan">
            <div className="text-center mb-6">
              <div className="w-20 h-20 rounded-full flex items-center justify-center text-white font-black text-4xl mx-auto mb-3 shadow-inner" style={{ background: `linear-gradient(135deg, ${color}, #2d9e5f)` }}>{detail.name[0]}</div>
              <h2 className="font-extrabold text-xl text-gray-800">{detail.name}</h2>
              {detail.gender && <p className="text-xs text-gray-500 font-medium mt-1">{detail.gender}</p>}
            </div>
            <div className="grid grid-cols-2 gap-3 mb-5">
              <div className="bg-brandLight rounded-2xl p-4 text-center border border-brand/10">
                <div className="text-3xl font-black text-brand mb-1">{custTx(detail.id).length}</div>
                <div className="text-xs font-bold text-brand/70 uppercase tracking-wider">Transaksi</div>
              </div>
              <div className="bg-brandLight rounded-2xl p-4 text-center border border-brand/10 flex flex-col justify-center">
                <div className="text-[17px] font-black text-brand mb-1 truncate">{fmt(custTotal(detail.id))}</div>
                <div className="text-xs font-bold text-brand/70 uppercase tracking-wider">Total Belanja</div>
              </div>
            </div>
            <div className="bg-gray-50 rounded-2xl p-4 border border-gray-100 space-y-3 mb-5">
              {[{ icon: "📱", val: detail.phone }, { icon: "✉️", val: detail.email }, { icon: "📍", val: [detail.address, detail.city].filter(Boolean).join(", ") }, { icon: "🎂", val: detail.birthdate ? new Date(detail.birthdate).toLocaleDateString("id-ID") : null }, { icon: "📝", val: detail.notes }].filter(r => r.val).map((r, i) => <div key={i} className="flex items-start gap-3 text-sm text-gray-700 font-medium">
                <span className="shrink-0">{r.icon}</span>
                <span className="leading-snug">{r.val}</span>
              </div>)}
            </div>
            {custTx(detail.id).length > 0 && <div>
              <h4 className="font-bold text-sm text-gray-800 mb-3 uppercase tracking-wider">Riwayat Terakhir</h4>
              <div className="flex flex-col gap-2">
                {custTx(detail.id).slice(0, 5).map(t => <div key={t.id} className="flex justify-between items-center bg-white border border-gray-100 p-3 rounded-xl shadow-sm">
                  <div>
                    <div className="font-mono font-bold text-xs" style={{ color }}>{txCode(t.tx_code)}</div>
                    <div className="text-[10px] text-gray-500 font-medium mt-0.5">{fmtDate(t.created_at)}</div>
                  </div>
                  <span className="font-black text-sm text-gray-800">{fmt(t.total)}</span>
                </div>)}
              </div>

    // ── PROMO ────────────────────────────────────────────────────

      const toggleBundle = id => setForm(f => ({ ...f, bundle_items: f.bundle_items.includes(id) ? f.bundle_items.filter(x => x !== id) : [...f.bundle_items, id] }));

      const save = async () => {
        if (!form.name) return notify("Nama promo wajib!");
        if (!form.disc_value) return notify("Nilai diskon wajib!");
        setSaving(true);
        const payload = { name: form.name, type: form.type, disc_type: form.disc_type, disc_value: parseFloat(form.disc_value), min_purchase: parseFloat(form.min_purchase) || 0, max_discount: parseFloat(form.max_discount) || 0, bundle_items: form.bundle_items, start_date: form.start_date || null, end_date: form.end_date || null, active: form.active };
        let error;
        if (modal === "add") { ({ error } = await db.from("promos").insert(payload)); if (!error) notify("Promo ditambahkan!"); }
        else { ({ error } = await db.from("promos").update(payload).eq("id", modal)); if (!error) notify("Diupdate!"); }

                    <span>{p.disc_type === "pct" ? `${p.disc_value}%` : `${fmt(p.disc_value)}`} off{p.min_purchase > 0 ? ` · min ${fmt(p.min_purchase)}` : ""}</span>
                  </div>
                </div>
                <div className="flex gap-1.5 shrink-0">
                  <button onClick={() => { setModal(p.id); setForm({ ...p, disc_value: String(p.disc_value), min_purchase: String(p.min_purchase || ""), max_discount: String(p.max_discount || ""), start_date: p.start_date ? p.start_date.slice(0, 16) : "", end_date: p.end_date ? p.end_date.slice(0, 16) : "", bundle_items: p.bundle_items || [] }); }} className="w-8 h-8 flex items-center justify-center bg-orange-50 hover:bg-orange-100 text-orange-600 rounded-lg transition-colors">✏️</button>
                  <button onClick={() => del(p.id)} className="w-8 h-8 flex items-center justify-center bg-red-50 hover:bg-red-100 text-red-500 rounded-lg transition-colors">✕</button>
                </div>
              </div>
              <button onClick={() => toggle(p)} className={`w-full py-2.5 rounded-xl text-xs font-bold transition-all relative z-20 border-2 ${p.active ? 'border-red-100 bg-red-50 text-red-600 hover:bg-red-100' : 'border-brandLight bg-white text-brand hover:bg-brandLight'}`}>{p.active ? "⏸ Nonaktifkan Promo" : "▶ Aktifkan Promo"}</button>
            </div>)}

              </div>
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Tipe Promo</label>
                <div className="flex gap-2">
                  {[{ id: "discount", label: "💰 Diskon Biasa" }, { id: "bundling", label: "📦 Bundling Produk" }].map(t => <button key={t.id} onClick={() => setForm(f => ({ ...f, type: t.id }))} className={`flex-1 py-3 rounded-xl text-xs font-bold transition-colors border-2 ${form.type === t.id ? 'border-brand bg-brandLight text-brand' : 'border-gray-100 bg-white text-gray-500 hover:border-gray-200'}`}>{t.label}</button>)}

                    <div className={`w-5 h-5 rounded md border-2 flex items-center justify-center shrink-0 ${form.bundle_items.includes(p.id) ? 'border-brand bg-brand' : 'border-gray-300 bg-white'}`}>{form.bundle_items.includes(p.id) && <span className="text-white text-xs font-bold">✓</span>}</div>
                    <span className="text-sm font-medium text-gray-700 truncate">{p.name}</span>
                  </div>)}
                </div>
              </div>}
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase">Besaran Diskon *</label>

                <input value={form.disc_value} onChange={e => setForm(f => ({ ...f, disc_value: e.target.value }))} type="number" placeholder={form.disc_type === "pct" ? "cth: 10" : "cth: 20000"} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand/30" />

    // ── LAPORAN ───────────────────────────────────────────────────

      const now = new Date();

      const filter = t => {
        const d = new Date(t.created_at);
        if (range === "today") return d.toDateString() === now.toDateString();
        if (range === "week") return (now - d) <= 7 * 864e5;
        if (range === "month") return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        return true;
      };

      const filtered = transactions.filter(filter);
      const revenue = filtered.reduce((s, t) => s + t.total, 0);
      const totalDisc = filtered.reduce((s, t) => s + (t.discount_total || 0), 0);
      const byMethod = {}; PAY_METHODS.forEach(m => { byMethod[m] = filtered.filter(t => t.pay_method === m).reduce((s, t) => s + t.total, 0); });
      const soldMap = {}; filtered.forEach(t => (t.transaction_items || []).forEach(i => { soldMap[i.name] = (soldMap[i.name] || 0) + i.qty; }));
      const top = Object.entries(soldMap).sort((a, b) => b[1] - a[1]).slice(0, 5);
      const cashierMap = {}; filtered.forEach(t => { if (t.cashier_name) cashierMap[t.cashier_name] = (cashierMap[t.cashier_name] || 0) + t.total; });

      const expTx = () => {
        const rows = filtered.flatMap(t => (t.transaction_items || []).map(i => ({ KodeTx: txCode(t.tx_code), Tanggal: fmtDate(t.created_at), Pelanggan: t.customer_name, Kasir: t.cashier_name || "-", SKU: i.sku, Produk: i.name, Qty: i.qty, Harga: i.price, Subtotal: i.subtotal, Total: t.total, Metode: t.pay_method || "Cash" })));
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Transaksi");
        XLSX.writeFile(wb, "transaksi_" + Date.now() + ".xlsx");
        notify("Diexport!");
      };
      const expProduk = () => {
        const rows = products.map(p => ({ SKU: p.sku, Nama: p.name, Merk: p.brand, Harga: p.price, Stok: p.stock, Kategori: p.category }));
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Produk");

        notify("Diexport!");

        cashierStats[name].omzet += t.total;
        cashierStats[name].txCount += 1;
