<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Tentang Kami — Toko Azzahro</title>
  <meta name="description" content="Mengenal lebih dekat Toko Azzahro, oleh-oleh haji dan umroh terpercaya sejak 2015." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { brand: '#114232', brandLight: '#EDF2F0', gold: '#D4AF37', goldLight: '#FDF8E7', dark: '#0A2517', grayLight: '#F8F9FB' },
          animation: { 'fade-up': 'fadeUp 0.4s ease-out' },
          keyframes: { fadeUp: { '0%': { opacity: '0', transform: 'translateY(16px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
        }
      }
    }
  </script>
</head>
<body class="bg-grayLight text-gray-800 font-sans antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = "https://xliwxtakluemverkgwrv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsaXd4dGFrbHVlbXZlcmtnd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjEzNTQsImV4cCI6MjA5MjA5NzM1NH0.XaP6ad5rvhA8EMlCSGy6FIoNltBMiDwQ4fLxe9BwVy8";
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { useState, useEffect } = React;

    const DEFAULTS = {
      store_name: "Toko Azzahro",
      store_tagline: "Pilihan Berkah dari Tanah Suci",
      store_logo: "",
      receipt_color: "#114232",
      wa_number: "6281234567890",
      store_address: "",
      about_hero_image: "",
      about_description: "Toko Azzahro berdiri sejak 2015 dengan semangat berbagi keberkahan. Kami menghadirkan oleh-oleh haji dan umroh terpercaya — mulai dari Air Zamzam asli, kurma pilihan terbaik dari Madinah, hingga perlengkapan ibadah berkualitas tinggi.\n\nSetiap produk yang kami jual dipilih langsung dari sumber terpercaya di Tanah Suci, untuk memastikan keaslian dan kualitas yang terjaga. Percayakan kenangan suci Anda bersama kami.",
      about_services: JSON.stringify([
        { icon: "🕌", title: "Produk Autentik", desc: "Langsung dari importir resmi dan jamaah haji terpercaya" },
        { icon: "📦", title: "Pengiriman Aman", desc: "Dikemas khusus agar produk tetap terjaga kualitasnya" },
        { icon: "💚", title: "Harga Bersahabat", desc: "Terjangkau untuk semua kalangan, kualitas premium" }
      ]),
      about_cta_label: "Hubungi Kami via WhatsApp",
      about_extra_links: JSON.stringify([
        { label: "Lihat Produk", url: "index.html" }
      ])
    };

    function Spinner() {
      return (
        <div className="flex items-center justify-center min-h-screen">
          <div className="w-10 h-10 border-4 border-gray-200 border-t-brand rounded-full animate-spin"></div>
        </div>
      );
    }

    function App() {
      const [s, setS] = useState(DEFAULTS);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        db.from("settings").select("*").then(({ data }) => {
          if (data?.length) {
            const obj = { ...DEFAULTS };
            data.forEach(r => { obj[r.key] = r.value; });
            setS(obj);
          }
          setLoading(false);
        });
      }, []);

      if (loading) return <Spinner />;

      const color = s.receipt_color || "#114232";
      const waNum = (s.wa_number || "6281234567890").replace(/[^0-9]/g, "");
      let services = [];
      try { services = JSON.parse(s.about_services || "[]"); } catch(_) {}
      let extraLinks = [];
      try { extraLinks = JSON.parse(s.about_extra_links || "[]"); } catch(_) {}
      const descParagraphs = (s.about_description || "").split("\n").filter(Boolean);

      return (
        <div className="min-h-screen max-w-md mx-auto bg-white shadow-sm flex flex-col">

          {/* Hero */}
          <div className="relative overflow-hidden" style={{ minHeight: 280 }}>
            {s.about_hero_image ? (
              <img src={s.about_hero_image} alt="Hero" className="w-full h-72 object-cover" onError={e => e.target.style.display='none'} />
            ) : (
              <div className="w-full h-72" style={{ background: `linear-gradient(160deg, ${color} 0%, #0A2517 100%)` }} />
            )}
            <div className="absolute inset-0 flex flex-col justify-end p-6" style={{ background: 'linear-gradient(to top, rgba(10,37,23,0.85) 0%, rgba(10,37,23,0.3) 60%, transparent 100%)' }}>
              <a href="index.html" className="absolute top-5 left-5 w-9 h-9 bg-white/20 hover:bg-white/30 rounded-full flex items-center justify-center text-white transition-colors backdrop-blur-sm">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
              </a>
              {s.store_logo && <img src={s.store_logo} alt="logo" className="w-14 h-14 rounded-2xl object-contain bg-white/20 p-2 mb-3 shadow-md" onError={e => e.target.style.display='none'} />}
              <h1 className="font-black text-3xl text-white leading-tight">{s.store_name}</h1>
              <p className="text-white/80 text-sm font-medium mt-1">{s.store_tagline}</p>
            </div>
          </div>

          <div className="flex-1 px-5 py-6 space-y-8">

            {/* Deskripsi */}
            <div className="animate-fade-up">
              <div className="flex items-center gap-2 mb-4">
                <div className="w-1 h-5 rounded-full" style={{ background: color }}></div>
                <h2 className="font-extrabold text-lg text-gray-900">Tentang Kami</h2>
              </div>
              <div className="space-y-3">
                {descParagraphs.map((p, i) => (
                  <p key={i} className="text-gray-600 text-sm leading-relaxed">{p}</p>
                ))}
              </div>
            </div>

            {/* Layanan */}
            {services.length > 0 && (
              <div className="animate-fade-up">
                <div className="flex items-center gap-2 mb-4">
                  <div className="w-1 h-5 rounded-full" style={{ background: color }}></div>
                  <h2 className="font-extrabold text-lg text-gray-900">Layanan Kami</h2>
                </div>
                <div className="grid grid-cols-1 gap-3">
                  {services.map((sv, i) => (
                    <div key={i} className="flex items-start gap-4 bg-grayLight p-4 rounded-2xl border border-gray-100">
                      <div className="text-3xl shrink-0">{sv.icon}</div>
                      <div>
                        <div className="font-bold text-gray-800 text-sm mb-0.5">{sv.title}</div>
                        <div className="text-xs text-gray-500 leading-relaxed">{sv.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Kontak & CTA */}
            <div className="animate-fade-up space-y-3">
              <div className="flex items-center gap-2 mb-4">
                <div className="w-1 h-5 rounded-full" style={{ background: color }}></div>
                <h2 className="font-extrabold text-lg text-gray-900">Kontak</h2>
              </div>
              {s.store_address && (
                <div className="flex items-start gap-3 bg-grayLight p-4 rounded-2xl border border-gray-100">
                  <svg className="w-5 h-5 shrink-0 mt-0.5" style={{ color }} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                  <span className="text-sm text-gray-600 leading-relaxed">{s.store_address}</span>
                </div>
              )}
              <a href={"https://wa.me/" + waNum} target="_blank" className="flex items-center justify-center gap-3 w-full py-4 rounded-2xl text-white font-bold text-sm shadow-md transition-transform active:scale-[0.98]" style={{ background: '#25D366' }}>
                <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.1.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-5.824 4.74-10.563 10.581-10.563 5.824 0 10.564 4.741 10.564 10.564 0 5.824-4.74 10.564-10.564 10.564z"/></svg>
                {s.about_cta_label || "Hubungi Kami via WhatsApp"}
              </a>
              {extraLinks.map((lk, i) => (
                <a key={i} href={lk.url} className="flex items-center justify-center gap-2 w-full py-3.5 rounded-2xl font-bold text-sm border-2 transition-colors" style={{ color, borderColor: color }}>
                  {lk.label}
                </a>
              ))}
            </div>
          </div>

          {/* Footer */}
          <div className="border-t border-gray-100 p-5 text-center text-xs text-gray-400">
            © {new Date().getFullYear()} {s.store_name} · <a href="index.html" className="text-brand font-medium hover:underline">Kembali ke Katalog</a>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
